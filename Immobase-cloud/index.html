<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>ImmoBase - D&T Homes</title>

<!-- PWA Manifest + Theme -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ffffff">
<meta name="description" content="D&T Homes Verwaltungs-System für Wohnungen, Mieter und Bewerber">

<!-- iOS specific -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ImmoBase">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">

<!-- Standard favicons (alle Größen für Laptop-Browser) -->
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png">
<link rel="icon" type="image/png" sizes="96x96" href="/favicon-96.png">
<link rel="icon" type="image/png" sizes="180x180" href="/favicon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="shortcut icon" href="/favicon.ico">

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.18.6/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<!-- Service Worker entfernt — alte SWs werden automatisch entfernt bei Besuch -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(reg => reg.unregister());
  });
  if (window.caches) {
    caches.keys().then(names => names.forEach(name => caches.delete(name)));
  }
}
</script>

<style>
:root{
  --bg: #f6f1e8;
  --surface: #fefcf7;
  --card: #fefcf7;
  --beige: #c9b896;
  --beige-soft: #ede4d3;
  --beige-line: #ddd0b8;
  --gold: #1a1814;
  --line: #e1d8c5;
  --line-soft: #ebe3d2;
  --ink: #1a1814;
  --text: #4a4439;
  --muted: #8a8174;
  --muted-light: #b8af9f;
  --green: #5a6e4a;
  --green-soft: #e8eadb;
  --warn: #b8843e;
  --warn-soft: #f4e8d3;
  --error: #9b4a3e;
  --error-soft: #f0dcd5;
}
*{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden}
/* Seitliches Wegrutschen beim Scrollen in Diagrammen und Tabellen verhindern */
body,.main{overscroll-behavior-x:contain}
.main > *{max-width:100%}
/* Lange Zeichenketten (E-Mails, Schluesselnummern, URLs) duerfen umbrechen */
.main table{max-width:100%}
.main td,.main th{overflow-wrap:anywhere}
body{background:var(--bg);color:var(--text);overflow-x:hidden;font-family:'Manrope', sans-serif;font-size:13.5px;font-weight:400;letter-spacing:.005em;min-height:100vh;min-height:-webkit-fill-available}
/* PWA: handle iOS safe area (notch, dynamic island, home indicator) */
@supports (padding: env(safe-area-inset-top)) {
  body { 
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    background: var(--bg);
  }
}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--beige-line);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--beige)}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);position:relative;overflow:hidden}
.login-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top,var(--beige-soft) 0%,transparent 60%);pointer-events:none}
.login-card{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:48px 44px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 1px 60px rgba(160,136,100,.06)}
.login-logo{text-align:center;margin-bottom:36px;padding-bottom:28px;border-bottom:1px solid var(--line-soft)}
.login-logo h1{font-family:'Manrope', sans-serif;font-size:32px;font-weight:400;color:var(--ink);letter-spacing:.05em;margin-bottom:6px}
.login-logo p{font-size:10px;color:var(--muted);letter-spacing:.4em;text-transform:uppercase;font-weight:400}
.login-card h2{font-family:'Manrope', sans-serif;font-size:22px;font-weight:400;color:var(--ink);margin-bottom:10px;letter-spacing:.01em}
.login-card .desc{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:24px;font-weight:300}
.login-input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:13px 14px;color:var(--ink);font-family:'Manrope', sans-serif;font-size:13.5px;outline:none;margin-bottom:14px;transition:border-color .25s ease}
.login-input:focus{border-color:var(--gold);background:var(--surface)}
.login-input::placeholder{color:var(--muted-light);font-weight:300}
.login-btn{width:100%;background:var(--ink);border:none;border-radius:8px;padding:14px;color:var(--surface);font-family:'Manrope', sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:.2s all;letter-spacing:.18em;text-transform:uppercase}
.login-btn:hover{background:var(--gold);transform:translateY(-1px)}
.login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.login-msg{margin-top:18px;padding:11px 14px;border-radius:8px;font-size:12px;line-height:1.6;border-left:2px solid}
.login-msg.success{background:var(--green-soft);border-color:var(--green);color:var(--green)}
.login-msg.error{background:var(--error-soft);border-color:var(--error);color:var(--error)}
.login-foot{text-align:center;margin-top:24px;font-size:10px;color:var(--muted-light);letter-spacing:.2em;text-transform:uppercase}

/* APP LAYOUT */
.app{display:flex;height:100vh;overflow:hidden;background:var(--bg)}
.sidebar{width:230px;min-width:230px;background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column}

/* Mobile-only: Hamburger button + overlay (hidden on desktop) */
.mobile-menu-btn { display: none; }
.sidebar-overlay { display: none; }

.logo{padding:30px 24px 24px;border-bottom:1px solid var(--line-soft)}
.logo h1{font-family:'Manrope', sans-serif;font-size:22px;font-weight:400;color:var(--ink);letter-spacing:.04em}
.logo p{font-size:9px;color:var(--muted);margin-top:4px;letter-spacing:.4em;text-transform:uppercase;font-weight:400}
.nav{flex:1;padding:18px 14px;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
.nb{display:flex;align-items:center;gap:11px;padding:10px 14px;border-radius:0;border:none;background:none;color:var(--muted);cursor:pointer;font-family:'Manrope', sans-serif;font-size:12px;font-weight:400;text-align:left;width:100%;transition:.2s all;letter-spacing:.04em;position:relative}
.nb:hover{color:var(--ink);background:var(--beige-soft)}
.nb.on{color:var(--ink);background:var(--beige-soft);font-weight:500}
.nb.on::before{content:'';position:absolute;left:0;top:25%;bottom:25%;width:2px;background:var(--gold)}
.ni{font-size:13px;width:18px;text-align:center;color:var(--muted-light)}
.nb.on .ni{color:var(--gold)}
.user-info{padding:18px 24px;border-top:1px solid var(--line-soft);font-size:10.5px;color:var(--muted)}
.user-info .uemail{color:var(--ink);font-weight:500;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:8px;letter-spacing:.01em}
.logout-btn{background:none;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:6px 14px;font-size:9.5px;cursor:pointer;font-family:'Manrope', sans-serif;letter-spacing:.18em;text-transform:uppercase;transition:.2s}
.logout-btn:hover{border-color:var(--ink);color:var(--ink)}

.main{flex:1;min-width:0;max-width:100%;overflow-y:auto;overflow-x:hidden;padding:48px 56px}
.pt{font-family:'Manrope', sans-serif;font-size:34px;font-weight:400;color:var(--ink);margin-bottom:6px;letter-spacing:.01em}
.ps{font-size:11px;color:var(--muted);margin-bottom:32px;letter-spacing:.18em;text-transform:uppercase;font-weight:400}

.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;margin-bottom:30px;background:var(--line);border:1px solid var(--line)}
.sc{background:var(--surface);padding:24px 26px;transition:.2s background}
.sc:hover{background:var(--beige-soft)}
.sl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.3em;margin-bottom:10px;font-weight:500}
.sv{font-family:'Manrope', sans-serif;font-size:36px;font-weight:300;color:var(--ink);line-height:1;letter-spacing:.01em}
.sn{font-size:10.5px;margin-top:8px;color:var(--muted);letter-spacing:.05em}

.card{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:32px;margin-bottom:24px}
.pcol-h{display:flex;align-items:baseline;gap:8px;margin-bottom:12px;padding-bottom:9px;border-bottom:1px solid var(--line-soft)}
.pcol-h .t{font-family:'Manrope',sans-serif;font-size:15px;font-weight:500;color:var(--ink);letter-spacing:.02em}
.pcol-h .c{font-size:11px;color:var(--muted-light)}
.pcard{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:11px 13px;border-radius:9px;cursor:pointer;border:1px solid transparent;background:transparent;transition:.15s all;font-family:inherit}
.pcard:hover{background:var(--beige-soft)}
.pcard.sel{background:var(--beige-soft);border-color:var(--beige)}
.plink{display:block;width:100%;text-align:left;padding:9px 12px;border-radius:8px;border:1px solid var(--line-soft);background:var(--surface);cursor:pointer;transition:.15s all}
.plink:hover{border-color:var(--beige);background:var(--beige-soft)}
.psec{font-size:9.5px;text-transform:uppercase;letter-spacing:.22em;color:var(--muted);font-weight:600;margin-bottom:7px}
.kcol{flex:1;min-width:240px;background:var(--bg);border:1px solid var(--line-soft);border-radius:12px;padding:12px}
.kcol-h{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;padding:0 2px}
.kcol-h .t{font-family:'Manrope',sans-serif;font-size:13px;font-weight:600;color:var(--ink);letter-spacing:.02em}
.kcol-h .c{font-size:11px;color:var(--muted-light)}
.kcard{background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:11px 12px;margin-bottom:8px}
.kauto{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:var(--surface);border:1px solid var(--line-soft);border-left:3px solid var(--warn);border-radius:9px;padding:10px 11px;margin-bottom:8px;cursor:pointer;transition:.15s all;font-family:inherit}
.kauto:hover{background:var(--beige-soft)}
.kbadge{flex-shrink:0;font-size:8.5px;text-transform:uppercase;letter-spacing:.14em;color:var(--warn);border:1px solid var(--warn);border-radius:20px;padding:2px 7px;font-weight:600}
.kmini{width:26px;height:24px;border-radius:6px;border:1px solid var(--line);background:var(--surface);cursor:pointer;color:var(--muted);font-size:11px;display:inline-flex;align-items:center;justify-content:center;transition:.15s all}
.kmini:hover{background:var(--beige-soft);color:var(--ink)}
.kmini:disabled{opacity:.3;cursor:default}
.ct{font-family:'Manrope', sans-serif;font-size:18px;font-weight:400;color:var(--ink);margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--line-soft);letter-spacing:.01em}

table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.25em;padding:0 10px 12px;border-bottom:1px solid var(--line);font-weight:500}
td{padding:13px 10px;border-bottom:1px solid var(--line-soft);font-size:12.5px;vertical-align:middle;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--beige-soft)}

.bx{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:8px;font-size:9.5px;font-weight:500;white-space:nowrap;letter-spacing:.08em;text-transform:uppercase;border:1px solid}
.b-g{background:var(--green-soft);color:var(--green);border-color:var(--green-soft)}
.b-y{background:var(--warn-soft);color:var(--warn);border-color:var(--warn-soft)}
.b-r{background:var(--error-soft);color:var(--error);border-color:var(--error-soft)}
.b-b{background:var(--beige-soft);color:var(--gold);border-color:var(--beige-line)}
.b-x{background:transparent;color:var(--muted);border-color:var(--line)}
.b-p{background:var(--beige-soft);color:var(--gold);border-color:var(--beige-line)}

.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;border:1px solid;cursor:pointer;font-family:'Manrope', sans-serif;font-size:10.5px;font-weight:500;transition:.2s all;letter-spacing:.15em;text-transform:uppercase}
.btn-p{background:var(--ink);color:var(--surface);border-color:var(--ink)}.btn-p:hover{background:var(--gold);border-color:var(--gold)}
.btn-g{background:transparent;color:var(--text);border-color:var(--line)}.btn-g:hover{border-color:var(--ink);color:var(--ink)}
.btn-gr{background:var(--green-soft);color:var(--green);border-color:var(--green-soft)}.btn-gr:hover{background:var(--green);color:var(--surface);border-color:var(--green)}
.btn-r{background:var(--error-soft);color:var(--error);border-color:var(--error-soft)}.btn-r:hover{background:var(--error);color:var(--surface);border-color:var(--error)}
.btn-sm{padding:6px 12px;font-size:9.5px}

.row{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap}
.inp{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:9px 14px;color:var(--ink);font-family:'Manrope', sans-serif;font-size:12.5px;outline:none;transition:.2s;letter-spacing:.01em}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--muted-light);font-weight:300}

.ov{position:fixed;inset:0;background:rgba(31,29,24,.4);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:40px;width:540px;max-height:86vh;overflow-y:auto;box-shadow:0 4px 80px rgba(31,29,24,.12)}
.mt{font-family:'Manrope', sans-serif;font-size:24px;font-weight:400;color:var(--ink);margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid var(--line-soft);letter-spacing:.01em}

.fg{margin-bottom:14px}
.fl{font-size:9.5px;color:var(--muted);margin-bottom:6px;display:block;letter-spacing:.25em;text-transform:uppercase;font-weight:500}
.fi{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:10px 13px;color:var(--ink);font-family:'Manrope', sans-serif;font-size:12.5px;outline:none;transition:.2s;letter-spacing:.01em}
.fi:focus{border-color:var(--gold)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ma{display:flex;gap:12px;justify-content:flex-end;margin-top:24px;padding-top:18px;border-top:1px solid var(--line-soft)}

.tabs{display:flex;margin-bottom:22px;border-bottom:1px solid var(--line);gap:4px}
.tab{padding:10px 20px;border:none;background:none;color:var(--muted);cursor:pointer;font-family:'Manrope', sans-serif;font-size:10.5px;font-weight:500;border-bottom:1px solid transparent;margin-bottom:-1px;transition:.2s;letter-spacing:.18em;text-transform:uppercase}
.tab.on{color:var(--ink);border-bottom-color:var(--gold)}
.tab:hover:not(.on){color:var(--ink)}

.av{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:var(--beige-soft);color:var(--gold);font-family:'Manrope', sans-serif;font-weight:500;flex-shrink:0;border:1px solid var(--beige-line)}

.warn{background:var(--warn-soft);border:1px solid var(--warn-soft);border-left:3px solid var(--warn);border-radius:8px;padding:13px 18px;font-size:12px;color:var(--warn);margin-bottom:18px;line-height:1.6;letter-spacing:.01em}
.warn-r{background:var(--error-soft);border:1px solid var(--error-soft);border-left:3px solid var(--error);border-radius:8px;padding:13px 18px;font-size:12px;color:var(--error);margin-bottom:18px;line-height:1.6;letter-spacing:.01em}

.igrid{display:grid;grid-template-columns:1fr 1fr;gap:18px 22px}
.ig{padding-bottom:14px;border-bottom:1px solid var(--line-soft)}
.ig label{font-size:9px;color:var(--muted);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.25em;font-weight:500}
.ig span{font-size:13px;color:var(--ink);font-weight:400}

a{color:var(--gold);text-decoration:none;transition:.2s;border-bottom:1px solid transparent}
a:hover{border-bottom-color:var(--gold)}
.empty{text-align:center;color:var(--muted);font-size:12px;padding:36px;font-style:italic;font-family:'Manrope', sans-serif;font-size:14px}

.bewerber-card{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:9px 12px;margin-bottom:5px;transition:.2s all;cursor:pointer}
.bewerber-card:hover{border-color:var(--beige);background:var(--beige-soft)}
.bewerber-card.selected{border-color:var(--gold);background:var(--beige-soft);border-left:3px solid var(--gold)}

.zimmer-option{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--bg);border:1px solid var(--line);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:.2s all}
.zimmer-option:hover{border-color:var(--gold);background:var(--beige-soft)}
.zimmer-option.sel{border-color:var(--green);background:var(--green-soft);border-left:3px solid var(--green)}

.link-box{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:14px}
.link-text{font-size:11.5px;color:var(--muted);font-family:monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.02em}

.loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:18px;background:var(--bg)}
.spinner{width:36px;height:36px;border:1px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:11px;color:var(--muted);letter-spacing:.3em;text-transform:uppercase;font-weight:400}

/* Progress bar */
.prog-bar{height:1px;background:var(--line)}
.prog-fill{height:100%;background:var(--gold);transition:width .5s ease}

/* Number badge in nav */
.nav-badge{background:var(--ink);color:var(--surface);font-size:9px;padding:2px 7px;border-radius:8px;font-weight:500;letter-spacing:.05em}
.nav-badge.warn{background:var(--warn)}

/* Desktop: Finanz-Tabellen sollen NICHT aus der Card überlaufen */
.finance-card-compact .finance-scroll-table-wrap { width: 100%; overflow-x: auto; }
.finance-card-compact .finance-scroll-table { width: 100%; }
.finance-card-compact .finance-scroll-table > table { width: 100%; table-layout: auto; }

/* ═══════════════════════════════════════════════════════════════
   📱 MOBILE OPTIMIZATIONS (iPhone, iPad portrait, Android phones)
   ═══════════════════════════════════════════════════════════════ */
@media (max-width: 768px) {
  /* ════════════════════════════════════════
     🍔 SIDEBAR → SLIDE-OUT DRAWER
     ════════════════════════════════════════ */
  .sidebar {
    position: fixed !important;
    top: 0;
    left: 0;
    bottom: 0;
    width: 260px !important;
    min-width: 260px !important;
    z-index: 1000;
    transform: translateX(-100%);
    transition: transform .25s ease;
    box-shadow: 4px 0 24px rgba(0,0,0,0);
  }
  .sidebar.open {
    transform: translateX(0);
    box-shadow: 4px 0 24px rgba(0,0,0,.15);
  }
  
  /* Mobile menu button (hamburger) - visible only on mobile */
  .mobile-menu-btn {
    display: flex !important;
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 999;
    width: 42px;
    height: 42px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
    color: var(--ink);
    font-size: 18px;
  }
  
  /* Sidebar overlay (darkens content when sidebar open) */
  .sidebar-overlay {
    display: block !important;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s ease;
  }
  .sidebar-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }
  
  /* Main content gets full width on mobile */
  .main {
    width: 100% !important;
    padding-top: 70px !important; /* room for hamburger button */
  }
  
  /* Show sidebar close X on mobile */
  .sidebar-close { display: block !important; }
  
  /* Body padding & layout */
  body { font-size: 14px; }
  .main { padding: 70px 12px 20px !important; }
  
  /* Navigation: tighter */
  .nav-wrap { padding: 10px 12px !important; gap: 4px !important; flex-wrap: wrap; }
  .nav-item { padding: 7px 10px !important; font-size: 10.5px !important; letter-spacing: .15em !important; }
  
  /* Cards: less padding, more breathing room between */
  .card { padding: 18px 16px !important; margin-bottom: 14px !important; border-radius: 10px !important; }
  .ct { font-size: 15px !important; margin-bottom: 12px !important; padding-bottom: 10px !important; }
  .pt { font-size: 22px !important; }
  .ps { font-size: 11px !important; }
  
  /* Buttons: bigger touch targets (Apple minimum 44px) */
  .btn { padding: 11px 14px !important; font-size: 11px !important; min-height: 40px; }
  .btn-sm { padding: 8px 12px !important; font-size: 10px !important; min-height: 36px; }
  
  /* ════════════════════════════════════════
     🔑 TABELLEN → KARTEN-LAYOUT auf Mobile
     ════════════════════════════════════════ */
  table, thead, tbody, tr, th, td { display: block; }
  thead { 
    position: absolute; 
    left: -9999px; 
    width: 1px; 
    height: 1px; 
    overflow: hidden;
  }
  tr {
    background: #fefcf7;
    border: 1px solid var(--line);
    border-radius: 8px;
    margin-bottom: 8px;
    padding: 10px 12px;
  }
  tr:hover td { background: transparent; }
  td {
    border: none !important;
    padding: 4px 0 !important;
    font-size: 13px !important;
    display: flex;
    justify-content: space-between;
    align-items: center;
    text-align: right;
  }
  td:before {
    content: attr(data-label);
    font-weight: 600;
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .12em;
    margin-right: 12px;
    text-align: left;
    flex-shrink: 0;
    display: inline-block;
  }
  /* Hide pseudo when no data-label is set */
  td:not([data-label]):before { content: ''; display: none; }
  /* First cell is the "header" of the card → full width, no flex */
  tr td:first-child {
    font-weight: 600;
    font-size: 14px !important;
    padding-bottom: 8px !important;
    margin-bottom: 6px;
    border-bottom: 1px solid var(--line-soft) !important;
    display: block;
    text-align: left;
  }
  tr td:first-child:before { display: none; }
  
  /* ════════════════════════════════════════
     💰 FINANZ-TABELLE: kompaktere Zeilen
     ════════════════════════════════════════ */
  .finance-card-compact table td,
  .finance-card-compact table th {
    padding-top: 6px !important;
    padding-bottom: 6px !important;
    font-size: 11.5px !important;
  }
  .finance-card-compact table th {
    padding-top: 8px !important;
    padding-bottom: 8px !important;
  }
  
  /* ════════════════════════════════════════
     💰 FINANZ-TABELLE: horizontal scrollen (NICHT als Karten)
     ════════════════════════════════════════ */
  .finance-scroll-table {
    overflow-x: auto !important;
    -webkit-overflow-scrolling: touch;
    /* visueller Hinweis für horizontales Scrollen */
    background: linear-gradient(to right, transparent 90%, rgba(26,24,20,0.05) 100%);
    border-radius: 8px;
    margin: 0 -2px;
  }
  .finance-scroll-table table { display: table !important; min-width: 820px !important; width: 820px !important; }
  .finance-scroll-table thead { 
    position: static !important; 
    left: auto !important; 
    width: auto !important; 
    height: auto !important; 
    overflow: visible !important; 
    display: table-header-group !important; 
  }
  .finance-scroll-table thead th {
    display: table-cell !important;
    background: #f6f1e8 !important;
    border-bottom: 2px solid var(--line) !important;
    padding: 10px 8px !important;
    font-size: 10px !important;
    font-weight: 700 !important;
    letter-spacing: .08em !important;
    text-transform: uppercase !important;
    color: #4a4439 !important;
    white-space: nowrap !important;
    text-align: left !important;
  }
  .finance-scroll-table tbody { display: table-row-group !important; }
  .finance-scroll-table tfoot { display: table-footer-group !important; }
  .finance-scroll-table tr {
    display: table-row !important;
    background: transparent !important;
    border: none !important;
    border-radius: 0 !important;
    margin: 0 !important;
    padding: 0 !important;
    border-bottom: 1px solid var(--line-soft) !important;
  }
  .finance-scroll-table td {
    display: table-cell !important;
    padding: 10px 8px !important;
    border: none !important;
    font-size: 11.5px !important;
    text-align: left !important;
    vertical-align: middle !important;
    white-space: nowrap !important;
  }
  .finance-scroll-table td:before {
    display: none !important;
    content: '' !important;
  }
  .finance-scroll-table tr td:first-child {
    font-weight: 600 !important;
    font-size: 12px !important;
    padding-bottom: 10px !important;
    margin-bottom: 0 !important;
    border-bottom: none !important;
    display: table-cell !important;
    text-align: left !important;
  }
  /* Rechtsbündige Zahlen-Spalten */
  .finance-scroll-table th[style*="right"],
  .finance-scroll-table td[style*="text-align:right"],
  .finance-scroll-table td[style*="text-align: right"] {
    text-align: right !important;
  }
  /* Scroll-Hint: kleiner Pfeil rechts */
  .finance-scroll-table-wrap {
    position: relative;
  }
  .finance-scroll-table-wrap::after {
    content: '→ scroll';
    position: absolute;
    top: 4px;
    right: 8px;
    font-size: 9px;
    color: #8a8174;
    letter-spacing: .1em;
    text-transform: uppercase;
    pointer-events: none;
    background: rgba(255,255,255,0.9);
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 600;
  }
  
  /* ════════════════════════════════════════
     📊 GRID LAYOUTS gestapelt
     ════════════════════════════════════════ */
  /* Mieter-Liste + Detail: gestapelt */
  div[style*="grid-template-columns:240px 1fr"],
  div[style*="grid-template-columns: 240px 1fr"] {
    display: block !important;
  }
  div[style*="grid-template-columns:240px 1fr"] > div:first-child,
  div[style*="grid-template-columns: 240px 1fr"] > div:first-child {
    margin-bottom: 14px;
    max-height: 280px;
    overflow-y: auto;
  }
  
  /* Bewerber-Liste + Detail: gestapelt */
  div[style*="grid-template-columns:280px 1fr"],
  div[style*="grid-template-columns: 280px 1fr"] {
    display: block !important;
  }
  div[style*="grid-template-columns:280px 1fr"] > div:first-child {
    margin-bottom: 14px;
    max-height: 280px;
    overflow-y: auto;
  }
  
  /* Dashboard-Karten: 1 spaltig */
  div[style*="grid-template-columns:repeat(3, 1fr)"],
  div[style*="grid-template-columns:repeat(2, 1fr)"],
  div[style*="grid-template-columns: repeat(3, 1fr)"],
  div[style*="grid-template-columns: repeat(2, 1fr)"] {
    grid-template-columns: 1fr !important;
  }
  
  /* Form-Rows: 1 spaltig */
  .frow { display: block !important; }
  .frow .fg { margin-bottom: 12px; }
  
  /* ════════════════════════════════════════
     📄 VERTRAG-MODAL: kompaktere Spacings
     ════════════════════════════════════════ */
  /* Section-Headers (uppercase Mini-Labels) auf Mobile kompakter */
  .modal div[style*="textTransform:\"uppercase\""],
  .modal div[style*="textTransform: uppercase"],
  .modal div[style*="text-transform:uppercase"],
  .modal div[style*="text-transform: uppercase"] {
    margin-top: 14px !important;
    margin-bottom: 6px !important;
    font-size: 9px !important;
    letter-spacing: .2em !important;
  }
  /* Erstes section-header in modal hat weniger top-margin */
  .modal .mt + div[style*="text-transform"] {
    margin-top: 0 !important;
  }
  /* Field-Labels enger an Inputs */
  .modal .fl {
    margin-bottom: 4px !important;
    font-size: 9px !important;
    letter-spacing: .2em !important;
  }
  .modal .fg {
    margin-bottom: 10px !important;
  }
  /* Modal-Inputs nicht zu fett gepolstert */
  .modal .fi {
    padding: 9px 12px !important;
    font-size: 14px !important;
  }
  /* Spezialfall: 2-Spalten-Grid für Mietzins-Aufstellung bleibt erhalten,
     aber kompakter */
  .modal div[style*="grid-template-columns:1fr 110px"],
  .modal div[style*="grid-template-columns: 1fr 110px"] {
    grid-template-columns: 1fr 90px !important;
    gap: 6px !important;
    font-size: 13px !important;
  }
  /* Mietzins-Aufstellung Container: kompakter padding */
  .modal div[style*="background:\"#fefcf7\""][style*="borderRadius:8"] {
    padding: 12px 14px !important;
  }
  /* Info-Boxen (z.B. "Vertrag ist BEFRISTET...") auf Mobile lesbar */
  .modal div[style*="background:\"#fefcf7\""][style*="border:\"1px solid"] {
    padding: 10px 12px !important;
    font-size: 12px !important;
    line-height: 1.5 !important;
  }
  
  /* Info-Grid: 1 spaltig */
  .igrid { grid-template-columns: 1fr !important; gap: 8px !important; }
  .ig { padding: 8px 0 !important; border-bottom: 1px solid var(--line-soft); }
  .ig label { font-size: 10px !important; }
  .ig span { font-size: 13px !important; }
  
  /* ════════════════════════════════════════
     🎨 MODALS auf Mobile = Full-Screen
     ════════════════════════════════════════ */
  .ov { padding: 0 !important; align-items: flex-start !important; }
  .modal {
    width: 100% !important;
    max-width: 100% !important;
    max-height: 100vh !important;
    height: 100vh !important;
    border-radius: 0 !important;
    padding: 20px 16px !important;
    overflow-y: auto !important;
  }
  .mt { font-size: 17px !important; margin-bottom: 16px !important; }
  .ma { flex-direction: column-reverse; gap: 8px; margin-top: 16px !important; }
  .ma .btn { width: 100% !important; justify-content: center; }
  
  /* Inputs: groesser, besser tippbar */
  .fi { padding: 12px 14px !important; font-size: 16px !important; min-height: 44px; }
  /* (16px Schriftgröße verhindert Auto-Zoom auf iOS) */
  .fl { font-size: 10px !important; margin-bottom: 4px !important; }
  
  /* ════════════════════════════════════════
     📑 TABS scrollbar machen
     ════════════════════════════════════════ */
  .tabs {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    flex-wrap: nowrap !important;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { white-space: nowrap; flex-shrink: 0; padding: 9px 14px !important; font-size: 10.5px !important; }
  
  /* Bewerber-Card kompakter */
  .bewerber-card { padding: 12px 14px !important; }
  
  /* Bdg ein bisschen kleiner */
  .bx { font-size: 9px !important; padding: 2px 7px !important; }
  
  /* Login-Card responsiv */
  .login-card { padding: 32px 24px !important; }
  
  /* Filter-Buttons immer mit Wrap */
  .row { flex-wrap: wrap; }
}

/* Extra small phones (iPhone SE etc.) */
@media (max-width: 768px) {
  /* ════════════════════════════════════════
     🔧 AGGRESSIVE FIX FOR OVERLAP & BREAKS
     ════════════════════════════════════════ */
  
  /* Force-wrap any flexbox that's space-between with buttons */
  .card > div[style*="flex"],
  .card > div > div[style*="flex"] {
    flex-wrap: wrap !important;
    gap: 8px !important;
  }
  
  /* Header-rows in cards (Name + Action-Buttons): always stack on mobile */
  .card > div[style*="space-between"] {
    flex-direction: column !important;
    align-items: flex-start !important;
    gap: 12px !important;
  }
  .card > div[style*="space-between"] > div {
    width: 100% !important;
  }
  
  /* Button-groups inside header-rows: wrap and full-width */
  .card div[style*="flex-end"],
  .card div[style*="flex-wrap"][style*="flex-end"] {
    justify-content: flex-start !important;
    flex-wrap: wrap !important;
    width: 100% !important;
  }
  
  /* Action buttons: bigger, more breathing */
  .btn-sm {
    padding: 9px 13px !important;
    font-size: 11px !important;
    min-height: 38px;
    flex: 0 0 auto;
  }
  
  /* Hero cards on Dashboard: stack */
  .main > div > div[style*="grid-template-columns:1fr 1fr 1fr"],
  .main > div > div[style*="grid-template-columns: 1fr 1fr 1fr"] {
    grid-template-columns: 1fr !important;
  }
  
  /* Inner finance card: stack 3 cols */
  div[style*="grid-template-columns:1fr 1fr 1fr"] {
    grid-template-columns: 1fr !important;
    gap: 8px !important;
  }
  
  /* Tabs: make scroll horizontally smoothly */
  .tabs {
    overflow-x: auto !important;
    flex-wrap: nowrap !important;
    white-space: nowrap;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 2px;
  }
  .tab {
    flex-shrink: 0;
    white-space: nowrap;
  }
  
  /* Tables: increase card spacing */
  tr {
    padding: 14px 14px !important;
    margin-bottom: 10px !important;
    background: #fefcf7 !important;
  }
  tr td:first-child {
    font-size: 15px !important;
  }
  
  /* Avatar + Name area in headers */
  .card div[style*="alignItems"][style*="gap"] {
    flex-wrap: wrap;
  }
  
  /* Fix: nav-wrap should NOT overflow */
  .nav-wrap {
    flex-wrap: wrap !important;
  }
  
  /* Long action button rows get equal width */
  .card div[style*="flex-end"] .btn,
  .card div[style*="flex-end"] .btn-sm {
    flex: 1 1 auto;
    min-width: 0;
    justify-content: center;
  }
  
  /* Modal close button visible */
  .modal h2, .modal .mt {
    padding-right: 50px;
  }
  
  /* Side-panels in 2-column grid: stack */
  div[style*="grid-template-columns:1fr 1fr"]:not(.frow) {
    grid-template-columns: 1fr !important;
    gap: 14px !important;
  }
  
  /* ════════════════════════════════════════
     🚨 ALL GRIDS MUST STACK ON MOBILE
     ════════════════════════════════════════ */
  .dash-hero { grid-template-columns: 1fr !important; }
  .finance-grid { grid-template-columns: 1fr !important; }
  .sg { grid-template-columns: 1fr 1fr !important; gap: 1px !important; }
  .sc { padding: 16px 14px !important; }
  .sc .sv { font-size: 20px !important; }
  .sc .sl { font-size: 9px !important; }
  .sc .sn { font-size: 10px !important; }
  
  /* List + Detail grids: stack on mobile */
  .list-detail {
    display: block !important;
    grid-template-columns: none !important;
  }
  .list-detail > div:first-child {
    max-height: 320px !important;
    overflow-y: auto !important;
    margin-bottom: 16px !important;
    width: 100% !important;
  }
  .list-detail > div:nth-child(2) {
    width: 100% !important;
    min-width: 0 !important;
  }
  
  /* ════════════════════════════════════════
     🎯 DETAIL HEADERS (Wohnung/Mieter/Bewerber)
     ════════════════════════════════════════ */
  .detail-header {
    flex-direction: column !important;
    align-items: stretch !important;
    gap: 12px !important;
  }
  .detail-header > div:first-child {
    width: 100% !important;
    flex: 1 1 100% !important;
  }
  .detail-actions {
    width: 100% !important;
    justify-content: flex-start !important;
    gap: 6px !important;
    display: grid !important;
    grid-template-columns: 1fr 1fr !important;
  }
  .detail-actions .btn,
  .detail-actions .btn-sm {
    min-width: 0;
    justify-content: center;
    font-size: 10.5px !important;
    white-space: normal;
    line-height: 1.2;
    text-align: center;
    padding: 10px 8px !important;
  }
  
  /* Cards: no horizontal overflow */
  .card { 
    overflow-x: hidden;
    max-width: 100%;
  }
  
  /* Prevent any element from breaking layout */
  * { max-width: 100%; }
  .main { 
    overflow-x: hidden;
    padding-top: 70px !important; /* more space for hamburger */
  }
  
  /* All info-grid columns to stack */
  .igrid {
    grid-template-columns: 1fr !important;
    gap: 4px !important;
  }
  
  /* Document checklist: stack columns */
  .card div[style*="repeat(2"] {
    grid-template-columns: 1fr !important;
  }
}

/* ═══ Mobile Fixes v2: Detail-Seiten Layout-Reparatur ═══ */

@media (max-width: 768px) {
  /* Modal-Overlay über Hamburger: damit Hamburger nicht über Vertrag-Modal etc. greift */

  .modal { padding-top: 28px !important; }
}

@media (max-width: 768px) {
  
  /* ─── 2-Spalten Detail-Layouts: STACK alle Varianten ─── */
  div[style*="gridTemplateColumns:\"240px 1fr\""],
  div[style*="gridTemplateColumns:\"260px 1fr\""],
  div[style*="gridTemplateColumns:\"280px 1fr\""],
  div[style*="grid-template-columns:240px 1fr"],
  div[style*="grid-template-columns: 240px 1fr"],
  div[style*="grid-template-columns:260px 1fr"],

  }
  /* Linke Spalte (Avatar/Foto/Sidebar) auf Mobile schmaler + zentriert */
  div[style*="gridTemplateColumns:\"240px 1fr\""] > div:first-child,
  div[style*="gridTemplateColumns:\"260px 1fr\""] > div:first-child,
  div[style*="gridTemplateColumns:\"280px 1fr\""] > div:first-child {

    width: 100% !important;

  /* ─── Label|Value 1fr 110px Grids (Vertrag-Konditionen, Preis-Listen) ─── */
  div[style*="gridTemplateColumns:\"1fr 110px\""],
  div[style*="grid-template-columns:1fr 110px"],
  div[style*="grid-template-columns: 1fr 110px"] {
    grid-template-columns: 1fr auto !important;
    gap: 10px !important;
  }
  
  /* ─── 1fr 1fr → stack (zwei Felder nebeneinander) ─── */
  /* Vorsicht: nicht ALLE 1fr 1fr — nur die in Formularen / Detail-Bereichen */
  .card div[style*="gridTemplateColumns:\"1fr 1fr\""],
  .card div[style*="grid-template-columns:1fr 1fr"],
  .card div[style*="grid-template-columns: 1fr 1fr"] {
    grid-template-columns: 1fr !important;
    gap: 12px !important;
  }
  
  /* ─── 60px 1fr 110px 80px (Tabellen-ähnliche Zeilen) ─── */
  div[style*="gridTemplateColumns:\"60px 1fr 110px 80px\""],
  div[style*="grid-template-columns:60px 1fr 110px 80px"] {
    grid-template-columns: 60px 1fr !important;
    grid-template-rows: auto auto !important;
    gap: 4px 8px !important;
  }
  /* Die letzten 2 Spalten (Preis + Status) auf neue Zeile, span beide cols */
  div[style*="gridTemplateColumns:\"60px 1fr 110px 80px\""] > *:nth-child(3),
  div[style*="gridTemplateColumns:\"60px 1fr 110px 80px\""] > *:nth-child(4) {
    grid-column: 2 !important;
  }
  
  /* ─── 3-Spalten 1fr 1fr 1fr → stack auf einzelne Spalten ─── */
  div[style*="gridTemplateColumns:\"1fr 1fr 1fr\""],
  div[style*="grid-template-columns:1fr 1fr 1fr"] {
    grid-template-columns: 1fr !important;
    gap: 10px !important;
  }
  
  /* ─── Modals: full-width mit margin auf Mobile ─── */
  .modal {
    width: calc(100vw - 20px) !important;
    max-width: 100% !important;
    padding: 24px 20px !important;
    border-radius: 14px !important;
    max-height: 90vh !important;
    margin: 0 10px !important;
  }
  
  /* ─── Formular-Zeilen .frow/.igrid: stack ─── */
  .frow,
  .igrid {
    grid-template-columns: 1fr !important;
    gap: 12px !important;
  }
  
  /* ─── Status-Grids in Header (.sg) — auf 2x2 statt 1x4 ─── */
  .sg {
    grid-template-columns: 1fr 1fr !important;
  }
  
  /* ─── Tabellen mit min-width: horizontal scrollbar + sticky first col ─── */
  .finance-scroll-table,
  .scroll-table-wrapper {
    overflow-x: auto !important;
    -webkit-overflow-scrolling: touch !important;
  }
  
  /* ─── Lange Buttons mit Text + Icon → kompakter ─── */
  .btn,
  button[class*="btn"]:not(.btn-sm) {
    font-size: 13px !important;
    padding: 10px 14px !important;
  }
  
  /* ─── Cards: weniger Padding für mehr Content-Platz ─── */
  .card {
    padding: 16px !important;
    border-radius: 10px !important;
  }
  
  /* ─── Long-text overflow: ellipsis statt overflow ─── */
  .card .name,
  .card .title,
  td:first-child {
    overflow: hidden;
    text-overflow: ellipsis;
    word-break: break-word;
  }
  
  /* ─── Button-Reihen am Card-Header (z.B. Bewerber-Card Actions) ─── */
  /* Alle Buttons sollen einen vollen Tap-Target haben */
  button {
    min-height: 38px;
  }
  
  /* ─── Tabs unten am Bildschirm: scrollbar ─── */
  .tabs {
    overflow-x: auto !important;
    flex-wrap: nowrap !important;
    -webkit-overflow-scrolling: touch !important;
    padding: 4px 2px 6px !important;
  }
  .tab {
    flex-shrink: 0 !important;
    white-space: nowrap !important;
    font-size: 13px !important;
    padding: 10px 14px !important;
  }
  
  /* ─── Modal Button-Reihen (.ma class): nicht wrappen, stacken ─── */
  .modal .ma {
    flex-direction: column-reverse !important;
    flex-wrap: nowrap !important;
    gap: 8px !important;
    align-items: stretch !important;
  }
  .modal .ma .btn,
  .modal .ma button {
    width: 100% !important;
    justify-content: center !important;
    min-height: 44px !important;
  }
  /* Inline style="width:600" auf Vertrag-Modal überschreiben */
  .modal[style*="width:600"],
  .modal[style*="width: 600"] {
    width: calc(100vw - 20px) !important;
    max-width: 100% !important;
  }
  
  /* ─── Eingabefelder größer für besseres Touch ─── */
  input, select, textarea {
    font-size: 16px !important; /* verhindert iOS Auto-Zoom */
    padding: 12px 14px !important;
    min-height: 44px !important;
  }
  textarea { min-height: 80px !important; }
}

/* ─── Extra-klein (< 380px): noch aggressiveres Layout ─── */
@media (max-width: 380px) {
  .main { padding: 64px 8px 16px !important; }
  .card { padding: 12px !important; }
  h1, h2 { font-size: 20px !important; }
  .btn-sm { padding: 7px 10px !important; font-size: 10px !important; }
  .modal { padding: 18px 14px !important; }
}

</style>

function evSplitStreet(adresse){
  if(!adresse) return ["",""];
  const m = String(adresse).trim().match(/^(.*?)[\s,]+(\d+\s*[a-zA-Z]?)$/);
  if(m) return [m[1].trim(), m[2].replace(/\s+/g,"")];
  return [String(adresse).trim(), ""];
}
function evGender(g){
  const s=(g||"").toLowerCase().trim();
  if(s.startsWith("mann")||s==="m"||s.startsWith("männlich")||s.startsWith("maennlich")) return "Mann";
  if(s.startsWith("frau")||s==="f"||s==="w"||s.startsWith("weiblich")) return "Frau";
  return s ? "Divers" : "";
}
function evDMY(s){
  if(!s) return "";
  const str=String(s).trim();
  if(/^\d{2}\.\d{2}\.\d{4}$/.test(str)) return str;
  const m=str.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return `${m[3]}.${m[2]}.${m[1]}`;
  return str;
}

// parseD: parses DD.MM.YYYY or YYYY-MM-DD, returns Date or null
function parseD(s) {
  if (!s) return null;
  const t = String(s).trim();
  if (/^\d{1,2}\.\d{1,2}\.\d{4}$/.test(t)) {
    const [d,m,y] = t.split('.').map(n => parseInt(n,10));
    const dt = new Date(y, m-1, d);
    return isNaN(dt) ? null : dt;
  }
  if (/^\d{4}-\d{2}-\d{2}$/.test(t)) {
    const dt = new Date(t);
    return isNaN(dt) ? null : dt;
  }
  return null;
}
// fmtDateDE: zeigt Datum als TT.MM.JJJJ, akzeptiert beliebige Input-Formate
function toDateInputValue(v) {
  // Normalisiert verschiedene Datumsformate zu YYYY-MM-DD fuer <input type="date">
  if (!v) return "";
  const s = String(v).trim();
  if (!s) return "";
  // ISO 2020-05-15 oder 2020-05-15T12:00:00
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.substring(0, 10);
  // Deutsches Format: 15.05.2020
  const m = s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
  if (m) {
    return `${m[3]}-${String(m[2]).padStart(2,"0")}-${String(m[1]).padStart(2,"0")}`;
  }
  // Fallback: als Date parsen
  const d = new Date(s);
  if (!isNaN(d.getTime())) return d.toISOString().substring(0, 10);
  return "";
}

function fmtDateDE(input) {
  if (!input) return "";
  const s = String(input).trim();
  if (!s) return "";
  // Bereits im TT.MM.JJJJ Format?
  if (/^\d{1,2}\.\d{1,2}\.\d{4}$/.test(s)) {
    const [d,m,y] = s.split(".").map(n => parseInt(n,10));
    if (m>=1 && m<=12 && d>=1 && d<=31) {
      return `${String(d).padStart(2,'0')}.${String(m).padStart(2,'0')}.${y}`;
    }
  }
  // YYYY-MM-DD Format?
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
    const [y,m,d] = s.substring(0,10).split("-").map(n => parseInt(n,10));
    if (m>=1 && m<=12 && d>=1 && d<=31) {
      return `${String(d).padStart(2,'0')}.${String(m).padStart(2,'0')}.${y}`;
    }
  }
  // Fallback: versuche Date-Parsing
  const dt = new Date(s);
  if (!isNaN(dt) && dt.getFullYear() > 1900 && dt.getFullYear() < 2100) {
    return dt.toLocaleDateString("de-CH");
  }
  return s; // wenn nichts geht, original String zurückgeben (statt "Invalid Date")
}

// Normalize room size input: "14" → "14 m²", "14m2" → "14 m²", "14 qm" → "14 m²", "" → ""
function formatGroesse(input) {
  if (!input) return "";
  const str = String(input).trim();
  if (!str) return "";
  // Extract just the numeric value
  const match = str.match(/^(\d+(?:[.,]\d+)?)/);
  if (!match) return str; // No number found - return as-is
  const num = match[1].replace(",", ".");
  return `${num} m²`;
}

// Email-Validierung (RFC-5322 vereinfacht)
function validateEmail(v) {
  if (!v) return { ok: true, value: "" };
  const trimmed = String(v).trim().toLowerCase();
  const re = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
  if (!re.test(trimmed)) return { ok: false, value: trimmed, error: "Ungültige E-Mail-Adresse" };
  return { ok: true, value: trimmed };
}

// Telefon-Validierung (CH/international)
function validatePhone(v) {
  if (!v) return { ok: true, value: "" };
  // Nur Zahlen, +, Leerzeichen erlauben
  const cleaned = String(v).replace(/[^\d+\s]/g, "").trim();
  // Mindestens 9 Ziffern (CH Mobile: 7891234567 = 10 Ziffern, ohne 0: 9)
  const digits = cleaned.replace(/\D/g, "");
  if (digits.length < 9) return { ok: false, value: cleaned, error: "Telefonnummer zu kurz (mind. 9 Ziffern)" };
  if (digits.length > 15) return { ok: false, value: cleaned, error: "Telefonnummer zu lang" };
  return { ok: true, value: cleaned };
}

// Format Schweizer Telefonnummer schön: 0781234567 → 078 123 45 67
function formatPhoneCH(v) {
  if (!v) return "";
  const digits = String(v).replace(/\D/g, "");
  // CH mobile/landline ohne Vorwahl: 0781234567 (10 Ziffern, beginnt mit 0)
  if (digits.length === 10 && digits[0] === "0") {
    return `${digits.slice(0,3)} ${digits.slice(3,6)} ${digits.slice(6,8)} ${digits.slice(8,10)}`;
  }
  // CH mit Landesvorwahl: +41781234567 oder 41781234567 (11-12 Ziffern)
  if (digits.length === 11 && digits.startsWith("41")) {
    return `+41 ${digits.slice(2,4)} ${digits.slice(4,7)} ${digits.slice(7,9)} ${digits.slice(9,11)}`;
  }
  // Sonst: original mit + falls vorhanden
  return String(v).replace(/[^\d+\s]/g, "").trim();
}

// Datum-Validierung (DD.MM.YYYY)
function validateDate(v, opts = {}) {
  if (!v) return { ok: true, value: "" };
  const trimmed = String(v).trim();
  // Akzeptiere DD.MM.YYYY oder YYYY-MM-DD
  let day, month, year;
  if (/^\d{1,2}\.\d{1,2}\.\d{4}$/.test(trimmed)) {
    const [d, m, y] = trimmed.split(".").map(n => parseInt(n, 10));
    day = d; month = m; year = y;
  } else if (/^\d{4}-\d{2}-\d{2}$/.test(trimmed)) {
    const [y, m, d] = trimmed.split("-").map(n => parseInt(n, 10));
    day = d; month = m; year = y;
  } else {
    return { ok: false, value: trimmed, error: "Format: TT.MM.JJJJ" };
  }
  
  if (month < 1 || month > 12) return { ok: false, value: trimmed, error: "Monat ungültig (1-12)" };
  if (day < 1 || day > 31) return { ok: false, value: trimmed, error: "Tag ungültig (1-31)" };
  if (year < 1900 || year > 2100) return { ok: false, value: trimmed, error: "Jahr ungültig" };
  
  // Tatsächlich gültiges Datum prüfen (z.B. 31.02. wäre invalid)
  const dt = new Date(year, month - 1, day);
  if (dt.getDate() !== day || dt.getMonth() !== month - 1 || dt.getFullYear() !== year) {
    return { ok: false, value: trimmed, error: "Datum existiert nicht" };
  }
  
  // Geburtstag-spezifische Checks
  if (opts.type === "birthday") {
    const today = new Date();
    const age = (today - dt) / (1000 * 60 * 60 * 24 * 365.25);
    if (age < 0) return { ok: false, value: trimmed, error: "Geburtstag in der Zukunft?" };
    if (age < 16) return { ok: false, value: trimmed, error: "Mindestalter 16 Jahre" };
    if (age > 120) return { ok: false, value: trimmed, error: "Alter unrealistisch (>120)" };
  }
  
  // Auf DD.MM.YYYY normalisieren
  const normalized = `${String(day).padStart(2,'0')}.${String(month).padStart(2,'0')}.${year}`;
  return { ok: true, value: normalized };
}

// PLZ-Validierung
function validatePLZ(v) {
  if (!v) return { ok: true, value: "" };
  const trimmed = String(v).trim();
  // CH: 4 Ziffern (1000-9999)
  if (/^\d{4}$/.test(trimmed)) {
    const n = parseInt(trimmed, 10);
    if (n >= 1000 && n <= 9999) return { ok: true, value: trimmed };
  }
  // International: erlaubt 3-10 alphanumerisch
  if (/^[A-Z0-9 -]{3,10}$/i.test(trimmed)) return { ok: true, value: trimmed.toUpperCase() };
  return { ok: false, value: trimmed, error: "PLZ ungültig (4 Ziffern für CH)" };
}

// Nicht-negative Zahl
function validateNumber(v, opts = {}) {
  if (v === "" || v === null || v === undefined) return { ok: true, value: "" };
  const n = Number(String(v).replace(",", "."));
  if (isNaN(n)) return { ok: false, value: v, error: "Keine gültige Zahl" };
  if (opts.min !== undefined && n < opts.min) return { ok: false, value: v, error: `Mindestwert: ${opts.min}` };
  if (opts.max !== undefined && n > opts.max) return { ok: false, value: v, error: `Höchstwert: ${opts.max}` };
  if (opts.integer && !Number.isInteger(n)) return { ok: false, value: v, error: "Nur ganze Zahlen" };
  return { ok: true, value: n };
}

  // Ändere Mieter-ID inkl. allen Foreign-Key-Bezügen (rooms.tenant_id)
  async function renameTenantId(oldId, newId) {
    if (oldId === newId) return true;
    // 1. Prüfen ob neue ID existiert
    const existing = tenants.find(t => t.id === newId);
    if (existing) {
      alert(`Mieter-ID "${newId}" existiert bereits (${existing.vorname} ${existing.nachname}).`);
      return false;
    }
    // 2. Format prüfen
    if (!/^T\d{2,}$/.test(newId)) {
      alert(`Mieter-ID muss Format T01, T02, … haben (gross-T + Zahl).`);
      return false;
    }
    // 3. Rooms: tenant_id auf NULL setzen (FK-Constraint umgehen)
    const linkedRoomsBefore = rooms.filter(r => r.tenantId === oldId).map(r => r.id);
    if (linkedRoomsBefore.length > 0) {
      const {error: e1} = await supabase.from("rooms").update({tenant_id: null}).eq("tenant_id", oldId);
      if (e1) { alert("Schritt 1 fehlgeschlagen: " + e1.message); return false; }
    }
    // 4. Tenant-ID ändern
    const {error: e2} = await supabase.from("tenants").update({id: newId}).eq("id", oldId);
    if (e2) {
      // Rollback: rooms re-link versuchen
      for (const rid of linkedRoomsBefore) {
        await supabase.from("rooms").update({tenant_id: oldId}).eq("id", rid);
      }
      alert("ID-Änderung fehlgeschlagen: " + e2.message);
      return false;
    }
    // 5. Rooms: tenant_id auf neue ID setzen
    for (const rid of linkedRoomsBefore) {
      const {error: e3} = await supabase.from("rooms").update({tenant_id: newId}).eq("id", rid);
      if (e3) console.error("Re-link room failed:", e3);
    }
    // 6. Local state aktualisieren
    setTenants(p => p.map(t => t.id === oldId ? {...t, id: newId} : t));
    setRooms(p => p.map(r => r.tenantId === oldId ? {...r, tenantId: newId} : r));
    return true;
  }

  async function uploadDocument(entityType, entityId, category, file) {
    if (!file) throw new Error("Keine Datei");
    if (file.size > 25 * 1024 * 1024) throw new Error("Datei zu groß (max. 25 MB)");
    
    const ext = file.name.split('.').pop().toLowerCase();
    
    // Build smart filename: e.g. "A6_Hauptmietvertrag.pdf" or "Berger_Anna_Untermietvertrag.pdf"
    function sanitize(str) {
      return (str || "")
        .replace(/[äÄ]/g, "ae").replace(/[öÖ]/g, "oe").replace(/[üÜ]/g, "ue").replace(/[ß]/g, "ss")
        .replace(/[^a-zA-Z0-9_-]/g, "_")
        .replace(/_+/g, "_")
        .replace(/^_|_$/g, "");
    }
    
    let baseName;
    if (entityType === "apartment") {
      baseName = `${sanitize(entityId)}_${sanitize(category)}`;
    } else {
      // For tenants: use Nachname_Vorname
      const tenant = tenants.find(t => t.id === entityId);
      if (tenant) {
        baseName = `${sanitize(tenant.nachname)}_${sanitize(tenant.vorname)}_${sanitize(category)}`;
      } else {
        baseName = `${sanitize(entityId)}_${sanitize(category)}`;
      }
    }
    
    // Check for collisions, append _2, _3, etc.
    const {data: existing} = await supabase.from("documents")
      .select("filename")
      .eq("entity_type", entityType)
      .eq("entity_id", entityId);
    
    let finalName = `${baseName}.${ext}`;
    let counter = 2;
    const usedNames = new Set((existing || []).map(d => d.filename.toLowerCase()));
    while (usedNames.has(finalName.toLowerCase())) {
      finalName = `${baseName}_${counter}.${ext}`;
      counter++;
    }
    
    const ts = Date.now();
    const path = `${entityType}/${entityId}/${ts}_${finalName}`;
    const {error: upErr} = await supabase.storage.from("documents").upload(path, file);
    if (upErr) throw upErr;
    const user = (await supabase.auth.getUser()).data.user;
    const {data, error} = await supabase.from("documents").insert([{
      entity_type: entityType,
      entity_id: entityId,
      category,
      filename: finalName,
      storage_path: path,
      file_size: file.size,
      mime_type: file.type || `application/${ext}`,
      uploaded_by: user?.email || "unknown",
    }]).select().single();
    if (error) throw error;
    setDocuments(p => [data, ...p]);
    return data;
  }

function fileSize(bytes) {
  if (!bytes) return "-";
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + " KB";
  return (bytes/(1024*1024)).toFixed(1) + " MB";
}

function fileIcon(mime, filename) {
  const ext = (filename||"").split('.').pop().toLowerCase();
  if (mime?.includes("pdf") || ext === "pdf") return "📄";
  if (mime?.includes("image") || ["jpg","jpeg","png","gif","webp"].includes(ext)) return "🖼️";
  if (mime?.includes("word") || ["doc","docx"].includes(ext)) return "📝";
  if (mime?.includes("excel") || mime?.includes("sheet") || ["xls","xlsx","csv"].includes(ext)) return "📊";
  return "📎";
}

// ─── PdfPreview: render first page of a PDF as inline image ─────────────
const _pdfPreviewCache = new Map();
function _ensurePdfJsAdmin(){
  return new Promise((resolve, reject) => {
    if (window.pdfjsLib){
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      resolve(window.pdfjsLib);
      return;
    }
    let tries = 0;
    const check = setInterval(() => {
      if (window.pdfjsLib){
        clearInterval(check);
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        resolve(window.pdfjsLib);
      } else if (++tries > 50){
        clearInterval(check);
        reject(new Error("pdf.js not loaded"));
      }
    }, 100);
  });
}
async function _renderPdfPreviewAdmin(url){
  if (_pdfPreviewCache.has(url)) return _pdfPreviewCache.get(url);
  const p = (async () => {
    const pdfjs = await _ensurePdfJsAdmin();
    const pdf = await pdfjs.getDocument(url).promise;
    const page = await pdf.getPage(1);
    const viewport = page.getViewport({ scale: 1.5 });
    const canvas = document.createElement("canvas");
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext("2d");
    await page.render({ canvasContext: ctx, viewport }).promise;
    return canvas.toDataURL("image/png");
  })();
  _pdfPreviewCache.set(url, p);
  return p;
}
function PdfPreview({url}){
  const [src, setSrc] = useState(null);
  const [err, setErr] = useState(false);
  useEffect(() => {
    let cancelled = false;
    _renderPdfPreviewAdmin(url).then(d => { if (!cancelled) setSrc(d); }).catch(e => { console.warn(e); if (!cancelled) setErr(true); });
    return () => { cancelled = true; };
  }, [url]);
  if (err) return <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",color:"#8a8174",fontSize:11,gap:2}}><span style={{fontSize:28}}>📄</span><span style={{fontWeight:600,letterSpacing:".04em"}}>PDF</span></div>;
  if (!src) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:"#8a8174",fontSize:11,fontStyle:"italic"}}>📄 lädt…</div>;
  return <img src={src} alt="PDF Vorschau" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>;
}

  async function resizeImageClient(file, maxDim){
    // Skip non-resizable formats
    const nameLow = file.name.toLowerCase();
    const isPdf = file.type === "application/pdf" || nameLow.endsWith(".pdf");
    const isSvg = file.type === "image/svg+xml" || nameLow.endsWith(".svg");
    const isHeic = nameLow.endsWith(".heic") || nameLow.endsWith(".heif") || file.type === "image/heic" || file.type === "image/heif";
    if (isPdf || isSvg || isHeic) return file;
    // Skip already-small files
    if (file.size < 400 * 1024) return file;
    return new Promise((resolve) => {
      const img = new Image();
      const objUrl = URL.createObjectURL(file);
      img.onload = () => {
        URL.revokeObjectURL(objUrl);
        const { width, height } = img;
        if (width <= maxDim && height <= maxDim) {
          resolve(file);
          return;
        }
        const scale = Math.min(maxDim / width, maxDim / height);
        const newW = Math.round(width * scale);
        const newH = Math.round(height * scale);
        const canvas = document.createElement("canvas");
        canvas.width = newW;
        canvas.height = newH;
        const ctx = canvas.getContext("2d");
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";
        ctx.drawImage(img, 0, 0, newW, newH);
        canvas.toBlob((blob) => {
          if (!blob) { resolve(file); return; }
          // Use new file with .jpg extension
          const newName = file.name.replace(/\.[^.]+$/, "") + ".jpg";
          const newFile = new File([blob], newName, { type: "image/jpeg", lastModified: Date.now() });
          resolve(newFile);
        }, "image/jpeg", 0.85);
      };
      img.onerror = () => { URL.revokeObjectURL(objUrl); resolve(file); };
      img.src = objUrl;
    });
  }
  
  async function uploadBatch(files){
    if (!files || files.length === 0) return;
    setUploading(true);
    const errors = [];
    const uploaded = [];
    let totalSavedBytes = 0;
    try {
      for (let i = 0; i < files.length; i++) {
        let file = files[i];
        const origSize = file.size;
        // Client-side resize: shrink to max 1600px before upload
        try {
          file = await resizeImageClient(file, 1600);
          if (file.size < origSize) totalSavedBytes += (origSize - file.size);
        } catch(e) { console.warn("Resize failed for", file.name, e); }
        const nameLow = file.name.toLowerCase();
        const isPdf = file.type === "application/pdf" || nameLow.endsWith(".pdf");
        const isHeic = nameLow.endsWith(".heic") || nameLow.endsWith(".heif") || file.type === "image/heic" || file.type === "image/heif";
        const isImage = file.type.startsWith("image/") || isHeic;
        if (!isImage && !isPdf){ errors.push(`${file.name}: Format nicht erlaubt (Bilder + PDF)`); continue; }
        // Generous 15 MB limit for everything
        if (file.size > 15 * 1024 * 1024){ errors.push(`${file.name}: zu groß (>15 MB)`); continue; }
        const ext = (file.name.split(".").pop() || (isPdf ? "pdf" : "jpg")).toLowerCase();
        const ts = Date.now() + "-" + Math.random().toString(36).substr(2,7) + "-" + i;
        const path = `apartments/${apt.id}/${ts}.${ext}`;
        try {
          // Use a safe content type — HEIC files may have empty file.type in some browsers
          let contentType = file.type;
          if (isPdf) contentType = "application/pdf";
          else if (isHeic && !contentType) contentType = "image/heic";
          else if (!contentType) contentType = "image/jpeg";
          const { error: upErr } = await supabase.storage.from("assets").upload(path, file, { contentType, upsert: false });
          if (upErr) { errors.push(`${file.name}: ${upErr.message}`); continue; }
          uploaded.push(path);
        } catch (e) {
          errors.push(`${file.name}: ${e.message || e}`);
        }
      }
      // Single DB update with ALL new photos appended; auto-tag PDFs as grundriss
      if (uploaded.length > 0) {
        const start = photos.length;
        const newEntries = uploaded.map((p, i) => ({
          path: p,
          sort_order: start + i,
          category: p.toLowerCase().endsWith(".pdf") ? "grundriss" : null,
        }));
        await editApt(apt.id, { photos: [...photos, ...newEntries] });
      }
      if (errors.length > 0) {
        alert((uploaded.length > 0 ? `${uploaded.length} Datei(en) hochgeladen.\n\n` : "") + `${errors.length} Fehler:\n${errors.join("\n")}`);
      } else if (uploaded.length > 0 && totalSavedBytes > 200 * 1024) {
        // Subtle success — only show savings if meaningful
        const mb = (totalSavedBytes / (1024 * 1024)).toFixed(1);
        console.log(`Saved ${mb} MB by resizing ${uploaded.length} image(s)`);
      }
    } finally {
      setUploading(false);
    }
  }
  
  async function handleFileSelect(e){
    const files = [...e.target.files];
    e.target.value = "";
    await uploadBatch(files);
  }
  
  function handleDragOver(e){ e.preventDefault(); e.stopPropagation(); setDragOver(true); }
  function handleDragLeave(e){ e.preventDefault(); e.stopPropagation(); setDragOver(false); }
  async function handleDrop(e){
    e.preventDefault(); e.stopPropagation(); setDragOver(false);
    const files = [...e.dataTransfer.files];
    await uploadBatch(files);
  }
  
  async function deletePhoto(idx){
    if (!confirm("Foto wirklich löschen?")) return;
    const p = photos[idx];
    try {
      await supabase.storage.from("assets").remove([p.path]);

    const nextPhotos = photos.filter((_,i) => i !== idx).map((p,i) => ({...p, sort_order: i}));
    await editApt(apt.id, { photos: nextPhotos });
  }

    try {

    } catch(e){
      alert("Speichern fehlgeschlagen: " + (e.message || e));
    } finally {

    }
  }

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <div style={{fontSize:9.5,color:"#8a8174",textTransform:"uppercase",letterSpacing:".25em",fontWeight:500}}>📷 Medien hochladen</div>
          {photos.filter(p=>!p.category).length > 0 && <span style={{fontSize:10.5,color:"#b8843e",background:"#fdf7e8",padding:"3px 9px",borderRadius:10,fontWeight:600,border:"1px solid #e8d2a8"}}>{photos.filter(p=>!p.category).length} ohne Zuordnung</span>}
        </div>
        <div style={{fontSize:11,color:"#6a6258",marginBottom:10,lineHeight:1.5}}>1. Mehrere Fotos + PDF-Grundrisse gleichzeitig hochladen.<br/>2. Anschließend pro Datei unten Küche, Bad, Zimmer 1, Grundriss etc. zuordnen.</div>

function DocumentsManager({entityType, entityId, documents, uploadDocument, getDocumentUrl, deleteDocument}){
  const [uploading, setUploading] = useState(false);
  const [selCategory, setSelCategory] = useState("");
  const [dragOver, setDragOver] = useState(false);
  const fileInputRef = React.useRef(null);
  const docs = (documents||[]).filter(d => d.entity_type === entityType && d.entity_id === entityId);
  const signedBases = new Set(docs.filter(d=>/\(unterzeichnet\)/i.test(d.category||"")).map(d=>(d.category||"").replace(/\s*\(unterzeichnet\)\s*/i,"").trim().toLowerCase()));
  const shownDocs = docs.filter(d => /\(unterzeichnet\)/i.test(d.category||"") || !signedBases.has((d.category||"").trim().toLowerCase()));
  const categories = entityType === "apartment" ? APT_CATEGORIES : (entityType === "applicant" ? APPLICANT_CATEGORIES : TENANT_CATEGORIES);
  
  async function uploadFile(file) {
    if (!file) return;
    if (!selCategory) { alert("Bitte zuerst eine Kategorie wählen."); return; }
    setUploading(true);
    try {
      await uploadDocument(entityType, entityId, selCategory, file);
      setSelCategory("");
    } catch (err) {
      alert("Upload fehlgeschlagen: " + (err.message || err));
      console.error(err);
    } finally {
      setUploading(false);
    }
  }
  
  async function handleFileSelect(e) {
    const files = [...e.target.files];
    if (files.length === 0) return;
    if (!selCategory) { alert("Bitte zuerst eine Kategorie wählen."); e.target.value = ""; return; }
    for (const file of files) {
      await uploadFile(file);
    }
    e.target.value = "";
  }
  
  function handleDragOver(e) {
    e.preventDefault();
    e.stopPropagation();
    if (!selCategory) return;
    setDragOver(true);
  }
  
  function handleDragLeave(e) {
    e.preventDefault();
    e.stopPropagation();
    setDragOver(false);
  }
  
  async function handleDrop(e) {
    e.preventDefault();
    e.stopPropagation();
    setDragOver(false);
    if (!selCategory) {
      alert("Bitte zuerst eine Kategorie wählen.");
      return;
    }
    const files = [...e.dataTransfer.files];
    for (const file of files) {
      await uploadFile(file);
    }
  }
  
  async function handleView(doc) {
    const url = await getDocumentUrl(doc.storage_path);
    if (url) window.open(url, "_blank");
    else alert("Dokument konnte nicht geöffnet werden.");
  }
  
  async function handleDownload(doc) {
    const url = await getDocumentUrl(doc.storage_path);
    if (!url) { alert("Download nicht möglich."); return; }
    const a = document.createElement("a");
    a.href = url;
    a.download = doc.filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
  
  async function handleDelete(doc) {
    if (!confirm(`Dokument "${doc.filename}" wirklich löschen?`)) return;
    try {
      await deleteDocument(doc);
    } catch (err) {
      alert("Löschen fehlgeschlagen: " + (err.message || err));
    }
  }
  
  return (
    <div>
      <div 
        onDragOver={handleDragOver}
        onDragLeave={handleDragLeave}
        onDrop={handleDrop}
        style={{
          background: dragOver ? "#f5efe4" : "#fefcf7",
          border: dragOver ? "2px dashed #1a1a1a" : "1px solid #e1d8c5",
          borderRadius: 8,
          padding: "14px 16px",
          marginBottom: 14,
          transition: "all .15s ease"
        }}>
        <div style={{fontSize:9.5,color:"#8a8174",textTransform:"uppercase",letterSpacing:".25em",marginBottom:10,fontWeight:500}}>Neues Dokument hochladen</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <select className="fi" style={{flex:1,margin:0}} value={selCategory} onChange={e=>setSelCategory(e.target.value)}>
            <option value="">- Kategorie wählen -</option>
            {categories.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
          <input type="file" ref={fileInputRef} onChange={handleFileSelect} disabled={uploading||!selCategory} multiple style={{display:"none"}}/>
          <button className="btn btn-p btn-sm" disabled={uploading||!selCategory} onClick={()=>fileInputRef.current?.click()}>
            {uploading ? "⏳ Lädt…" : "📎 Datei wählen"}
          </button>
        </div>
        <div style={{
          marginTop:10,
          padding:"12px 14px",
          background: dragOver ? "rgba(26,24,20,.06)" : "transparent",
          border: dragOver ? "1px dashed #1a1a1a" : "1px dashed #c5b896",
          borderRadius:6,
          textAlign:"center",
          fontSize:11.5,
          color: dragOver ? "#1a1a1a" : "#8a8174",
          fontStyle:"italic",
          transition:"all .15s ease",
          pointerEvents:"none"
        }}>
          {dragOver 
            ? `🎯 Datei${" jetzt loslassen"}` 
            : selCategory 
              ? `↓ Oder Datei(en) hierher ziehen - Kategorie: ${selCategory}` 
              : "Erst Kategorie wählen, dann Datei(en) per Drag & Drop ablegen"}
        </div>
        <div style={{fontSize:10.5,color:"#8a8174",marginTop:6,fontStyle:"italic",textAlign:"center"}}>Max. 25 MB pro Datei · PDF, Bilder, Word, Excel</div>
      </div>
      
      {shownDocs.length === 0 ? (
        <div className="empty" style={{padding:"24px 16px"}}>Noch keine Dokumente hinterlegt</div>
      ) : (
        <div>
          {shownDocs.map(d => (
            <div key={d.id} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",background:"#ffffff",border:"1px solid #e8e3d8",borderRadius:8,marginBottom:6}}>
              <span style={{fontSize:22}}>{fileIcon(d.mime_type, d.filename)}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600,color:"#1a1814",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.filename}</div>
                <div style={{fontSize:11,color:"#8a8174",marginTop:2}}>
                  <span style={{background:"#f5efe4",padding:"1px 7px",borderRadius:4,marginRight:6,fontWeight:500}}>{d.category}</span>
                  {fileSize(d.file_size)} · {new Date(d.uploaded_at).toLocaleDateString("de-CH")}
                </div>
              </div>
              <div style={{display:"flex",gap:4}}>
                <button className="btn btn-g btn-sm" onClick={()=>handleView(d)} title="Anzeigen">👁</button>
                <button className="btn btn-g btn-sm" onClick={()=>handleDownload(d)} title="Herunterladen">⬇</button>
                <button className="btn btn-r btn-sm" onClick={()=>handleDelete(d)} title="Löschen">🗑</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── SIGNATURE PAD ────────────────────────────────────────────────
// Canvas-basiertes Unterschriften-Pad - funktioniert mit Maus + Touch
function SignaturePad({value, onChange, placeholder}) {
  const canvasRef = React.useRef(null);
  const [isDrawing, setIsDrawing] = React.useState(false);
  const lastPos = React.useRef({x:0,y:0});
  const [hasDrawn, setHasDrawn] = React.useState(!!value);
  
  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    // Set canvas internal size (for HD displays)
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    const ctx = canvas.getContext("2d");
    ctx.scale(dpr, dpr);
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = "#1a1814";
    ctx.lineWidth = 2.5;
    // Wenn wir einen Wert haben, zeichne ihn
    if (value) {
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0, rect.width, rect.height);
      img.src = value;
    }
  }, []);
  
  function getPos(e) {
    const canvas = canvasRef.current;
    const rect = canvas.getBoundingClientRect();
    if (e.touches && e.touches[0]) {
      return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
    }
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }
  
  function start(e) {
    e.preventDefault();
    setIsDrawing(true);
    setHasDrawn(true);
    lastPos.current = getPos(e);
  }
  
  function draw(e) {
    if (!isDrawing) return;
    e.preventDefault();
    const ctx = canvasRef.current.getContext("2d");
    const pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(lastPos.current.x, lastPos.current.y);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    lastPos.current = pos;
  }
  
  function end() {
    if (!isDrawing) return;
    setIsDrawing(false);
    // Konvertiere Canvas zu PNG Data-URL
    const dataUrl = canvasRef.current.toDataURL("image/png");
    onChange(dataUrl);
  }
  
  function clear() {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    const rect = canvas.getBoundingClientRect();
    ctx.clearRect(0, 0, rect.width, rect.height);
    setHasDrawn(false);
    onChange("");
  }
  
  return (
    <div style={{position:"relative",marginTop:6}}>
      <canvas
        ref={canvasRef}
        style={{
          width:"100%",
          height:140,
          border:"1.5px dashed #c5b89e",
          borderRadius:8,
          background:"#fff",
          cursor:"crosshair",
          touchAction:"none",
          display:"block"
        }}
        onMouseDown={start}
        onMouseMove={draw}
        onMouseUp={end}
        onMouseLeave={end}
        onTouchStart={start}
        onTouchMove={draw}
        onTouchEnd={end}
      />
      {!hasDrawn && (
        <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",fontSize:12,color:"#bab2a0",pointerEvents:"none",fontStyle:"italic"}}>
          {placeholder || "Mit dem Finger oder Maus unterschreiben"}
        </div>
      )}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6}}>
        <span style={{fontSize:11,color:hasDrawn?"#5a6e4a":"#bab2a0"}}>
          {hasDrawn ? "✓ Unterschrift erfasst" : "Noch keine Unterschrift"}
        </span>
        {hasDrawn && (
          <button onClick={clear} style={{background:"transparent",border:"1px solid #e1d8c5",borderRadius:4,fontSize:11,padding:"3px 8px",cursor:"pointer",color:"#9b4a3e"}}>
            ✕ Löschen
          </button>
        )}
      </div>
    </div>
  );
}
