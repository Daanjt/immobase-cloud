              orig:{status:tenant.drittmeldungStatus||"offen",datum:tenant.drittmeldungDatum||"",notiz:tenant.drittmeldungNotiz||""} },
    auszug: { title:"Auszug", cat:"Drittmeldebestätigung (Auszug)", fields:{status:"drittmeldungAuszugStatus",datum:"drittmeldungAuszugDatum",notiz:"drittmeldungAuszugNotiz"}, state:az, setState:setAz, fileRef:azFile,
              orig:{status:tenant.drittmeldungAuszugStatus||"offen",datum:tenant.drittmeldungAuszugDatum||"",notiz:tenant.drittmeldungAuszugNotiz||""} },
  };
  async function saveKind(kind){
    const c = CFG[kind]; setBusy(kind+":save");
    try { await updateTenant(tenant.id, { [c.fields.status]:c.state.status, [c.fields.datum]:c.state.datum||null, [c.fields.notiz]:c.state.notiz }); }
    catch(e){ alert("Speichern fehlgeschlagen: "+(e.message||e)); }
    finally { setBusy(null); }
  }
  async function uploadKind(kind, file){
    if(!file) return; const c = CFG[kind]; setBusy(kind+":upload");
    try {
      await uploadDocument("tenant", tenant.id, c.cat, file);
      c.setState(s=>({...s, status:"gemeldet"}));
      await updateTenant(tenant.id, { [c.fields.status]:"gemeldet", [c.fields.datum]:c.state.datum||null, [c.fields.notiz]:c.state.notiz });
    } catch(err){ alert("Upload fehlgeschlagen: "+(err.message||err)); }
    finally { setBusy(null); if(c.fileRef.current) c.fileRef.current.value=""; }
  }
  function renderSection(kind){
    const c = CFG[kind];
    const docs = (documents||[]).filter(d => d.entity_type==="tenant" && d.entity_id===tenant.id && d.category===c.cat);
    const dirty = c.state.status!==c.orig.status || (c.state.datum||"")!==(c.orig.datum||"") || (c.state.notiz||"")!==(c.orig.notiz||"");
    const isGemeldet = c.state.status==="gemeldet";
    const uploading = busy===kind+":upload";
    return (
      <div style={{border:"1px solid var(--line-soft)",borderRadius:10,padding:"16px 18px",marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}}>
          <span style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:".22em",color:"var(--muted)",fontWeight:600}}>Status</span>
          <span style={{padding:"2px 10px",borderRadius:20,background:isGemeldet?"var(--green-soft)":"#f7e4e0",color:isGemeldet?"#3d4f2f":"#9b4a3e",fontSize:11.5,fontWeight:600}}>{isGemeldet?"Gemeldet":"Offen"}</span>
          {docs.length>0 && <span style={{fontSize:11.5,color:"#3d4f2f"}}>· Bestätigung hinterlegt</span>}
        </div>
        <div className="frow">
          <div className="fg"><label className="fl">Status</label>
            <select className="fi" value={c.state.status} onChange={e=>c.setState(s=>({...s,status:e.target.value}))}>
              <option value="offen">Offen</option>
              <option value="gemeldet">Gemeldet</option>
            </select>
          </div>
          <div className="fg"><label className="fl">Meldedatum</label><input className="fi" type="date" value={toDateInputValue(c.state.datum)} onChange={e=>c.setState(s=>({...s,datum:e.target.value}))}/></div>
        </div>
        <div className="fg" style={{marginBottom:12}}><label className="fl">Notiz</label><textarea className="fi" rows={2} value={c.state.notiz} onChange={e=>c.setState(s=>({...s,notiz:e.target.value}))} placeholder="z.B. Gemeinde, Referenz"/></div>
        <div style={{marginBottom:16}}><button className="btn btn-p btn-sm" disabled={busy===kind+":save"||!dirty} onClick={()=>saveKind(kind)}>{busy===kind+":save"?"Speichert…":"Status speichern"}</button></div>
        {docs.length>0 ? (
          <div style={{display:"grid",gap:6,marginBottom:12}}>
            {docs.map((d,i)=>(
              <div key={d.id||i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",background:"var(--surface)",border:"1px solid var(--line-soft)",borderRadius:8,fontSize:12.5}}>
                <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📄 {d.filename||d.category}</span>
                <button className="btn btn-g btn-sm" onClick={async()=>{ const u=await getDocumentUrl(d.storage_path); if(u) window.open(u,"_blank"); }}>Ansehen</button>
                <button className="btn btn-g btn-sm" onClick={async()=>{ if(confirm("Bestätigung löschen?")) await deleteDocument(d); }}>✕</button>
              </div>
            ))}
          </div>
        ) : null}
        <input ref={c.fileRef} type="file" accept="application/pdf,image/*" style={{display:"none"}} onChange={e=>uploadKind(kind, e.target.files&&e.target.files[0])}/>
        <div
          onDragOver={e=>{e.preventDefault(); setDragOver(kind);}}
          onDragLeave={e=>{e.preventDefault(); setDragOver(null);}}
          onDrop={e=>{e.preventDefault(); setDragOver(null); const f=e.dataTransfer.files&&e.dataTransfer.files[0]; if(f) uploadKind(kind,f);}}
          onClick={()=>!uploading&&c.fileRef.current&&c.fileRef.current.click()}
          style={{border:`1.5px dashed ${dragOver===kind?"#a08864":"var(--line-soft)"}`,borderRadius:9,padding:"18px 16px",textAlign:"center",cursor:uploading?"default":"pointer",background:dragOver===kind?"#f5efe4":"var(--surface)",transition:".15s"}}
        >
          {uploading ? <div style={{fontSize:12.5,color:"var(--muted)"}}>Lädt hoch…</div> : (
            <><div style={{fontSize:18,marginBottom:4}}>📎</div><div style={{fontSize:12,color:"var(--ink)"}}>Bestätigung hierher ziehen oder klicken</div></>
          )}
        </div>
      </div>
    );
  }
  return (
    <div>
      <div style={{background:"var(--surface)",border:"1px solid var(--line-soft)",borderRadius:10,padding:"14px 16px",marginBottom:16,fontSize:12.5,color:"var(--muted)",lineHeight:1.6}}>
        Die Drittmeldepflicht verlangt, dass die Untermietpartei bei der Gemeinde bzw. Einwohnerkontrolle gemeldet wird, sowohl beim Einzug als auch beim Auszug. Hier trackst du beide Meldungen und legst die jeweilige Bestätigung ab.
      </div>
      <div className="tabs" style={{marginBottom:16}}>
        {[["einzug","Einzug"],["auszug","Auszug"]].map(([k,l])=>(
          <button key={k} className={`tab${sub===k?" on":""}`} onClick={()=>setSub(k)}>Drittmeldung {l}</button>
        ))}
      </div>
      {renderSection(sub)}
    </div>
  );
}

function UebergabeProtokoll({tenant, room, apt, uploadDocument, updateTenant, documents, getDocumentUrl, deleteDocument, protokolle, insertProtokoll, updateProtokoll, deleteProtokoll, handoverProtocols, startHandoverProtocol, cancelHandoverProtocol, acceptHandoverProtocol, extendHandoverDeadline, deleteHandoverProtocol}){
  const [showForm, setShowForm] = useState(false);
  const [saving, setSaving] = useState(false);
  const [editingId, setEditingId] = useState(null);
  
  // Protokolle für diesen Mieter
  const myProtokolle = (protokolle || []).filter(p => p.tenantId === tenant?.id);
  
  // localStorage-Key für Draft (nur für unfertige neue Protokolle, vor erstem Speichern)
  const draftKey = tenant ? `uebergabe_draft_${tenant.id}` : null;
  
  const loadDraft = () => {
    if (!draftKey) return null;
    try {
      const raw = localStorage.getItem(draftKey);
      if (raw) return JSON.parse(raw);
    } catch (e) { console.warn(e); }
    return null;
  };
  
  const [data, setData] = useState(() => {
    const draft = loadDraft();
    return draft || {
      datum: new Date().toISOString().split("T")[0],
      raume: {}, customRaume: [],
      bemerkungen: "",
      signature_mieter: "", signature_vermieter: "",
    };
  });
  
  // Auto-Save: Draft nur in localStorage solange nicht in DB gespeichert
  useEffect(() => {
    if (!draftKey || !showForm || editingId) return;
    try { localStorage.setItem(draftKey, JSON.stringify(data)); }
    catch (e) { console.warn(e); }
  }, [data, draftKey, showForm, editingId]);
  
  function resetData() {
    setData({
      datum: new Date().toISOString().split("T")[0],
      raume: {}, customRaume: [], bemerkungen: "",
      signature_mieter: "", signature_vermieter: "",
    });
  }
  
  function clearDraft() {
    if (draftKey) localStorage.removeItem(draftKey);
    resetData();
  }
  
  // Lade existierende Übergabe zum Bearbeiten
  function loadRecord(p) {
    setData({
      datum: p.datum || new Date().toISOString().split("T")[0],
      raume: p.raume || {},
      customRaume: p.customRaume || [],
      bemerkungen: p.bemerkungen || "",
      signature_mieter: p.signatureMieter || "",
      signature_vermieter: p.signatureVermieter || "",
    });
    setEditingId(p.id);
    setShowForm(true);
  }
  
  // Generiert PDF via html2pdf, uploaded in documents bucket, schickt Email an Mieter
  async function generateAndSendProtokoll(protokollId) {
    if (!window.html2pdf) throw new Error("html2pdf nicht geladen (Seite neu laden)");
    if (!tenant?.email) throw new Error("Mieter hat keine Email-Adresse hinterlegt");
    
    // 1. HTML in unsichtbarem iframe rendern (für saubere Page-Breaks)
    const html = buildPDF();
    const iframe = document.createElement("iframe");
    iframe.style.cssText = "position:absolute;left:-9999px;top:0;width:210mm;height:297mm;border:none;visibility:hidden;";
    document.body.appendChild(iframe);
    iframe.contentDocument.open();
    iframe.contentDocument.write(html);
    iframe.contentDocument.close();
    
    // Warte auf Bilder
    await new Promise(r => setTimeout(r, 1000));
    
    let pdfBlob;
    try {
      pdfBlob = await window.html2pdf().set({
        margin: 0,
        filename: "Uebergabeprotokoll.pdf",
        image: { type: "jpeg", quality: 0.92 },
        html2canvas: { scale: 1.5, useCORS: true, logging: false, backgroundColor: "#ffffff" },
        jsPDF: { unit: "mm", format: "a4", orientation: "portrait", compress: true },
        pagebreak: { mode: ["css", "legacy"] }
      }).from(iframe.contentDocument.body).outputPdf("blob");
    } finally {
      document.body.removeChild(iframe);
    }
    
    if (!pdfBlob || pdfBlob.size < 1000) throw new Error("PDF-Generierung fehlgeschlagen");
    
    // 2. Upload via existing uploadDocument
    const file = new File([pdfBlob], "Uebergabeprotokoll.pdf", { type: "application/pdf" });
    const docRecord = await uploadDocument("tenant", tenant.id, "Übergabeprotokoll", file);
    if (!docRecord?.storage_path) throw new Error("Upload returned no path");
    
    // 3. Update protokoll mit pdf_storage_path (via updateProtokoll für state-refresh)
    await updateProtokoll(protokollId, { pdfStoragePath: docRecord.storage_path });
    
    // 4. Call edge function send-protocol-email
    const aptAdresse = apt?.adresse 
      ? `${apt.adresse}${(apt.plz || apt.ort) ? `, ${apt.plz || ""} ${apt.ort || ""}`.trim() : ""}` 
      : "";
    
    const { data: result, error: fnErr } = await supabase.functions.invoke("send-protocol-email", {
      body: {
        protokoll_id: protokollId,
        storage_path: docRecord.storage_path,
        tenant_email: tenant.email,
        tenant_vorname: tenant.vorname,
        tenant_nachname: tenant.nachname,
        datum: data.datum,
        apt_adresse: aptAdresse,
      }
    });
    
    if (fnErr) throw new Error("Edge function: " + (fnErr.message || fnErr));
    if (result?.error) throw new Error(result.error);
    
    // 5. State refresh: emailSentAt wurde von Edge function gesetzt, lokal nachziehen
    await updateProtokoll(protokollId, { emailSentAt: new Date().toISOString() });
    
    return true;
  }
  
  // Speichern (Insert oder Update)
  async function save() {
    if (!tenant) return;
    setSaving(true);
    try {
      const willBeSigned = !!(data.signature_mieter && data.signature_vermieter);
      
      // Prüfe ob Email schon gesendet wurde (bei Update)
      const existingProtokoll = editingId 
        ? (protokolle || []).find(p => p.id === editingId) 
        : null;
      const prevEmailSent = !!(existingProtokoll?.emailSentAt || existingProtokoll?.email_sent_at);
      
      const payload = {
        tenantId: tenant.id,
        aptId: apt?.id || null,
        roomId: room?.id || null,
        datum: data.datum,
        schluesselNr: schluesselNr,
        extraSchluessel: extraSchluessel,
        bemerkungen: data.bemerkungen,
        raume: data.raume,
        customRaume: data.customRaume,
        signatureMieter: data.signature_mieter || null,
        signatureVermieter: data.signature_vermieter || null,
        signedAt: willBeSigned ? new Date().toISOString() : null,
        status: willBeSigned ? "unterschrieben" : "entwurf",
      };
      
      let savedId = editingId;
      if (editingId) {
        await updateProtokoll(editingId, payload);
      } else {
        const created = await insertProtokoll(payload);
        if (created?.id) {
          savedId = created.id;
          setEditingId(created.id);
        }
        if (draftKey) localStorage.removeItem(draftKey);
      }
      
      // Email senden wenn: beide signaturen + noch nicht versendet + tenant.email vorhanden
      let emailResult = null; // null = nicht versucht, true = success, string = error message
      if (willBeSigned && !prevEmailSent && savedId) {
        if (!tenant.email) {
          emailResult = "Mieter hat keine Email-Adresse hinterlegt";
        } else {
          try {
            await generateAndSendProtokoll(savedId);
            emailResult = true;
          } catch (e) {
            console.error("generateAndSendProtokoll failed:", e);
            emailResult = e.message || String(e);
          }
        }
      }
      
      // User feedback
      if (emailResult === true) {
        alert(`✓ Übergabe gespeichert + PDF per Email an ${tenant.email} gesendet!`);
      } else if (typeof emailResult === "string") {
        alert(`✓ Übergabe gespeichert.\n\n⚠️ Email-Versand fehlgeschlagen: ${emailResult}\n\nDu kannst das PDF manuell via "Protokoll-PDF ansehen" erstellen und an den Mieter senden.`);
      } else {
        alert(editingId ? "✓ Übergabe aktualisiert." : "✓ Übergabe gespeichert! Du findest sie jetzt in der Übersicht.");
      }
      
      // Zurück zur Übersicht
      setShowForm(false);
      setEditingId(null);
      resetData();
    } catch (e) {
      // Fehler wurde bereits in CRUD-Funktion angezeigt
      console.error("save error:", e);
    }
    setSaving(false);
  }
  
  async function deleteRecord(p) {
    if (!confirm(`Übergabe vom ${fmtDateDE(p.datum)} wirklich löschen?`)) return;
    try { await deleteProtokoll(p.id); }
    catch (e) {}
  }
  
  const [generating, setGenerating] = useState(false);
  
  // Schlüssel-Daten: editable state, initialisiert aus Mieter-Stammdaten
  // (verwendet schluesselAnzahl da das Mieter-Edit-Form ebenfalls dieses Feld nutzt)
  const [schluesselNr, setSchluesselNr] = useState(tenant?.schluesselAnzahl || tenant?.schluessel_anzahl || tenant?.schluesselNr || tenant?.schluessel_nr || "");
  const [extraSchluessel, setExtraSchluessel] = useState(tenant?.extraSchluessel || tenant?.extra_schluessel || "");
  const [keysSaved, setKeysSaved] = useState(false);
  const initialKeysRef = useRef({nr: schluesselNr, extra: extraSchluessel});
  
  // Auto-Save: speichert Schlüssel-Daten automatisch 800ms nach letzter Änderung
  useEffect(() => {
    if (!tenant || !updateTenant) return;
    // Skip wenn Werte gleich sind wie Initial
    if (schluesselNr === initialKeysRef.current.nr && extraSchluessel === initialKeysRef.current.extra) return;
    
    const timer = setTimeout(async () => {
      try {
        await updateTenant(tenant.id, {
          schluesselAnzahl: schluesselNr,    // Hauptfeld (matches Mieter-Edit)
          schluesselNr: schluesselNr,        // Backup-Feld (falls verwendet)
          extraSchluessel: extraSchluessel,
        });
        initialKeysRef.current = {nr: schluesselNr, extra: extraSchluessel};
        setKeysSaved(true);
        setTimeout(() => setKeysSaved(false), 2000);
      } catch (e) {
        console.error("Auto-save keys failed:", e);
      }
    }, 800);
    
    return () => clearTimeout(timer);
  }, [schluesselNr, extraSchluessel]);
  
  // Wenn tenant sich von aussen ändert, synchronisiere state
  useEffect(() => {
    const newNr = tenant?.schluesselAnzahl || tenant?.schluessel_anzahl || tenant?.schluesselNr || tenant?.schluessel_nr || "";
    const newExtra = tenant?.extraSchluessel || tenant?.extra_schluessel || "";
    // Nur sync wenn user nichts eingetippt hat (= Werte gleich wie initialRef)
    if (schluesselNr === initialKeysRef.current.nr && newNr !== schluesselNr) {
      setSchluesselNr(newNr);
      initialKeysRef.current.nr = newNr;
    }
    if (extraSchluessel === initialKeysRef.current.extra && newExtra !== extraSchluessel) {
      setExtraSchluessel(newExtra);
      initialKeysRef.current.extra = newExtra;
    }
  }, [tenant?.schluesselAnzahl, tenant?.schluessel_anzahl, tenant?.extraSchluessel, tenant?.extra_schluessel]);
  
  function updateRaum(name, key, val) {
    setData(p => ({
      ...p,
      raume: {
        ...p.raume,
        [name]: { ...(p.raume[name]||{}), [key]: val }
      }
    }));
  }
  
  async function addPhoto(raumName, file) {
    if (!file) return;
    // Compress image to ~1024px max dimension
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const MAX = 1280;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = h * (MAX/w); w = MAX; }
          else { w = w * (MAX/h); h = MAX; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        const dataUri = canvas.toDataURL("image/jpeg", 0.85);
        setData(p => ({
          ...p,
          raume: {
            ...p.raume,
            [raumName]: {
              ...(p.raume[raumName]||{}),
              photos: [...((p.raume[raumName]||{}).photos || []), dataUri]
            }
          }
        }));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }
  
  function removePhoto(raumName, idx) {
    setData(p => ({
      ...p,
      raume: {
        ...p.raume,
        [raumName]: {
          ...(p.raume[raumName]||{}),
          photos: (p.raume[raumName]||{}).photos.filter((_,i) => i !== idx)
        }
      }
    }));
  }
  
  function buildPDF() {
    const fullName = `${tenant.vorname} ${tenant.nachname}`;
    const datumLong = new Date(data.datum).toLocaleDateString("de-CH", {day:"numeric",month:"long",year:"numeric"});
    
    const allRooms = [...UEBERGABE_RAUME_PRIVAT, ...UEBERGABE_RAUME_GEMEIN, ...(data.customRaume||[])];
    const raumeHTML = allRooms.map(r => {
      const d = data.raume[r] || {};
      const photos = d.photos || [];
      const isPrivat = UEBERGABE_RAUME_PRIVAT.includes(r);
      const titel = isPrivat && room ? `${r} (${room.id})` : r;
      return `
        <div class="raum-block">
          <h3>${titel}</h3>
          <div class="raum-grid">
            <div class="raum-info">
              ${d.bemerkung ? `<div class="info-row"><span class="lbl">Bemerkung:</span></div><div class="bemerkung">${d.bemerkung}</div>` : ''}
            </div>
          </div>
          ${photos.length > 0 ? `
            <div class="photo-grid">
              ${photos.map((p,i)=>`<div class="photo-item"><img src="${p}" alt="Foto ${i+1}"/><div class="photo-cap">${titel} - Foto ${i+1}</div></div>`).join('')}
            </div>
          ` : ''}
        </div>`;
    }).join('');
    
    return `<!DOCTYPE html>
<html lang="de"><head><meta charset="UTF-8"><title>Übergabeprotokoll - ${fullName}</title>
<style>

  }
  
  async function generatePDF() {
    setGenerating(true);
    try {
      const html = buildPDF();
      const win = window.open("", "_blank");
      if (!win) {
        alert("Popup blockiert. Bitte Popups erlauben.");
        return;
      }
      win.document.open();
      win.document.write(html);
      win.document.close();
      win.onload = () => setTimeout(() => { win.focus(); win.print(); }, 400);
    } finally {
      setGenerating(false);
    }
  }
  
  if (!showForm) {

    // ═══ Uebernahmeprotokoll (Selbstbedienung durch Mieter) ═══

    React.useEffect(() => {
      if (showStartModal && tenant) {
        setStartSchluesselNr(tenant.schluesselNr || tenant.schluessel_nr || "");
        setStartExtraSchluessel(tenant.extraSchluessel || tenant.extra_schluessel || "");

    }, [showStartModal, tenant?.id]);
    const myHandovers = (handoverProtocols || []).filter(h => h.tenantId === tenant?.id);

          </div>
          
          {myHandovers.map((h, idx) => {
            const statusColors = {

              "in_progress": {bg:"#e0ecf5",color:"#3a5570",border:"#a8c0d5",label:"✎ In Arbeit"},
              "submitted": {bg:"#fdf2e0",color:"#7a5c3c",border:"#e8c89c",label:"📤 Eingereicht"},
              "auto_accepted": {bg:"#e8efde",color:"#3a5230",border:"#c5d5b0",label:"✓ Auto-akzeptiert"},
              "accepted": {bg:"#e8efde",color:"#3a5230",border:"#c5d5b0",label:"✓ Akzeptiert"},
              "cancelled": {bg:"#f0ebe1",color:"#7a5c3c",border:"#d8d0c0",label:"✕ Abgebrochen"},
            };
            const sc = statusColors[h.status] || {bg:"#f0ebe1",color:"#5a5249",border:"#d8d0c0",label:h.status};
            const isActive = ["sent","in_progress"].includes(h.status);
            const isSubmitted = h.status === "submitted";
            const now = new Date();

            return (

                  <div style={{fontSize:10.5,color:"#3a5230",background:"#e8efde",border:"1px solid #c5d5b0",padding:"4px 8px",borderRadius:4,marginBottom:8,display:"inline-block"}}>
                    ✉️ Einladung versendet {new Date(h.inviteSentAt).toLocaleString("de-CH",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"})}

                  </div>

                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:6}}>
                  <span style={{fontSize:11.5,color:"#3a352d"}}>
                    Gestartet {new Date(h.startedAt).toLocaleDateString("de-CH")}
                    {isActive && daysLeft >= 0 && <span style={{marginLeft:8,color:daysLeft <= 3 ? "#8a3a2e" : "#8a8478",fontWeight:daysLeft <= 3 ? 600 : 400}}> · Deadline in {daysLeft} Tagen</span>}

                  </span>
                  <span style={{display:"inline-block",padding:"3px 9px",borderRadius:11,background:sc.bg,color:sc.color,border:`1px solid ${sc.border}`,fontSize:10.5,fontWeight:600}}>{sc.label}</span>
                </div>
                {h.signUrl && isActive && (
                  <div style={{display:"flex",gap:5,marginBottom:6,alignItems:"center",flexWrap:"wrap"}}>
                    <div style={{fontSize:10.5,fontFamily:"monospace",color:"#3a352d",background:"#f5efe4",padding:"3px 7px",borderRadius:3,flex:"1 1 180px",wordBreak:"break-all",minWidth:0}}>{h.signUrl}</div>
                    <button onClick={()=>{navigator.clipboard.writeText(h.signUrl).then(()=>alert("Link kopiert!")).catch(()=>{});}} style={{fontSize:10,padding:"3px 8px",background:"#f0ebe1",color:"#4a4439",border:"1px solid #d8d0c0",borderRadius:3,cursor:"pointer",flexShrink:0}}>📋 Kopieren</button>
                    <a href={h.signUrl} target="_blank" rel="noopener noreferrer" style={{fontSize:10,padding:"3px 8px",background:"#e8efde",color:"#3a5230",border:"1px solid #c5d5b0",borderRadius:3,textDecoration:"none",flexShrink:0}}>↗ Öffnen</a>

                {isSubmitted && h.submittedAt && (

                  </div>

                <div style={{display:"flex",gap:5,justifyContent:"flex-end",flexWrap:"wrap"}}>
                  {isActive && (

                        try { await extendHandoverDeadline(h.id, 7); } catch(e){alert("Fehler: "+e.message);}
                      }} style={{fontSize:10.5,padding:"4px 10px",background:"#f0ebe1",color:"#4a4439",border:"1px solid #d8d0c0",borderRadius:4,cursor:"pointer"}}>

                      <button onClick={async()=>{

                    </>

                  {isSubmitted && (
                    <button onClick={async()=>{
                      if (!confirm(`Protokoll akzeptieren und abschliessen?`)) return;
                      try { await acceptHandoverProtocol(h.id); } catch(e){alert("Fehler: "+e.message);}
                    }} style={{fontSize:10.5,padding:"4px 10px",background:"#e8efde",color:"#3a5230",border:"1px solid #c5d5b0",borderRadius:4,cursor:"pointer"}}>
                      ✓ Akzeptieren
                    </button>
                  )}
                  <button onClick={async()=>{
                    if (!confirm(`Protokoll komplett löschen?`)) return;
                    try { await deleteHandoverProtocol(h.id); } catch(e){alert("Fehler: "+e.message);}
                  }} style={{fontSize:10.5,padding:"4px 10px",background:"#fefcf7",color:"#9b4a3e",border:"1px solid #e0bcb0",borderRadius:4,cursor:"pointer"}}>
                    🗑
                  </button>
                </div>
              </div>
            );
          })}
        </div>
        
        {/* START-MODAL fuer Uebernahmeprotokoll */}
        {showStartModal && (
          <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={e=>e.target===e.currentTarget && !starting && setShowStartModal(false)}>
            <div style={{background:"#fefcf7",borderRadius:10,padding:"22px 26px",maxWidth:560,width:"100%",maxHeight:"92vh",overflowY:"auto"}}>
              <div style={{fontSize:16,fontWeight:600,marginBottom:6}}>📋 Übernahmeprotokoll starten</div>
              <div style={{fontSize:12,color:"#8a8174",marginBottom:18}}>Für {tenant?.vorname||""} {tenant?.nachname||""} · {apt?.adresse||""}{room?.id ? ", Zimmer "+room.id : ""}</div>
              
              <div style={{background:"#fdf2e0",border:"1px solid #e8c89c",borderRadius:8,padding:"12px 14px",marginBottom:16,fontSize:12.5,lineHeight:1.5,color:"#5a5044"}}>

                />
              </div>
              <div style={{marginBottom:16}}>
                <label style={{display:"block",fontSize:12.5,fontWeight:600,marginBottom:6,color:"#3a352d"}}>Extra-Schlüssel (optional)</label>
                <textarea
                  value={startExtraSchluessel}
                  onChange={e=>setStartExtraSchluessel(e.target.value)}
                  placeholder={"z.B.\nBriefkastenschlüssel Nr. 4711\nWaschküche Nr. 89"}

                />
                <div style={{fontSize:10.5,color:"#8a8174",marginTop:6}}>
                  Diese Felder sind mit den Schlüssel-Daten des Mieters synchronisiert. Prefill aus Bearbeiten-Modal, und beim Starten wird der Mieter aktualisiert.
                </div>

              <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>

                  Abbrechen
                </button>
                <button onClick={async()=>{
                  setStarting(true);
                  try {
                    const nrTrim = startSchluesselNr.trim();
                    const extraTrim = startExtraSchluessel.trim();
                    // 1. Update tenant fields
                    await updateTenant(tenant.id, {
                      schluessel_nr: nrTrim,
                      extra_schluessel: extraTrim,
                      schluessel_uebergeben: !!(nrTrim || extraTrim),
                    });
                    // 2. Build snapshot for handover_protocol (fuer Sign-Portal + PDF)
                    const snapshot = [
                      nrTrim && `Schlüsselnummer: ${nrTrim}`,
                      extraTrim && `Extra-Schlüssel:\n${extraTrim}`
                    ].filter(Boolean).join("\n\n");
                    // 3. Start the protocol mit vollem Snapshot
                    await startHandoverProtocol({
                      tenantId: tenant.id,
                      aptId: apt?.id,
                      roomId: room?.id,
                      mieterEmail: tenant.email,
                      mieterVorname: tenant.vorname,
                      mieterNachname: tenant.nachname,
                      mieterGeburtsdatum: tenant.geburt || null,
                      mieterNationalitaet: tenant.nat || null,
                      mieterTelefon: tenant.phone || null,
                      aptAdresse: apt?.adresse || null,
                      aptPlz: apt?.plz || null,
                      aptOrt: apt?.ort || null,
                      roomLabel: room?.id || null,
                      einzugDatum: tenant.einzug || null,
                      schluesselInfo: snapshot || null,
                    });
                    setShowStartModal(false);
                  } catch(e) {
                    alert("Fehler: " + (e.message || e));
                  }
                  setStarting(false);
                }} disabled={starting} style={{fontSize:12.5,padding:"8px 16px",background:starting?"#f0ebe1":"#3a5230",color:starting?"#8a8174":"#fff",border:"1px solid "+(starting?"#d8d0c0":"#3a5230"),borderRadius:5,cursor:starting?"not-allowed":"pointer",fontWeight:600}}>
                  {starting ? "Starte..." : "📋 Protokoll starten"}
                </button>
              </div>
            </div>
          </div>
        )}
        
      </div>
    );
  }
  
  const allRooms = [...UEBERGABE_RAUME_PRIVAT, ...UEBERGABE_RAUME_GEMEIN, ...(data.customRaume||[])];

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>

        <div className="frow">

            <label className="fl">Schlüsselnummer</label>

        const photos = rdata.photos || [];
        return (
          <div key={rname} style={{background:"#fefcf7",border:"1px solid #e1d8c5",borderRadius:8,padding:"14px 16px",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontSize:13,fontWeight:600,color:"#1a1814"}}>{isPrivat?"🛏️ ":isCustom?"➕ ":"🏠 "}{titel}</div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <span style={{fontSize:10,color:photos.length>0?"#5a6e4a":"#8a8174",fontWeight:600}}>{photos.length} Foto{photos.length!==1?"s":""}</span>
                {isCustom && (
                  <button onClick={()=>setData(p=>({...p,customRaume:p.customRaume.filter(r=>r!==rname),raume:Object.fromEntries(Object.entries(p.raume).filter(([k])=>k!==rname))}))} style={{background:"transparent",border:"1px solid #e1d8c5",borderRadius:4,fontSize:11,padding:"2px 6px",cursor:"pointer",color:"#9b4a3e"}}>✕ Entfernen</button>
                )}
              </div>
            </div>
            <div className="fg">
              <label className="fl">Bemerkung / Mängel <span style={{fontWeight:400,color:"#bab2a0"}}>(optional)</span></label>
              <textarea className="fi" rows={2} value={rdata.bemerkung||""} onChange={e=>updateRaum(rname,"bemerkung",e.target.value)} placeholder="z.B. kleiner Kratzer am Fenster..."/>
            </div>
            
            {photos.length > 0 && (
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(min(80px, 100%), 1fr))",gap:6,marginBottom:10}}>
                {photos.map((p,i) => (
                  <div key={i} style={{position:"relative",aspectRatio:"1",border:"1px solid #e1d8c5",borderRadius:4,overflow:"hidden"}}>
                    <img src={p} alt={`Foto ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                    <button onClick={()=>removePhoto(rname,i)} style={{position:"absolute",top:2,right:2,background:"rgba(0,0,0,.7)",color:"#fff",border:"none",borderRadius:"50%",width:22,height:22,cursor:"pointer",fontSize:12}}>×</button>
                  </div>
                ))}
              </div>
            )}
            
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              <label className="btn btn-g btn-sm" style={{cursor:"pointer",margin:0}}>
                📷 Fotos aufnehmen
                <input type="file" accept="image/*" capture="environment" multiple style={{display:"none"}} onChange={e=>{[...e.target.files].forEach(f=>addPhoto(rname,f));e.target.value="";}}/>
              </label>
              <label className="btn btn-g btn-sm" style={{cursor:"pointer",margin:0}}>
                📎 Aus Galerie wählen
                <input type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>{[...e.target.files].forEach(f=>addPhoto(rname,f));e.target.value="";}}/>
              </label>
            </div>
          </div>
        );
      })}
      
      {/* Custom-Raum hinzufügen */}
      <button 
        onClick={()=>{
          const name = prompt("Name des zusätzlichen Raums:", "");
          if (!name || !name.trim()) return;
          const trimmed = name.trim();
          if (allRooms.includes(trimmed)) { alert("Raum existiert bereits."); return; }
          setData(p=>({...p,customRaume:[...(p.customRaume||[]),trimmed]}));
        }}
        className="btn btn-g btn-sm" 
        style={{width:"100%",marginBottom:14,padding:"10px",borderStyle:"dashed"}}
      >
        ➕ Weiteren Raum hinzufügen (z.B. Balkon, Estrich)
      </button>
      
      <div className="fg">
        <label className="fl">Allgemeine Bemerkungen</label>
        <textarea className="fi" rows={3} value={data.bemerkungen} onChange={e=>setData(p=>({...p,bemerkungen:e.target.value}))} placeholder="Weitere Notizen oder Vereinbarungen..."/>
      </div>
      
      {/* UNTERSCHRIFTEN - nur sichtbar wenn man ein gespeichertes Protokoll bearbeitet (vor Ort) */}
      {editingId ? (
        <div style={{background:"#fefcf7",border:"1px solid #e1d8c5",borderRadius:8,padding:"14px 16px",marginBottom:14,marginTop:14}}>
          <div style={{fontSize:9.5,color:"#8a8174",textTransform:"uppercase",letterSpacing:".25em",marginBottom:14,fontWeight:500}}>✍️ Unterschriften (vor Ort)</div>
          
          <div style={{marginBottom:18}}>
            <label className="fl">Mieter: {tenant.vorname} {tenant.nachname}</label>
            <SignaturePad 
              value={data.signature_mieter} 
              onChange={(v)=>setData(p=>({...p,signature_mieter:v}))}
              placeholder="Hier mit dem Finger unterschreiben"
            />
          </div>
          
          <div>
            <label className="fl">Hauptmieter: D&T Partners GmbH</label>
            <SignaturePad 
              value={data.signature_vermieter} 
              onChange={(v)=>setData(p=>({...p,signature_vermieter:v}))}
              placeholder="Hier mit dem Finger unterschreiben"
            />
          </div>
        </div>
      ) : (
        <div style={{background:"#f5f0e6",border:"1px dashed #d4c7a8",borderRadius:8,padding:"12px 14px",marginTop:14,fontSize:11.5,color:"#8a7e5e",lineHeight:1.5,textAlign:"center"}}>
          ✍️ <strong>Unterschriften kommen später</strong> - speichere erst die Übergabe. Vor Ort kannst du sie öffnen, Mieter unterschreibt direkt am Handy, dann PDF erstellen.
        </div>
      )}
      
      <div style={{display:"flex",gap:8,marginTop:18,paddingTop:14,borderTop:"1px solid #e1d8c5",flexWrap:"wrap"}}>
        <button className="btn btn-g" onClick={()=>{setShowForm(false);setEditingId(null);}} style={{flex:"0 0 auto"}}>← Zurück</button>
        {editingId ? (
          <>
            <button className="btn btn-g" onClick={save} disabled={saving} style={{flex:"1 1 140px",fontWeight:600}}>
              {saving ? "⏳ Speichert…" : "💾 Änderungen speichern"}
            </button>
            {(() => {
              const existing = (protokolle || []).find(x => x.id === editingId);
              const isSignedInDb = !!existing?.signedAt;
              const emailSent = !!existing?.emailSentAt;
              if (isSignedInDb && !emailSent && tenant?.email) {
                return (
                  <button className="btn btn-p" onClick={async () => {
                    if (!confirm(`PDF generieren und an ${tenant.email} senden?`)) return;
                    setSaving(true);
                    try {
                      await generateAndSendProtokoll(editingId);
                      alert(`✓ PDF per Email an ${tenant.email} gesendet!`);
                    } catch (e) {
                      console.error(e);
                      alert("⚠️ Versand fehlgeschlagen: " + (e.message || e));
                    }
                    setSaving(false);
                  }} disabled={saving} style={{flex:"1 1 200px",fontWeight:600}}>
                    {saving ? "⏳ Sendet…" : "📧 PDF an Mieter senden"}
                  </button>
                );
              }
              return null;
            })()}
            <button className="btn btn-p" onClick={generatePDF} disabled={generating} style={{flex:"1 1 200px"}}>
              {generating?"⏳ Erstellt…":"📄 Protokoll-PDF erstellen"}
            </button>
          </>
        ) : (
          <button className="btn btn-p" onClick={save} disabled={saving} style={{flex:"1 1 200px",fontWeight:600}}>
            {saving ? "⏳ Speichert…" : "💾 Übergabe speichern"}
          </button>
        )}
      </div>
      
      <div style={{fontSize:10.5,color:"#8a8174",marginTop:10,lineHeight:1.5,fontStyle:"italic",textAlign:"center"}}>
        {editingId 
          ? "💡 Vor Ort: Unterschriften ergänzen, Änderungen speichern, dann Protokoll-PDF erstellen."
          : "💡 Übergabe mit allen Daten und Fotos wird in der Datenbank gespeichert. Vor Ort kannst du sie öffnen, Unterschriften ergänzen und das Protokoll-PDF erstellen."}
      </div>
    </div>
  );
}

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
// ─── ÜBERGABEN (Einzug + Auszug Tab) ─────────────────────────────────────────
function Uebergaben({apts,rooms,tenants,bewerber,protokolle,navigateTo,updateTenant,updateRoom,handoverProtocols,documents,startHandoverProtocol}){
  const [tab, setTab] = useState("einzug"); // 'einzug' | 'auszug'
  const heute = new Date();
  heute.setHours(0,0,0,0);
  
  // ─── EINZUG: Uebernahmeprotokolle nach Status ─────────────────────
  // Kategorien: 
  //   "todo" = kein Protokoll gestartet
  //   "waiting" = Protokoll laeuft (sent/in_progress)
  //   "review" = Protokoll eingereicht (submitted, wartet auf Admin-Akzeptanz)
  //   "done" = accepted / auto_accepted
  const einzuegeMitStatus = tenants
    .filter(t => (t.status||"aktiv") === "aktiv")
    .map(t => {
      const room = rooms.find(r => r.tenantId === t.id);
      if (!room) return null;
      const apt = apts.find(a => a.id === room.aptId);
      const myHandovers = (handoverProtocols || []).filter(h => h.tenantId === t.id);
      // Sortiere absteigend nach start um neuestes zuerst zu haben
      const sorted = [...myHandovers].sort((a,b) => new Date(b.startedAt) - new Date(a.startedAt));
      const latest = sorted[0];
      let kategorie;
      if (!latest) kategorie = "todo";
      else if (["sent","in_progress"].includes(latest.status)) kategorie = "waiting";
      else if (latest.status === "submitted") kategorie = "review";
      else if (["accepted","auto_accepted"].includes(latest.status)) kategorie = "done";
      else kategorie = "todo"; // cancelled -> zurueck auf todo
      // Altbestand: manuell als erledigt markiert oder altes Protokoll als Dokument hinterlegt
      const hatAltesProtokoll = (documents||[]).some(d => d.entity_type==="tenant" && d.entity_id===t.id && (d.category||"").toLowerCase().includes("übergabeprotokoll"));
      if ((t.uebergabeStatus||"offen")==="erledigt" || hatAltesProtokoll) kategorie = "done";
      const einzugDate = parseD(t.einzug);
      const daysTilEinzug = einzugDate ? Math.ceil((einzugDate - heute) / (1000*60*60*24)) : null;
      return { tenant: t, room, apt, einzugDate, daysTilEinzug, kategorie, latest };
    })
    .filter(Boolean)
    .sort((a, b) => {
      // Prioritaet: review > waiting > todo > done
      const prio = {review:0, waiting:1, todo:2, done:3};
      if (prio[a.kategorie] !== prio[b.kategorie]) return prio[a.kategorie] - prio[b.kategorie];
      if (a.daysTilEinzug == null && b.daysTilEinzug == null) return 0;
      if (a.daysTilEinzug == null) return 1;
      if (b.daysTilEinzug == null) return -1;
      return a.daysTilEinzug - b.daysTilEinzug;
    });
  
  const offene = einzuegeMitStatus.filter(e => e.kategorie !== "done");
  const erledigt = einzuegeMitStatus.filter(e => e.kategorie === "done");
  const [startFor, setStartFor] = useState(null);
  const [sNr, setSNr] = useState("");
  const [sExtra, setSExtra] = useState("");
  const [starting, setStarting] = useState(false);
  const oeffneStart = (eintrag) => {
    const t = eintrag.tenant;
    setSNr(((t.schluesselNr||"").trim() || (t.schluesselAnzahl||"").toString().trim()));
    setSExtra((t.extraSchluessel||"").trim());
    setStartFor(eintrag);
  };
  const schluesselText = (t) => {
    const nr = (t.schluesselNr||"").trim() || (t.schluesselAnzahl||"").toString().trim();
    const extra = (t.extraSchluessel||"").trim();
    if (!nr && !extra) return null;
    return [nr && ("Schlüssel " + nr), extra && ("Zusatz: " + extra)].filter(Boolean).join(" · ");
  };
  const offeneSchluesselUebergaben = offene; // legacy alias fuer Tab-Badge
  
  function schluesselCat(daysTilEinzug) {
    if (daysTilEinzug == null) return { color:"#5a5a5a", bg:"#ececec", border:"#c5c5c5", label:"Kein Einzug gesetzt", icon:"❓" };
    if (daysTilEinzug < 0) return { color:"#9b4a3e", bg:"#fdebe5", border:"#e0bcb0", label:`${Math.abs(daysTilEinzug)} T. überfällig`, icon:"⚠️" };
    if (daysTilEinzug === 0) return { color:"#b8843e", bg:"#f9efdb", border:"#e8d2a8", label:"Einzug heute", icon:"🔴" };
    if (daysTilEinzug <= 7) return { color:"#b8843e", bg:"#f9efdb", border:"#e8d2a8", label:`Einzug in ${daysTilEinzug} T.`, icon:"🟠" };
    if (daysTilEinzug <= 30) return { color:"#5a6e4a", bg:"#e8eadb", border:"#c5cda8", label:`Einzug in ${daysTilEinzug} T.`, icon:"🟢" };
    return { color:"#5a6e4a", bg:"#e8eadb", border:"#c5cda8", label:`Einzug ${daysTilEinzug > 60 ? "in 2+ Mt." : "in 1 Mt."}`, icon:"📅" };
  }
  
  // ─── AUSZUG: Anstehende Auszüge ────────────────────────────────
  const reminders = tenants
    .filter(t => (t.status||"aktiv") === "aktiv")
    .filter(t => t.auszug && t.auszug.trim())
    .map(t => {
      const dt = parseD(t.auszug);
      if (!dt) return null;
      const daysLeft = Math.ceil((dt - heute) / (1000*60*60*24));
      const room = rooms.find(r => r.id === t.roomId);
      const apt = room ? apts.find(a => a.id === room.aptId) : null;
      let aptEndsToo = false;
      if (apt && apt.mietende) {
        const aptEnd = parseD(apt.mietende);
        if (aptEnd) {
          const diff = Math.abs((aptEnd - dt) / (1000*60*60*24));
          aptEndsToo = diff <= 14;
        }
      }
      return { tenant: t, room, apt, dt, daysLeft, aptEndsToo };
    })
    .filter(x => x && x.daysLeft >= -7 && x.daysLeft <= 90)
    .sort((a,b) => a.daysLeft - b.daysLeft);
  
  function reminderCat(daysLeft, aptEndsToo) {
    if (aptEndsToo) {
      if (daysLeft < 0) return { color:"#5a5a5a", bg:"#ececec", border:"#c5c5c5", label:"Wohnung geräumt", icon:"📦", action:"Übergabe an Eigentümer · Schlüssel zurück" };
      if (daysLeft <= 7) return { color:"#5a5a5a", bg:"#ececec", border:"#c5c5c5", label:"Räumung diese Woche", icon:"📦", action:"Wohnung räumen · Übergabe an Eigentümer/Verwaltung" };
      if (daysLeft <= 30) return { color:"#5a5a5a", bg:"#ececec", border:"#c5c5c5", label:"Räumung in 1 Monat", icon:"📦", action:"Räumungstermin koordinieren · Hauptmieter-Übergabe planen" };
      return { color:"#5a5a5a", bg:"#ececec", border:"#c5c5c5", label:"Wohnung läuft aus", icon:"📦", action:"Ganze Wohnung wird abgegeben - kein Nachmieter nötig" };
    }
    if (daysLeft < 0) return { color:"#9b4a3e", bg:"#fdebe5", border:"#e0bcb0", label:"Auszug überfällig", icon:"⚠️", action:"Übergabe + Schlüsselübergabe!" };
    if (daysLeft <= 7) return { color:"#9b4a3e", bg:"#fdebe5", border:"#e0bcb0", label:"Auszug diese Woche", icon:"🔴", action:"Übergabeprotokoll vorbereiten · Schlüssel-Termin" };
    if (daysLeft <= 30) return { color:"#b8843e", bg:"#f9efdb", border:"#e8d2a8", label:"Auszug in 1 Monat", icon:"🟠", action:"Nachmieter zuteilen · Übergabetermin vereinbaren" };
    if (daysLeft <= 60) return { color:"#b8843e", bg:"#f9efdb", border:"#e8d2a8", label:"Auszug in 2 Monaten", icon:"🟡", action:"Inserat schalten · Bewerber suchen" };
    return { color:"#5a6e4a", bg:"#e8eadb", border:"#c5cda8", label:"Auszug in ~3 Monaten", icon:"🟢", action:"Verlängerung anbieten oder Nachmieter suchen" };
  }
  
  async function archiveAndDismiss(tenant) {
    if (!tenant || !updateTenant) return;
    const ok = window.confirm(
      `${tenant.vorname} ${tenant.nachname} archivieren?\n\n` +
      `→ Mieter wird ins Archiv verschoben\n→ Zimmer wird freigegeben\n\n` +
      `Daten + Dokumente bleiben erhalten. Du findest den Mieter unter "📦 Alte Mieter".`
    );
    if (!ok) return;
    try {
      const myRoom = rooms.find(r => r.tenantId === tenant.id);
      if (myRoom && updateRoom) await updateRoom(myRoom.id, {tenantId: null, occupied: false});
      await updateTenant(tenant.id, {
        status: "archiviert",
        archivedAt: new Date().toISOString(),
        auszug: tenant.auszug || new Date().toLocaleDateString("de-CH"),
      });
    } catch (e) {
      console.error("Archivieren fehlgeschlagen:", e);
      alert("Archivieren fehlgeschlagen. Bitte erneut versuchen.");
    }
  }
  
  // ─── RENDER ──────────────────────────────────────────────────────
  const TAB_STYLE_BASE = {
    flex:1, padding:"10px 16px", border:"none", background:"transparent",
    fontSize:13, fontWeight:600, cursor:"pointer", letterSpacing:".02em",
    color:"#8a8174", transition:"all .15s", borderBottom:"2px solid transparent"
  };
  const TAB_STYLE_ACTIVE = {
    ...TAB_STYLE_BASE, color:"#1a1814", borderBottom:"2px solid #1a1814"
  };
  
  return (
    <div className="ph">
      <div className="pt">Übergaben</div>
      
      {/* Tab Header */}
      <div style={{display:"flex",borderBottom:"1px solid #e1d8c5",marginBottom:24}}>
        <button 
          onClick={()=>setTab("einzug")} 
          style={tab==="einzug" ? TAB_STYLE_ACTIVE : TAB_STYLE_BASE}
        >🔑 Einzug {offeneSchluesselUebergaben.length > 0 && <span style={{marginLeft:6,padding:"2px 8px",background:tab==="einzug"?"#1a1814":"#c5cda8",color:"#fefcf7",borderRadius:10,fontSize:10,fontWeight:700}}>{offeneSchluesselUebergaben.length}</span>}</button>
        <button 
          onClick={()=>setTab("auszug")} 
          style={tab==="auszug" ? TAB_STYLE_ACTIVE : TAB_STYLE_BASE}
        >📅 Auszug {reminders.length > 0 && <span style={{marginLeft:6,padding:"2px 8px",background:tab==="auszug"?"#1a1814":"#c5cda8",color:"#fefcf7",borderRadius:10,fontSize:10,fontWeight:700}}>{reminders.length}</span>}</button>
      </div>
      
      {/* EINZUG */}
      {tab === "einzug" && (
        <div>
          <div style={{marginBottom:16,fontSize:13,color:"#4a4439",lineHeight:1.5}}>
            Alle Mieter mit Zimmer-Zuteilung und ihr aktueller Übernahmeprotokoll-Status.
          </div>
          
          {/* FAELLIG (todo / waiting / review) */}
          {offene.length > 0 && (
            <>
              <div style={{fontSize:11,color:"#8a8478",textTransform:"uppercase",letterSpacing:".2em",fontWeight:700,marginBottom:10}}>Fällig ({offene.length})</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(min(280px, 100%), 1fr))",gap:10,marginBottom:24}}>
                {offene.map(s => {
                  const catCfg = {
                    "todo":    {bg:"#fdebe5",border:"#e0bcb0",color:"#9b4a3e",label:"Nicht gestartet",   icon:"⚠️"},
                    "waiting": {bg:"#fdf2e0",border:"#e8c89c",color:"#7a5c3c",label:"Läuft (Mieter)",     icon:"⏱"},
                    "review":  {bg:"#e0ecf5",border:"#a8c0d5",color:"#3a5570",label:"Zur Prüfung",       icon:"📥"},
                  }[s.kategorie];
                  const dayHint = s.daysTilEinzug != null ? (
                    s.daysTilEinzug < 0 ? `${Math.abs(s.daysTilEinzug)} T. überfällig` : 
                    s.daysTilEinzug === 0 ? "Einzug heute" : 
                    `Einzug in ${s.daysTilEinzug} T.`
                  ) : "kein Einzug gesetzt";
                  return (
                    <div key={s.tenant.id} style={{background:catCfg.bg,border:`1px solid ${catCfg.border}`,borderRadius:8,padding:"12px 14px"}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                        <div style={{fontSize:10,fontWeight:700,color:catCfg.color,letterSpacing:".05em",textTransform:"uppercase"}}>{catCfg.icon} {catCfg.label}</div>
                        <div style={{fontSize:10,color:catCfg.color,fontWeight:600}}>{dayHint}</div>
                      </div>
                      <div style={{fontSize:14,fontWeight:600,color:"#1a1814",marginBottom:2}}>{s.tenant.vorname} {s.tenant.nachname}</div>
                      <div style={{fontSize:11,color:"#4a4439",marginBottom:8}}>{s.room?.id||"-"} · {s.apt?.adresse||"-"} · Einzug {s.tenant.einzug || "–"}</div>
                      {schluesselText(s.tenant) && (
                        <div style={{fontSize:10.5,color:"#4a4439",marginBottom:8}}>🔑 {schluesselText(s.tenant)}</div>
                      )}
                      {s.latest && ["sent","in_progress"].includes(s.latest.status) && (
                        <div style={{fontSize:10.5,color:catCfg.color,marginBottom:8,padding:"3px 6px",background:"rgba(255,255,255,.4)",borderRadius:4}}>
                          Deadline: {new Date(s.latest.deadline).toLocaleDateString("de-CH")}
                        </div>
                      )}
                      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                        <button
                          onClick={(e)=>{e.stopPropagation(); if(s.kategorie==="todo") oeffneStart(s); else navigateTo&&navigateTo("mieter",s.tenant.id);}}
                          style={{flex:1,minWidth:0,background:"#1a1814",color:"#fefcf7",border:"none",borderRadius:6,padding:"7px 10px",fontSize:11,fontWeight:600,cursor:"pointer",letterSpacing:".02em"}}
                          title={s.kategorie==="todo" ? "Protokoll direkt starten" : "Mieter oeffnen"}
                        >
                          {s.kategorie === "todo" ? "📋 Protokoll starten" : s.kategorie === "review" ? "📥 Prüfen" : "🔍 Anzeigen"}
                        </button>
                        {s.kategorie !== "done" && (
                          <button
                            onClick={(e)=>{e.stopPropagation(); if(window.confirm("Übergabe ohne digitales Protokoll als erledigt markieren?")) updateTenant(s.tenant.id, {uebergabeStatus:"erledigt", uebergabeNotiz:"Manuell als erledigt markiert"});}}
                            style={{background:"transparent",color:"var(--muted)",border:"1px solid var(--line)",borderRadius:6,padding:"7px 10px",fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}
                            title="Ohne digitales Protokoll abschliessen, zum Beispiel bei altem Protokoll auf Papier"
                          >
                            ✓ Erledigt
                          </button>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </>
          )}
          
          {/* ERLEDIGT */}
          {erledigt.length > 0 && (
            <details style={{marginTop:4}}>
              <summary style={{fontSize:11,color:"#8a8478",textTransform:"uppercase",letterSpacing:".2em",fontWeight:700,cursor:"pointer",padding:"6px 0"}}>Erledigt ({erledigt.length})</summary>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(min(280px, 100%), 1fr))",gap:10,marginTop:10}}>
                {erledigt.map(s => (
                  <div key={s.tenant.id} style={{background:"#e8efde",border:"1px solid #c5d5b0",borderRadius:8,padding:"10px 12px",opacity:.88}}>

                      {(s.tenant.uebergabeStatus||"offen")==="erledigt" && (
                        <button
                          onClick={(e)=>{e.stopPropagation(); if(window.confirm("Wieder als offen markieren?")) updateTenant(s.tenant.id, {uebergabeStatus:"offen", uebergabeNotiz:""});}}
                          style={{fontSize:10.5,padding:"4px 10px",background:"transparent",color:"#8a6d4a",border:"1px solid #d8c9ab",borderRadius:4,cursor:"pointer"}}

                      )}
                    </div>
                  </div>
                ))}
              </div>
            </details>
          )}
          
          {offene.length === 0 && erledigt.length === 0 && (
            <div style={{padding:"40px 20px",textAlign:"center",background:"#fefcf7",border:"1px solid #e1d8c5",borderRadius:8,color:"#8a8174"}}>
              <div style={{fontSize:32,marginBottom:8,opacity:.5}}>🔑</div>
              <div style={{fontSize:14,fontWeight:500}}>Keine Mieter mit Zimmer-Zuteilung</div>
            </div>
          )}
        </div>
      )}
      
      {/* AUSZUG */}
      {tab === "auszug" && (
        <div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
            <div style={{fontSize:13,color:"#4a4439",lineHeight:1.5}}>
              Anstehende Auszüge in den nächsten 3 Monaten (sortiert nach Datum).
            </div>
          </div>
          {reminders.length === 0 ? (
            <div style={{padding:"40px 20px",textAlign:"center",background:"#fefcf7",border:"1px solid #e1d8c5",borderRadius:8,color:"#8a8174"}}>
              <div style={{fontSize:32,marginBottom:8}}>📅</div>
              <div style={{fontSize:14,fontWeight:600,color:"#5a6e4a",marginBottom:4}}>Keine Auszüge in den nächsten 3 Monaten</div>
              <div style={{fontSize:11}}>Mieter mit Auszugsdatum erscheinen hier ab 90 Tagen vorher.</div>
            </div>
          ) : (
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(min(280px, 100%), 1fr))",gap:10}}>
              {reminders.map(r => {
                const cat = reminderCat(r.daysLeft, r.aptEndsToo);
                return (
                  <div key={r.tenant.id} style={{background:cat.bg,border:`1px solid ${cat.border}`,borderRadius:8,padding:"12px 14px",transition:"all .15s"}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                      <div style={{fontSize:10,fontWeight:700,color:cat.color,letterSpacing:".05em",textTransform:"uppercase"}}>{cat.icon} {cat.label}</div>
                      <div style={{fontSize:10,color:cat.color,fontWeight:600}}>{r.daysLeft < 0 ? `${Math.abs(r.daysLeft)} T. überfällig` : `in ${r.daysLeft} Tagen`}</div>
                    </div>
                    <div style={{fontSize:14,fontWeight:600,color:"#1a1814",marginBottom:2}}>{r.tenant.vorname} {r.tenant.nachname}</div>
                    <div style={{fontSize:11,color:"#4a4439",marginBottom:6}}>{r.room?.id||"-"} · {r.apt?.adresse||"-"} · {r.tenant.auszug}</div>
                    {r.aptEndsToo && (
                      <div style={{fontSize:10,color:"#5a5a5a",background:"rgba(0,0,0,.05)",padding:"4px 8px",borderRadius:4,marginBottom:8,display:"inline-block",fontWeight:600,letterSpacing:".02em"}}>
                        📅 Hauptmietvertrag endet {r.apt?.mietende}
                      </div>
                    )}
                    <div style={{fontSize:10,color:cat.color,fontStyle:"italic",lineHeight:1.4,marginBottom:10}}>→ {cat.action}</div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      {!r.aptEndsToo && (
                        <button 
                          onClick={(e)=>{e.stopPropagation();navigateTo&&navigateTo("bewerber",{nachmieterFor:r.room?.id});}}
                          style={{flex:1,minWidth:0,background:"#1a1814",color:"#fefcf7",border:"none",borderRadius:6,padding:"7px 10px",fontSize:11,fontWeight:600,cursor:"pointer",letterSpacing:".02em",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}
                          title={`Nachmieter für ${r.room?.id} suchen/zuteilen`}
                        >🏠 Nachmieter zuteilen</button>
                      )}
                      <button
                        onClick={(e)=>{e.stopPropagation();archiveAndDismiss(r.tenant);}}
                        style={{background:"#5a6e4a",color:"#fefcf7",border:"none",borderRadius:6,padding:"7px 10px",fontSize:11,fontWeight:600,cursor:"pointer",letterSpacing:".02em",whiteSpace:"nowrap"}}
                        title={r.aptEndsToo ? "Wohnung abgegeben - Mieter archivieren" : "Übergabe erfolgt - Mieter archivieren"}
                      >✓ Erledigt</button>
                      <button
                        onClick={(e)=>{e.stopPropagation();navigateTo&&navigateTo("mieter",r.tenant.id);}}
                        style={{flex: r.aptEndsToo ? 1 : 0,background:"transparent",color:cat.color,border:`1px solid ${cat.border}`,borderRadius:6,padding:"7px 10px",fontSize:11,fontWeight:600,cursor:"pointer",letterSpacing:".02em"}}
                        title="Mieter-Details öffnen"
                      >Details</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {startFor && (
        <div onClick={()=>!starting&&setStartFor(null)} style={{position:"fixed",inset:0,background:"rgba(26,24,20,.45)",display:"flex",alignItems:"center",justifyContent:"center",padding:16,zIndex:1000}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"var(--surface)",borderRadius:12,padding:"20px 20px 16px",maxWidth:420,width:"100%",boxShadow:"0 10px 40px rgba(0,0,0,.2)"}}>
            <div style={{fontFamily:"Georgia,'Times New Roman',serif",fontSize:18,color:"var(--ink)",marginBottom:4}}>Protokoll starten</div>
            <div style={{fontSize:12,color:"var(--muted)",marginBottom:16,lineHeight:1.5}}>
              {startFor.tenant.vorname} {startFor.tenant.nachname} · {startFor.room?.id||"-"} · {startFor.apt?.adresse||"-"}<br/>
              Der Mieter erhält einen Link und hat 14 Tage Zeit, das Protokoll auszufüllen.
            </div>
            <label style={{display:"block",fontSize:10,textTransform:"uppercase",letterSpacing:".18em",color:"var(--muted)",marginBottom:5}}>Schlüsselnummer</label>
            <input value={sNr} onChange={e=>setSNr(e.target.value)} placeholder="z.B. 1-LA008031-31.2"
              style={{width:"100%",padding:"8px 10px",border:"1px solid var(--line)",borderRadius:6,fontSize:13,marginBottom:12,fontFamily:"inherit"}}/>
            <label style={{display:"block",fontSize:10,textTransform:"uppercase",letterSpacing:".18em",color:"var(--muted)",marginBottom:5}}>Zusätzliche Schlüssel</label>
            <textarea value={sExtra} onChange={e=>setSExtra(e.target.value)} rows={2} placeholder="z.B. Eingangstür Wohnung"
              style={{width:"100%",padding:"8px 10px",border:"1px solid var(--line)",borderRadius:6,fontSize:13,marginBottom:16,fontFamily:"inherit",resize:"vertical"}}/>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button className="btn btn-g btn-sm" disabled={starting} onClick={()=>setStartFor(null)}>Abbrechen</button>
              <button className="btn btn-sm" disabled={starting}
                onClick={async ()=>{
                  setStarting(true);
                  try {
                    const nrTrim = sNr.trim(), extraTrim = sExtra.trim();
                    const t = startFor.tenant;
                    await updateTenant(t.id, {
                      schluessel_nr: nrTrim,
                      extra_schluessel: extraTrim,
                      schluessel_uebergeben: !!(nrTrim || extraTrim),
                    });
                    const snapshot = [
                      nrTrim && `Schlüsselnummer: ${nrTrim}`,
                      extraTrim && `Extra-Schlüssel:\n${extraTrim}`
                    ].filter(Boolean).join("\n\n");
                    await startHandoverProtocol({
                      tenantId: t.id,
                      aptId: startFor.apt?.id,
                      roomId: startFor.room?.id,
                      mieterEmail: t.email,
                      mieterVorname: t.vorname,
                      mieterNachname: t.nachname,
                      mieterGeburtsdatum: t.geburt || null,
                      mieterNationalitaet: t.nat || null,
                      mieterTelefon: t.phone || null,
                      aptAdresse: startFor.apt?.adresse || null,
                      aptPlz: startFor.apt?.plz || null,
                      aptOrt: startFor.apt?.ort || null,
                      roomLabel: startFor.room?.id || null,
                      einzugDatum: t.einzug || null,
                      schluesselInfo: snapshot || null,
                    });
                    setStartFor(null);
                  } catch(e) {
                    alert("Fehler: " + (e.message || e));
                  }
                  setStarting(false);
                }}>{starting ? "Starte..." : "Protokoll starten"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Dashboard({apts,rooms,tenants,bewerber,navigateTo,updateTenant,updateRoom}){
  const heute=new Date();
  
  // ─── SEPARATE WG vs AIRBNB ─────────────────────────────────────
  const wgApts = apts.filter(a=>a.type==="WG" && !a.pipeline).sort((a,b)=>natSort(a.id, b.id));
  const airbnbApts = apts.filter(a=>a.type==="Airbnb" && !a.pipeline).sort((a,b)=>natSort(a.id, b.id));
  const wgIds = wgApts.map(a=>a.id);
  const airbnbIds = airbnbApts.map(a=>a.id);
  const wgRooms = rooms.filter(r=>wgIds.includes(r.aptId));
  
  // ─── KAUTIONS-AUFSCHLÄGE ───────────────────────────────────────
  // Mieter, die einen monatlichen Aufschlag wegen reduzierter Kaution zahlen
  // (archivierte Mieter ausschliessen - sie zahlen nicht mehr)
  const aufschlagMieter = tenants
    .filter(t => (t.status||"aktiv") === "aktiv")
    .map(t => {
      // Mehrere Wege um das Zimmer zu finden
      let room = rooms.find(r => r.id === t.roomId);
      if (!room) room = rooms.find(r => r.tenantId === t.id);
      let apt = room ? apts.find(a => a.id === room.aptId) : null;
      if (!apt && t.aptId) apt = apts.find(a => a.id === t.aptId);
      let aufschlag = +t.kautionAufschlag || 0;
      // Fallback: aus kautionOpt ableiten falls Aufschlag nicht gesetzt
      if (!aufschlag) {
        if (t.kautionOpt === "0x") aufschlag = 150;
        else if (t.kautionOpt === "1x") aufschlag = 100;
        else if (t.kautionOpt === "2x") aufschlag = 50;
      }
      return { tenant: t, room, apt, aufschlag };
    })
    .filter(x => x.aufschlag > 0);
  const totalAufschlagMonat = aufschlagMieter.reduce((s,x) => s + x.aufschlag, 0);
  
  // WG calculations - IMMER inkl. Strom (CHF 25/belegtem Zimmer) und Kautions-Aufschlag
  const wgAusgaben = wgApts.reduce((s,a)=>s+(+a.miete||0),0);
  
  // Strom: CHF 25 pro belegtem Zimmer (Pauschale)
  const wgOcc = wgRooms.filter(r=>r.occupied).length;
  const wgStromIst = wgOcc * 25;
  const wgStromMax = wgRooms.length * 25; // bei Vollbelegung
  
  // Aufschlag: Summe aller monatlichen Kautions-Aufschläge der aktiven Mieter in den WGs
  const wgTenantIds = new Set(wgRooms.filter(r=>r.tenantId).map(r=>r.tenantId));
  const wgAufschlag = tenants
    .filter(t => (t.status||"aktiv") === "aktiv")
    .filter(t => wgTenantIds.has(t.id))
    .reduce((s,t) => s + (+t.kautionAufschlag || 0), 0);
  
  // Einnahmen = Zimmer-Miete + Strom + Aufschlag (alles inkl.)
  const wgEinnahmenIst = wgRooms.filter(r=>r.occupied).reduce((s,r)=>s+(+r.miete||0),0) + wgStromIst + wgAufschlag;
  const wgEinnahmenMax = wgRooms.reduce((s,r)=>s+(+r.miete||0),0) + wgStromMax + wgAufschlag;
  
  const wgMargeIst = wgEinnahmenIst - wgAusgaben;
  const wgMargeMax = wgEinnahmenMax - wgAusgaben;
  const wgLeerstand = wgEinnahmenMax - wgEinnahmenIst;
  const wgFree = wgRooms.filter(r=>!r.occupied);
  const wgAuslastung = wgRooms.length ? Math.round(wgOcc/wgRooms.length*100) : 0;
  
  // Airbnb calculations (whole apt = 1 unit, no rooms)
  const abAusgaben = airbnbApts.reduce((s,a)=>s+(+a.miete||0),0);
  // For Airbnb income we assume the apt rent IS the cost; income comes from bookings (data not in system yet)
  // For now: Airbnb is shown as cost only - income tracking future feature
  
  // ─── PIPELINE calculations (gleiche Logik wie WG, separate Anzeige) ──────
  const pipelineApts = apts.filter(a=>!!a.pipeline).sort((a,b)=>natSort(a.id, b.id));
  const pipelineIds = pipelineApts.map(a=>a.id);
  const pipelineRooms = rooms.filter(r=>pipelineIds.includes(r.aptId));
  const pipelineAusgaben = pipelineApts.reduce((s,a)=>s+(+a.miete||0),0);
  const pipelineOcc = pipelineRooms.filter(r=>r.occupied).length;
  const pipelineStromIst = pipelineOcc * 25;
  const pipelineStromMax = pipelineRooms.length * 25;
  const pipelineTenantIds = new Set(pipelineRooms.filter(r=>r.tenantId).map(r=>r.tenantId));
  const pipelineAufschlag = tenants
    .filter(t => (t.status||"aktiv") === "aktiv")
    .filter(t => pipelineTenantIds.has(t.id))
    .reduce((s,t) => s + (+t.kautionAufschlag || 0), 0);
  const pipelineEinnahmenIst = pipelineRooms.filter(r=>r.occupied).reduce((s,r)=>s+(+r.miete||0),0) + pipelineStromIst + pipelineAufschlag;
  const pipelineEinnahmenMax = pipelineRooms.reduce((s,r)=>s+(+r.miete||0),0) + pipelineStromMax + pipelineAufschlag;
  const pipelineMargeIst = pipelineEinnahmenIst - pipelineAusgaben;
  const pipelineMargeMax = pipelineEinnahmenMax - pipelineAusgaben;
  const pipelineAuslastung = pipelineRooms.length ? Math.round(pipelineOcc/pipelineRooms.length*100) : 0;
  
  // Total
  const totalAusgaben = wgAusgaben + abAusgaben;
  const totalEinnahmenIst = wgEinnahmenIst; // Airbnb income not tracked
  const totalMargeIst = totalEinnahmenIst - totalAusgaben;

  const incomplete=tenants.filter(t=>(t.status||"aktiv")==="aktiv" && (!t.email||!t.phone||!t.geburt));
  const neueBewerber=bewerber.filter(b=>b.status==="Neu"||b.status==="In Prüfung");
  const baldEnde=apts.filter(a=>!a.pipeline && (()=>{const d=parseDMY(a.mietende);return d&&(d-heute)/86400000<120;})());

  return(
    <div>
      <div className="pt">Dashboard</div>
      <div className="ps">D&T Homes · {new Date().toLocaleDateString("de-CH")}</div>

      {/* TOTAL OVERVIEW - 3-column hero */}
      <div className="dash-hero" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16,marginBottom:24}}>
        <div onClick={()=>navigateTo&&navigateTo("wohnungen",null)} style={{background:"#fefcf7",border:"1px solid #e1d8c5",borderRadius:8,padding:"24px 26px",cursor:"pointer",transition:"all .15s"}} onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 4px 16px rgba(160,136,100,.12)";}} onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="none";}}>
          <div style={{fontSize:9,color:"#8a8174",textTransform:"uppercase",letterSpacing:".3em",fontWeight:500,marginBottom:14}}>Total Ausgaben / Mt.</div>
          <div style={{fontFamily:"'Manrope',sans-serif",fontSize:32,fontWeight:300,color:"#1a1814",lineHeight:1,marginBottom:6}}>{chf(totalAusgaben)}</div>
          <div style={{fontSize:11,color:"#8a8174",letterSpacing:".05em"}}>{wgApts.length} WG + {airbnbApts.length} Airbnb</div>
        </div>
        <div onClick={()=>navigateTo&&navigateTo("wohnungen",null)} style={{background:wgMargeIst>=0?"#e8eadb":"#f0dcd5",border:`1px solid ${wgMargeIst>=0?"#c5cda8":"#e0bcb0"}`,borderRadius:8,padding:"24px 26px",cursor:"pointer",transition:"all .15s"}} onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,.08)";}} onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="none";}}>
          <div style={{fontSize:9,color:"#5a6e4a",textTransform:"uppercase",letterSpacing:".3em",fontWeight:500,marginBottom:14}}>WG-Marge aktuell / Mt.</div>
          <div style={{fontFamily:"'Manrope',sans-serif",fontSize:32,fontWeight:400,color:wgMargeIst>=0?"#3d4f2f":"#9b4a3e",lineHeight:1,marginBottom:6}}>{wgMargeIst>=0?"+":""}{chf(wgMargeIst)}</div>
          <div style={{fontSize:11,color:"#5a6e4a",letterSpacing:".05em"}}>WG-Einnahmen − WG-Ausgaben</div>
        </div>
        <div onClick={()=>navigateTo&&navigateTo("zimmer",null)} style={{background:"#1a1814",borderRadius:8,padding:"24px 26px",color:"#fefcf7",cursor:"pointer",transition:"all .15s"}} onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,.2)";}} onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="none";}}>
          <div style={{fontSize:9,color:"#b8af9f",textTransform:"uppercase",letterSpacing:".3em",fontWeight:500,marginBottom:14}}>WG-Marge maximal / Mt.</div>
          <div style={{fontFamily:"'Manrope',sans-serif",fontSize:32,fontWeight:400,color:"#fefcf7",lineHeight:1,marginBottom:6}}>+{chf(wgMargeMax)}</div>
          <div style={{fontSize:11,color:"#b8af9f",letterSpacing:".05em"}}>Bei 100% Belegung</div>
        </div>
      </div>

      <div style={{fontFamily:"'Manrope',sans-serif",fontSize:18,fontWeight:600,color:"#1a1814",marginBottom:14,marginTop:8,letterSpacing:".01em"}}>WG-Wohnungen</div>
      <div className="sg" style={{marginBottom:18}}>
        <div className="sc"><div className="sl">Auslastung</div><div className="sv">{wgAuslastung}%</div><div className="sn" style={{color:wgAuslastung>=80?"#5a6e4a":wgAuslastung>=50?"#b8843e":"#9b4a3e"}}>{wgOcc}/{wgRooms.length} Zimmer</div></div>
        <div className="sc"><div className="sl">Ausgaben</div><div className="sv" style={{fontSize:24}}>{chf(wgAusgaben).replace("CHF ","")}</div><div className="sn" style={{color:"#8a8174"}}>CHF / Mt.</div></div>
        <div className="sc"><div className="sl">Einnahmen Ist</div><div className="sv" style={{fontSize:24,color:"#5a6e4a"}}>{chf(wgEinnahmenIst).replace("CHF ","")}</div><div className="sn" style={{color:"#8a8174"}}>von max. {chf(wgEinnahmenMax)}</div></div>
        <div className="sc"><div className="sl">Leerstand</div><div className="sv" style={{fontSize:24,color:wgLeerstand>0?"#9b4a3e":"#5a6e4a"}}>{wgLeerstand>0?"−":""}{chf(wgLeerstand).replace("CHF ","")}</div><div className="sn" style={{color:"#8a8174"}}>{wgFree.length} freie Zimmer</div></div>
      </div>
      {wgFree.length>0&&<div className="warn">⚠ <strong>{wgFree.length} WG-Zimmer frei:</strong> {wgFree.map(r=>`${r.id} (${chf(r.miete)}/Mt.${r.balkon?" 🌿":""})`).join(" · ")}</div>}

      {neueBewerber.length>0&&<div className="warn">📋 <strong>{neueBewerber.length} Bewerber</strong> warten auf Bearbeitung</div>}
      {baldEnde.length>0&&<div className="warn-r">🗓 <strong>Mietende &lt;120 Tage:</strong> {baldEnde.map(a=>{const d=parseDMY(a.mietende);return `${a.id} → ${a.mietende} (${Math.ceil((d-heute)/86400000)}d)`;}).join(" · ")}</div>}

      {/* PER-APARTMENT FINANCE BREAKDOWN - separated WG / Airbnb */}
      <div className="card finance-card-compact" style={{marginBottom:24}}>
        <div className="ct">Finanzübersicht - WG-Wohnungen</div>
        <div className="finance-scroll-table-wrap">
        <div className="finance-scroll-table">
        <table>
          <thead>
            <tr>
              <th>ID</th><th>Adresse</th>
              <th>Zimmer</th>
              <th>Stock</th>
              <th style={{textAlign:"right"}}>Ausgabe</th>
              <th style={{textAlign:"right"}}>Einnahme Ist</th>
              <th style={{textAlign:"right"}}>Einnahme Max</th>
              <th style={{textAlign:"right"}}>Marge Ist</th>
              <th style={{textAlign:"right"}}>Marge Max</th>
              <th style={{textAlign:"right"}}>Aufschlag</th>
              <th style={{textAlign:"right"}}>Marge Total</th>
              <th>Belegung</th>
            </tr>
          </thead>
          <tbody>
            {wgApts.map(a=>{
              const rs=rooms.filter(r=>r.aptId===a.id);
              const aOcc=rs.filter(r=>r.occupied).length;
              // Strom: CHF 25 pro Zimmer (Pauschale)
              const aStromIst = aOcc * 25;                  // bei aktueller Belegung
              const aStromMax = rs.length * 25;             // bei Vollbelegung
              // Einnahmen IMMER inkl. Strom
              const aIst = rs.filter(r=>r.occupied).reduce((s,r)=>s+(+r.miete||0),0) + aStromIst;
              const aMax = rs.reduce((s,r)=>s+(+r.miete||0),0) + aStromMax;
              // Kautionsaufschläge pro Wohnung: alle Mieter deren Zimmer in dieser Wohnung sind
              // WICHTIG: Über rooms.tenantId suchen (das ist der echte Foreign Key)
              // Archivierte Mieter ausschliessen
              const aAufschlag = tenants
                .filter(t => (t.status||"aktiv") === "aktiv")
                .filter(t => {
                  // Weg 1: Direkter aptId-Match
                  if (t.aptId === a.id) return true;
                  // Weg 2: Mieter über roomId zur Wohnung
                  if (t.roomId) {
                    const tRoom = rooms.find(r => r.id === t.roomId);
                    if (tRoom && tRoom.aptId === a.id) return true;

                  if (myRoom && myRoom.aptId === a.id) return true;
                  return false;

                    else if (t.kautionOpt === "1x") auf = 100;

                  return s + auf;

function formatDateLong(dateStr){
  if (!dateStr) return "____";
  const d = typeof dateStr === "string" ? new Date(dateStr.includes("-") ? dateStr : dateStr.split(".").reverse().join("-")) : dateStr;
  if (isNaN(d.getTime())) return dateStr;
  const months = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
  return `${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()}`;
}

<div class="or-page">
<h1>Auszug aus den massgeblichen Bestimmungen des Schweizerischen Obligationenrechts</h1>
<div style="font-size:8pt;color:#444;margin-bottom:6pt;font-style:italic">Achter Titel: Die Miete · Zweiter Abschnitt: Schutz vor missbräuchlichen Mietzinsen und anderen missbräuchlichen Forderungen des Vermieters bei der Miete von Wohn- und Geschäftsräumen</div>

<div class="or-cols">
  <h2>Art. 269 (A. Missbräuchliche Mietzinse. I. Regel)</h2>
  <p>Mietzinse sind missbräuchlich, wenn damit ein übersetzter Ertrag aus der Mietsache erzielt wird oder wenn sie auf einem offensichtlich übersetzten Kaufpreis beruhen.</p>
  
  <h2>Art. 269a (II. Ausnahmen)</h2>
  <p>Mietzinse sind in der Regel nicht missbräuchlich, wenn sie insbesondere:</p>
  <p>a. im Rahmen der orts- oder quartierüblichen Mietzinse liegen;<br>
  b. durch Kostensteigerungen oder Mehrleistungen des Vermieters begründet sind;<br>
  c. bei neueren Bauten im Rahmen der kostendeckenden Bruttorendite liegen;<br>
  d. lediglich dem Ausgleich einer Mietzinsverbilligung dienen, die zuvor durch Umlagerung marktüblicher Finanzierungskosten gewährt wurde, und in einem dem Mieter im voraus bekanntgegebenen Zahlungsplan festgelegt sind;<br>
  e. lediglich die Teuerung auf dem risikotragenden Kapital ausgleichen;<br>
  f. das Ausmass nicht überschreiten, das Vermieter- und Mieterverbände oder Organisationen, die ähnliche Interessen wahrnehmen, in ihren Rahmenverträgen empfehlen.</p>
  
  <h2>Art. 269b (B. Indexierte Mietzinse)</h2>
  <p>Die Vereinbarung, dass der Mietzins einem Index folgt, ist nur gültig, wenn der Mietvertrag für mindestens fünf Jahre abgeschlossen und als Index der Landesindex der Konsumentenpreise vorgesehen wird.</p>
  
  <h2>Art. 269c (C. Gestaffelte Mietzinse)</h2>
  <p>Die Vereinbarung, dass sich der Mietzins periodisch um einen bestimmten Betrag erhöht, ist nur gültig, wenn:<br>
  a. der Mietvertrag für mindestens drei Jahre abgeschlossen wird;<br>
  b. der Mietzins höchstens einmal jährlich erhöht wird; und<br>
  c. der Betrag der Erhöhung in Franken festgelegt wird.</p>
  
  <h2>Art. 269d (D. Mietzinserhöhungen)</h2>
  <p><strong>1</strong> Der Vermieter kann den Mietzins jederzeit auf den nächstmöglichen Kündigungstermin erhöhen. Er muss dem Mieter die Mietzinserhöhung mindestens zehn Tage vor Beginn der Kündigungsfrist auf einem vom Kanton genehmigten Formular mitteilen und begründen.</p>
  <p><strong>2</strong> Die Mietzinserhöhung ist nichtig, wenn der Vermieter:<br>
  a. sie nicht mit dem vorgeschriebenen Formular mitteilt;<br>
  b. sie nicht begründet;<br>
  c. mit der Mitteilung die Kündigung androht oder ausspricht.</p>
  <p><strong>3</strong> Die Absätze 1 und 2 gelten auch, wenn der Vermieter beabsichtigt, sonstwie den Mietvertrag einseitig zu Lasten des Mieters zu ändern.</p>
  
  <h2>Art. 270 (E. Anfechtung des Mietzinses I.)</h2>
  <p><strong>1</strong> Der Mieter kann den Anfangsmietzins innert 30 Tagen nach Übernahme der Sache bei der Schlichtungsbehörde als missbräuchlich im Sinne der Artikel 269 und 269a anfechten und dessen Herabsetzung verlangen, wenn:<br>
  a. er sich wegen einer persönlichen oder familiären Notlage oder wegen der Verhältnisse auf dem örtlichen Markt für Wohn- und Geschäftsräume zum Vertragsabschluss gezwungen sah; oder<br>
  b. der Vermieter den Anfangsmietzins gegenüber dem früheren Mietzins für dieselbe Sache erheblich erhöht hat.</p>
  
  <h2>Art. 270a (2. Während der Mietdauer)</h2>
  <p><strong>1</strong> Der Mieter kann den Mietzins als missbräuchlich anfechten und die Herabsetzung auf den nächstmöglichen Kündigungstermin verlangen, wenn er Grund zur Annahme hat, dass der Vermieter wegen einer wesentlichen Änderung der Berechnungsgrundlagen einen übersetzten Ertrag aus der Mietsache erzielt.</p>
  
  <h2>Art. 270b (II. Anfechtung von Mietzinserhöhungen)</h2>
  <p><strong>1</strong> Der Mieter kann eine Mietzinserhöhung innert 30 Tagen, nachdem sie ihm mitgeteilt worden ist, bei der Schlichtungsbehörde als missbräuchlich anfechten.</p>
  
  <h2>Art. 270e (F. Weitergeltung des Mietvertrags)</h2>
  <p>Der bestehende Mietvertrag gilt unverändert weiter:<br>
  a. während des Schlichtungsverfahrens, wenn zwischen den Parteien keine Einigung zustandekommt, und<br>
  b. während des Gerichtsverfahrens, unter Vorbehalt vorsorglicher Massnahmen des Richters.</p>
