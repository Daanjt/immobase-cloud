                {b.status!=="Abgelehnt"&&b.status!=="Zugeteilt"&&<button className="btn btn-r btn-sm" onClick={()=>setStatus(b.id,"Abgelehnt")}>✗ Ablehnen</button>}
              </div>
            </div>

            {b.zimmerWunsch&&!b.zugeteiltes_zimmer&&(()=>{
              const wRoom=rooms.find(r=>r.id===b.zimmerWunsch);
              const wApt=wRoom?apts.find(a=>a.id===wRoom.aptId):null;
              const stillFree=wRoom&&!wRoom.occupied;
              return(
                <div style={{background:stillFree?"#f5efe4":"#f6ecd8",border:`1px solid ${stillFree?"rgba(160,136,100,.4)":"rgba(200,150,83,.4)"}`,borderRadius:8,padding:"12px 14px",marginBottom:12}}>
                  <div style={{fontSize:9.5,color:"#8a8478",textTransform:"uppercase",letterSpacing:".4px",marginBottom:8,fontWeight:700}}>💭 Wunschzimmer</div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16,color:stillFree?"#a08864":"#c89653"}}>{b.zimmerWunsch}</div>
                      <div style={{fontSize:11.5,color:"#8a8478",marginTop:2}}>{wApt?.adresse||"—"}{wRoom?.balkon?" · 🌿":""}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,color:"#5a7c5e",fontSize:14}}>{wRoom?chf(wRoom.miete):"—"}/Mt.</div>
                      <div style={{fontSize:10.5,marginTop:3}}>{stillFree?<Bdg label="○ noch frei" color="g"/>:<Bdg label="● belegt" color="y"/>}</div>
                    </div>
                  </div>
                </div>
              );
            })()}

            <div className="igrid" style={{marginBottom:16}}>
              {[
                ["E-Mail",b.email?<a href={`mailto:${b.email}`}>{b.email}</a>:"—"],
                ["Telefon",b.phone?<a href={`tel:${b.phone}`}>{b.phone}</a>:"—"],
                ["Geburtsdatum",b.geburt?new Date(b.geburt).toLocaleDateString("de-CH"):"—"],
                ["Geschlecht",b.gender||"—"],
                ["Nationalität",b.nat||"—"],
                ["Adresse",b.adresse?`${b.adresse}, ${b.plz} ${b.ort}`:"—"],
                ["Beschäftigung",b.type||"—"],
                ["Beruf",b.job||"—"],
                ["Nettoeinkommen",b.einkommen?chf(b.einkommen):"—"],
                ["Arbeitgeber",b.arbeitgeber||"—"],
                ["Gewünschter Einzug",b.einzug?new Date(b.einzug).toLocaleDateString("de-CH"):"—"],
                ["Aufenthaltsdauer",b.aufenthalt||"—"],
                ["Keine Betreibung",b.noDebt?<Bdg label="✓ Bestätigt" color="g"/>:<Bdg label="— Nicht bestätigt" color="y"/>],
              ].map(([l,v])=>(<div key={l} className="ig"><label>{l}</label><span>{v}</span></div>))}
            </div>

            <div style={{background:"#fafaf7",border:"1px solid #2a2d3e",borderRadius:8,padding:"12px 14px",marginBottom:12}}>
              <div style={{fontSize:9.5,color:"#8a8478",textTransform:"uppercase",letterSpacing:".4px",marginBottom:9,fontWeight:700}}>💰 Gewählte Konditionen</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                <div>
                  <div style={{fontSize:10,color:"#8a8478",marginBottom:3,textTransform:"uppercase"}}>Kaution</div>
                  <div style={{fontSize:12.5,color:"#3a352d",fontWeight:500}}>{b.kautionType||"—"}</div>
                  {b.kautionAufschlag>0&&<div style={{fontSize:11,color:"#c89653",marginTop:2}}>+ CHF {b.kautionAufschlag}.– / Monat</div>}
                  {b.kautionAufschlag===0&&<div style={{fontSize:11,color:"#5a7c5e",marginTop:2}}>Kein Aufschlag</div>}
                </div>
                <div>
                  <div style={{fontSize:10,color:"#8a8478",marginBottom:3,textTransform:"uppercase"}}>Möblierung</div>
                  <div style={{fontSize:12.5,color:"#3a352d",fontWeight:500}}>{b.moebliert==="ja"?"🛋 Möbliert":b.moebliert==="nein"?"📦 Unmöbliert":"—"}</div>
                  {b.moeblierungPauschale>0&&<div style={{fontSize:11,color:"#a78bfa",marginTop:2}}>CHF {b.moeblierungPauschale}.– einmalig</div>}
                </div>
              </div>
            </div>

            {b.bemerkung&&(<div style={{background:"#fafaf7",border:"1px solid #2a2d3e",borderRadius:7,padding:"10px 13px",marginBottom:12}}><div style={{fontSize:9.5,color:"#8a8478",textTransform:"uppercase",marginBottom:5}}>Bemerkung</div><div style={{fontSize:12.5,lineHeight:1.6}}>{b.bemerkung}</div></div>)}

            {b.zugeteiltes_zimmer&&(<div style={{background:"#eaeee2",border:"1px solid rgba(90,124,94,.3)",borderRadius:7,padding:"10px 13px",marginTop:12}}><div style={{fontSize:12,color:"#5a7c5e"}}>✓ Zugeteilt zu Zimmer <strong>{b.zugeteiltes_zimmer}</strong></div></div>)}
          </div>
        ):<div className="card" style={{margin:0,display:"flex",alignItems:"center",justifyContent:"center",minHeight:200}}><span style={{color:"#8a8478",fontSize:12}}>← Bewerber wählen</span></div>}
      </div>

      {zuteilModal&&b&&(
        <div className="ov" onClick={e=>e.target===e.currentTarget&&setZuteilModal(false)}>
          <div className="modal">
            <div className="mt">🏠 Zimmer zuteilen</div>
            <div style={{background:"#f5efe4",border:"1px solid #2a2d3e",borderRadius:8,padding:"10px 13px",marginBottom:16,fontSize:12.5}}>
              <strong style={{color:"#1f1d18"}}>{b.vorname} {b.nachname}</strong>
            </div>
            <div style={{fontSize:10,color:"#8a8478",textTransform:"uppercase",marginBottom:10}}>Freie Zimmer ({freeRooms.length})</div>
            {freeRooms.length===0?<div className="empty">Aktuell keine freien Zimmer</div>:[...freeRooms].sort((a,c)=>{if(a.id===b.zimmerWunsch)return -1;if(c.id===b.zimmerWunsch)return 1;return 0;}).map(r=>{
              const apt=apts.find(a=>a.id===r.aptId);
              const isWunsch=r.id===b.zimmerWunsch;
              return(
                <div key={r.id} className={`zimmer-option${selZimmer===r.id?" sel":""}`} onClick={()=>setSelZimmer(r.id)} style={isWunsch?{borderColor:"#a08864",background:selZimmer===r.id?"#eaeee2":"#f5efe4"}:undefined}>
                  <div>
                    <div style={{fontWeight:600,fontSize:13,color:selZimmer===r.id?"#5a7c5e":isWunsch?"#a08864":"#1f1d18",display:"flex",alignItems:"center",gap:7}}>{r.id}{isWunsch&&<Bdg label="💭 Wunsch" color="b"/>}</div>
                    <div style={{fontSize:11,color:"#8a8478",marginTop:2}}>{apt?.adresse}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontWeight:600,color:"#5a7c5e",fontSize:13}}>{chf(r.miete)}/Mt.</div>
                    <div style={{fontSize:10.5,color:"#8a8478"}}>{r.balkon?"🌿 Balkon":""}</div>
                  </div>
                </div>
              );
            })}
            <div className="fg" style={{marginTop:14}}><label className="fl">Einzugsdatum</label><input className="fi" type="date" value={einzugDate} onChange={e=>setEinzugDate(e.target.value)}/></div>
            <div className="ma">
              <button className="btn btn-g" onClick={()=>setZuteilModal(false)}>Abbrechen</button>
              <button className="btn btn-gr" onClick={confirmZuteilung} disabled={!selZimmer}>✓ Zuteilung bestätigen</button>
            </div>
          </div>
        </div>
      )}

      {editModal&&b&&(
        <div className="ov" onClick={e=>e.target===e.currentTarget&&setEditModal(false)}>
          <div className="modal" style={{width:620}}>
            <div className="mt">✏ Bewerber bearbeiten</div>

            <div style={{fontSize:9.5,color:"#8a8174",textTransform:"uppercase",letterSpacing:".25em",marginBottom:10,fontWeight:500}}>Persönliche Angaben</div>
            <div className="frow"><div className="fg"><label className="fl">Vorname</label><input className="fi" value={editForm.vorname||""} onChange={EF("vorname")}/></div><div className="fg"><label className="fl">Nachname</label><input className="fi" value={editForm.nachname||""} onChange={EF("nachname")}/></div></div>
            <div className="frow"><div className="fg"><label className="fl">Geburtsdatum</label><input className="fi" type="date" value={editForm.geburt?editForm.geburt.split("T")[0]:""} onChange={EF("geburt")}/></div><div className="fg"><label className="fl">Geschlecht</label><select className="fi" value={editForm.gender||""} onChange={EF("gender")}><option value="">—</option><option value="Frau">Frau</option><option value="Mann">Mann</option><option value="Divers">Divers</option></select></div></div>
            <div className="fg"><label className="fl">Nationalität</label><input className="fi" value={editForm.nat||""} onChange={EF("nat")}/></div>

            <div style={{fontSize:9.5,color:"#8a8174",textTransform:"uppercase",letterSpacing:".25em",marginTop:18,marginBottom:10,fontWeight:500}}>Kontakt</div>
            <div className="frow"><div className="fg"><label className="fl">E-Mail</label><input className="fi" type="email" value={editForm.email||""} onChange={EF("email")}/></div><div className="fg"><label className="fl">Telefon</label><input className="fi" value={editForm.phone||""} onChange={EF("phone")}/></div></div>
            <div className="fg"><label className="fl">Adresse</label><input className="fi" value={editForm.adresse||""} onChange={EF("adresse")}/></div>
            <div className="frow"><div className="fg"><label className="fl">PLZ</label><input className="fi" value={editForm.plz||""} onChange={EF("plz")}/></div><div className="fg"><label className="fl">Ort</label><input className="fi" value={editForm.ort||""} onChange={EF("ort")}/></div></div>

            <div style={{fontSize:9.5,color:"#8a8174",textTransform:"uppercase",letterSpacing:".25em",marginTop:18,marginBottom:10,fontWeight:500}}>Beruf & Finanzen</div>
            <div className="frow"><div className="fg"><label className="fl">Beschäftigung</label><select className="fi" value={editForm.type||""} onChange={EF("type")}><option value="">—</option><option value="Arbeitnehmer">Arbeitnehmer</option><option value="Selbstständig">Selbstständig</option><option value="Student">Student</option><option value="AOZ / Sozialhilfe">AOZ / Sozialhilfe</option><option value="Andere">Andere</option></select></div><div className="fg"><label className="fl">Beruf</label><input className="fi" value={editForm.job||""} onChange={EF("job")}/></div></div>
            <div className="frow"><div className="fg"><label className="fl">Arbeitgeber</label><input className="fi" value={editForm.arbeitgeber||""} onChange={EF("arbeitgeber")}/></div><div className="fg"><label className="fl">Nettoeinkommen / Mt.</label><input className="fi" type="number" value={editForm.einkommen||""} onChange={EF("einkommen")}/></div></div>

            <div style={{fontSize:9.5,color:"#8a8174",textTransform:"uppercase",letterSpacing:".25em",marginTop:18,marginBottom:10,fontWeight:500}}>Mietverhältnis</div>
            <div className="frow"><div className="fg"><label className="fl">Wunsch-Zimmer</label><select className="fi" value={editForm.zimmerWunsch||""} onChange={EF("zimmerWunsch")}><option value="">—</option>{rooms.map(r=>{const a=apts.find(x=>x.id===r.aptId);return <option key={r.id} value={r.id}>{r.id} — {a?.adresse||""} ({chf(r.miete)})</option>;})}</select></div><div className="fg"><label className="fl">Gewünschter Einzug</label><input className="fi" type="date" value={editForm.einzug?editForm.einzug.split("T")[0]:""} onChange={EF("einzug")}/></div></div>
            <div className="frow"><div className="fg"><label className="fl">Aufenthaltsdauer</label><select className="fi" value={editForm.aufenthalt||""} onChange={EF("aufenthalt")}><option value="">—</option><option value="6–12 Monate">6–12 Monate</option><option value="1–2 Jahre">1–2 Jahre</option><option value="2+ Jahre">2+ Jahre</option><option value="Unbefristet">Unbefristet</option></select></div><div className="fg"><label className="fl">Möblierung</label><select className="fi" value={editForm.moebliert||""} onChange={EF("moebliert")}><option value="">—</option><option value="ja">Möbliert (CHF 990)</option><option value="nein">Unmöbliert</option></select></div></div>

            <div style={{fontSize:9.5,color:"#8a8174",textTransform:"uppercase",letterSpacing:".25em",marginTop:18,marginBottom:10,fontWeight:500}}>Kaution</div>
            <div className="frow"><div className="fg"><label className="fl">Kautionstyp</label><select className="fi" value={editForm.kautionType||""} onChange={EF("kautionType")}><option value="">—</option><option value="3× Miete (volle Kaution)">3× Miete (volle Kaution)</option><option value="2× Miete">2× Miete (+50/Mt.)</option><option value="1× Miete">1× Miete (+100/Mt.)</option><option value="Keine Kaution">Keine Kaution (+150/Mt.)</option></select></div><div className="fg"><label className="fl">Aufschlag / Mt.</label><input className="fi" type="number" value={editForm.kautionAufschlag||0} onChange={e=>setEditForm(p=>({...p,kautionAufschlag:+e.target.value}))}/></div></div>

            <div style={{fontSize:9.5,color:"#8a8174",textTransform:"uppercase",letterSpacing:".25em",marginTop:18,marginBottom:10,fontWeight:500}}>Status & Bemerkung</div>
            <div className="frow"><div className="fg"><label className="fl">Status</label><select className="fi" value={editForm.status||"Neu"} onChange={EF("status")}><option value="Neu">Neu</option><option value="In Prüfung">In Prüfung</option><option value="Bestätigt">Bestätigt</option><option value="Zugeteilt">Zugeteilt</option><option value="Abgelehnt">Abgelehnt</option></select></div><div className="fg"><label className="fl" style={{visibility:"hidden"}}>—</label><label style={{display:"flex",alignItems:"center",gap:8,padding:"10px 0",fontSize:12.5}}><input type="checkbox" checked={!!editForm.noDebt} onChange={EFB("noDebt")}/> Keine Betreibung bestätigt</label></div></div>
            <div className="fg"><label className="fl">Bemerkung</label><textarea className="fi" rows={3} value={editForm.bemerkung||""} onChange={EF("bemerkung")} style={{resize:"vertical",fontFamily:"inherit"}}/></div>

            <div className="ma">
              <button className="btn btn-g" onClick={()=>setEditModal(false)}>Abbrechen</button>
              <button className="btn btn-p" onClick={saveEdit}>✓ Speichern</button>
            </div>
          </div>
        </div>
      )}

      {vertragModal&&b&&vertragData&&(
        <div className="ov" onClick={e=>e.target===e.currentTarget&&setVertragModal(false)}>
          <div className="modal" style={{width:600}}>
            <div className="mt">📄 Untermietvertrag erstellen</div>

            <div style={{background:"#f5efe4",border:"1px solid #ddd0b8",borderRadius:8,padding:"12px 16px",marginBottom:18,fontSize:12.5}}>
              <strong style={{color:"#1a1814"}}>{b.vorname} {b.nachname}</strong>
              <div style={{color:"#8a8174",fontSize:11.5,marginTop:3}}>{b.email} · {b.phone}</div>
            </div>

            <div style={{fontSize:9.5,color:"#8a8174",textTransform:"uppercase",letterSpacing:".25em",marginBottom:10,fontWeight:500}}>Mietobjekt</div>
            <div className="frow" style={{marginBottom:14}}>
              <div className="fg"><label className="fl">Zimmer</label><input className="fi" value={vertragData.zimmerId} onChange={e=>setVertragData(p=>({...p,zimmerId:e.target.value}))}/></div>
              <div className="fg"><label className="fl">Adresse</label><input className="fi" value={vertragData.adresse} onChange={e=>setVertragData(p=>({...p,adresse:e.target.value}))}/></div>
            </div>
            <div className="frow" style={{marginBottom:18}}>
              <div className="fg"><label className="fl">PLZ</label><input className="fi" value={vertragData.plz} onChange={e=>setVertragData(p=>({...p,plz:e.target.value}))}/></div>
              <div className="fg"><label className="fl">Ort</label><input className="fi" value={vertragData.ort} onChange={e=>setVertragData(p=>({...p,ort:e.target.value}))}/></div>
            </div>

            <div style={{fontSize:9.5,color:"#8a8174",textTransform:"uppercase",letterSpacing:".25em",marginBottom:10,fontWeight:500}}>Mietdauer</div>
            <div className="fg" style={{marginBottom:18}}>
              <label className="fl">Einzugsdatum</label>
              <input className="fi" type="date" value={vertragData.einzug?vertragData.einzug.split("T")[0]:""} onChange={e=>setVertragData(p=>({...p,einzug:e.target.value}))}/>
            </div>

            <div style={{fontSize:9.5,color:"#8a8174",textTransform:"uppercase",letterSpacing:".25em",marginBottom:10,fontWeight:500}}>Mietzins-Aufstellung</div>
            <div style={{background:"#fefcf7",border:"1px solid #e1d8c5",borderRadius:8,padding:"14px 18px",marginBottom:14}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 110px",gap:8,alignItems:"center",fontSize:12.5}}>
                <span>Nettomiete</span><input className="fi" type="number" value={vertragData.nettomiete} onChange={e=>{const v=+e.target.value;setVertragData(p=>({...p,nettomiete:v,bruttomiete:v+p.nebenkosten,total:v+p.nebenkosten+p.strom+p.aufschlag}));}} style={{textAlign:"right"}}/>
                <span>Nebenkosten</span><input className="fi" type="number" value={vertragData.nebenkosten} onChange={e=>{const v=+e.target.value;setVertragData(p=>({...p,nebenkosten:v,bruttomiete:p.nettomiete+v,total:p.nettomiete+v+p.strom+p.aufschlag}));}} style={{textAlign:"right"}}/>
                <span style={{fontWeight:600,borderTop:"1px solid #1a1814",paddingTop:6}}>Bruttomiete</span>
                <span style={{fontWeight:600,textAlign:"right",borderTop:"1px solid #1a1814",paddingTop:6}}>CHF {vertragData.bruttomiete.toLocaleString('de-CH')}</span>
                <span>Stromkosten</span><input className="fi" type="number" value={vertragData.strom} onChange={e=>{const v=+e.target.value;setVertragData(p=>({...p,strom:v,total:p.bruttomiete+v+p.aufschlag}));}} style={{textAlign:"right"}}/>
                {vertragData.aufschlag>0&&(<>
                  <span style={{color:"#b8843e"}}>Kautions-Aufschlag</span>
                  <span style={{color:"#b8843e",textAlign:"right",fontWeight:500}}>CHF {vertragData.aufschlag}</span>
                </>)}
                <span style={{fontWeight:700,borderTop:"2px solid #1a1814",paddingTop:8,fontSize:14}}>Total / Mt.</span>
                <span style={{fontWeight:700,textAlign:"right",borderTop:"2px solid #1a1814",paddingTop:8,fontSize:14,color:"#1a1814"}}>CHF {vertragData.total.toLocaleString('de-CH')}</span>
              </div>
            </div>

            <div style={{fontSize:9.5,color:"#8a8174",textTransform:"uppercase",letterSpacing:".25em",marginBottom:10,fontWeight:500}}>Kaution-Variante</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
              {[
                {monate:3,aufschlag:0,label:"3× Monatsmiete",note:"Standard, keine Erhöhung"},
                {monate:2,aufschlag:50,label:"2× Monatsmiete",note:"+ CHF 50 / Monat"},
                {monate:1,aufschlag:100,label:"1× Monatsmiete",note:"+ CHF 100 / Monat"},
                {monate:0,aufschlag:150,label:"Keine Kaution",note:"+ CHF 150 / Monat"},
              ].map(opt=>{
                const sel=vertragData.kautionMonate===opt.monate;
                return (
                  <label key={opt.monate} style={{padding:"12px 14px",background:sel?"#f5efe4":"#fefcf7",border:`1px solid ${sel?"#1a1814":"#e1d8c5"}`,borderRadius:8,cursor:"pointer",fontSize:12.5,display:"block"}} onClick={()=>{
                    const brutto = +vertragData.bruttomiete || 0;
                    const strom = +vertragData.strom || 25;
                    const newBetrag = (brutto + strom) * opt.monate;
                    setVertragData(p=>({
                      ...p,
                      kautionMonate:opt.monate,
                      kautionBetrag:newBetrag,
                      aufschlag:opt.aufschlag,
                      total: brutto + strom + opt.aufschlag,
                    }));
                  }}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                      <input type="radio" name="kaution" checked={sel} readOnly/>
                      <span style={{fontWeight:600}}>{opt.label}</span>
                    </div>
                    <div style={{fontSize:11,color:"#8a8174",marginLeft:24}}>{opt.note}</div>
                  </label>
                );
              })}
            </div>
            <div style={{background:"#fefcf7",border:"1px solid #e1d8c5",borderRadius:8,padding:"12px 18px",marginBottom:18,display:"flex",justifyContent:"space-between",fontSize:13,fontWeight:600}}>
              <span>Kautionsbetrag</span>
              <span style={{color:"#1a1814"}}>{vertragData.kautionMonate>0?`CHF ${vertragData.kautionBetrag.toLocaleString('de-CH')}`:"—"}</span>
            </div>

            <div style={{fontSize:9.5,color:"#8a8174",textTransform:"uppercase",letterSpacing:".25em",marginBottom:10,fontWeight:500}}>Möblierung</div>
            <div style={{display:"flex",gap:10,marginBottom:18}}>
              <label style={{flex:1,padding:"10px 14px",background:vertragData.moebliert?"#f5efe4":"#fefcf7",border:`1px solid ${vertragData.moebliert?"#1a1814":"#e1d8c5"}`,borderRadius:8,cursor:"pointer",fontSize:12.5,display:"flex",alignItems:"center",gap:8}}>
                <input type="radio" checked={vertragData.moebliert} onChange={()=>setVertragData(p=>({...p,moebliert:true}))}/> Möbliert (CHF 990 einmalig)
              </label>
              <label style={{flex:1,padding:"10px 14px",background:!vertragData.moebliert?"#f5efe4":"#fefcf7",border:`1px solid ${!vertragData.moebliert?"#1a1814":"#e1d8c5"}`,borderRadius:8,cursor:"pointer",fontSize:12.5,display:"flex",alignItems:"center",gap:8}}>
                <input type="radio" checked={!vertragData.moebliert} onChange={()=>setVertragData(p=>({...p,moebliert:false}))}/> Unmöbliert
              </label>
            </div>

            <div className="ma">
              <button className="btn btn-g" onClick={()=>setVertragModal(false)}>Abbrechen</button>
              <button className="btn btn-p" onClick={generateContract}>📄 PDF herunterladen</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── WOHNUNGEN ───────────────────────────────────────────────────────────────
function Wohnungen({apts,rooms,tenants,updateApt,insertApt,deleteApt,documents,uploadDocument,getDocumentUrl,deleteDocument}){
  const [sel,setSel]=useState(null);const [tab,setTab]=useState("info");const [editing,setEditing]=useState(false);const [form,setForm]=useState({});
  const [filter,setFilter]=useState("alle");
  const [adding,setAdding]=useState(false);
  const [newForm,setNewForm]=useState({type:"WG",ort:"Zürich"});
  const [roomList,setRoomList]=useState([]);
  const apt=apts.find(a=>a.id===sel);const aptRooms=apt?rooms.filter(r=>r.aptId===apt.id):[];
  const wgApts=apts.filter(a=>a.type==="WG");
  const airbnbApts=apts.filter(a=>a.type==="Airbnb");
  function F(k){return e=>setForm(p=>({...p,[k]:e.target.value}));}
  function NF(k){
    return e => {
      const val = e.target.value;
      setNewForm(p=>({...p,[k]:val}));
      // When units count changes, sync roomList length
      if (k === "units") {
        const n = Math.max(0, Math.min(20, +val||0));
        setRoomList(prev => {
          const next = [...prev];
          while (next.length < n) next.push({miete:"",groesse:"",balkon:false});
          while (next.length > n) next.pop();
          return next;
        });
      }
      // Reset roomList if switching to Airbnb
      if (k === "type" && val === "Airbnb") {
        setRoomList([]);
      }
    };
  }
  function updateRoom(i, key, val){
    setRoomList(prev => prev.map((r,idx) => idx===i ? {...r, [key]: val} : r));
  }
  async function save(){
    await updateApt(form.id,{
      adresse:form.adresse,plz:form.plz,ort:form.ort,
      stockwerk:form.stockwerk,zimmer:form.zimmer,
      miete:+form.miete||0,kaution:+form.kaution||0,
      kautionType:form.kautionType,refzins:form.refzins,
      mietbeginn:form.mietbeginn,mietende:form.mietende,
      verwaltung:form.verwaltung,eigentuemer:form.eigentuemer,
      refnr:form.refnr,vertrag:form.vertrag,
    });
    setEditing(false);
  }
  function nextAptId(){
    let n=1;
    while(apts.find(a=>a.id===`A${n}`)) n++;
    return `A${n}`;
  }
  async function saveNew(){
    if (!newForm.adresse) { alert("Bitte Adresse angeben."); return; }
    const id = newForm.id || nextAptId();
    if (apts.find(a=>a.id===id)) { alert(`Wohnungs-ID "${id}" existiert bereits.`); return; }
    const apt = {
      id,
      adresse: newForm.adresse,
      plz: newForm.plz || "",
      ort: newForm.ort || "Zürich",
      type: newForm.type || "WG",
      zimmer: newForm.zimmer || "",
      units: newForm.type === "WG" ? (+newForm.units||0) : null,
      mietbeginn: newForm.mietbeginn || "",
      mietende: newForm.mietende || "",
      stockwerk: newForm.stockwerk || "",
      miete: +newForm.miete || 0,
      kaution: +newForm.kaution || 0,
      kautionType: newForm.kautionType || "",
      verwaltung: newForm.verwaltung || "",
      eigentuemer: newForm.eigentuemer || "",
      refzins: newForm.refzins || "",
      refnr: newForm.refnr || "",
      vertrag: newForm.vertrag || "",
    };
    await insertApt(apt, newForm.type === "WG" ? roomList : null);
    setAdding(false);
    setNewForm({type:"WG",ort:"Zürich"});
    setRoomList([]);
    setSel(id);
  }
  async function handleDelete(){
    if (!apt) return;
    if (!confirm(`Wohnung ${apt.id} (${apt.adresse}) wirklich löschen?\n\nAlle zugehörigen Zimmer werden ebenfalls entfernt.`)) return;
    await deleteApt(apt.id);
    setSel(null);
  }
  function renderAptCard(a){
    const rs=rooms.filter(r=>r.aptId===a.id);const o=rs.filter(r=>r.occupied).length;const on=sel===a.id;
    return(
      <div key={a.id} onClick={()=>{setSel(a.id);setTab("info");}} style={{background:on?"#f5efe4":"#ffffff",border:`1px solid ${on?"#a08864":"#e8e3d8"}`,borderRadius:9,padding:"11px 13px",marginBottom:6,cursor:"pointer"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}><span style={{fontFamily:"'Manrope',sans-serif",fontWeight:700,fontSize:12.5,color:on?"#a08864":"#1f1d18"}}>{a.id}</span><TypeBadge type={a.type}/></div>
        <div style={{fontSize:11,color:"#8a8478"}}>{a.adresse}</div>
        {rs.length>0&&<div style={{marginTop:6}}><Prog val={o} max={rs.length}/></div>}
      </div>
    );
  }
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
        <div>
          <div className="pt">Wohnungen</div>
          <div className="ps">{wgApts.length} WG · {airbnbApts.length} Airbnb</div>
        </div>
        <button className="btn btn-p" onClick={()=>{setNewForm({type:"WG",ort:"Zürich",id:nextAptId()});setAdding(true);}}>+ Neue Wohnung</button>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:14}}>
        {[["alle",`Alle (${apts.length})`],["WG",`WG (${wgApts.length})`],["Airbnb",`Airbnb (${airbnbApts.length})`]].map(([k,l])=>(
          <button key={k} className={`btn ${filter===k?"btn-p":"btn-g"} btn-sm`} onClick={()=>setFilter(k)}>{l}</button>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"240px 1fr",gap:16}}>
        <div>
          {(filter==="alle"||filter==="WG")&&wgApts.length>0&&(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:9,color:"#8a8174",textTransform:"uppercase",letterSpacing:".3em",fontWeight:600,marginBottom:8,paddingLeft:2}}>WG-Wohnungen</div>
              {wgApts.map(renderAptCard)}
            </div>
          )}
          {(filter==="alle"||filter==="Airbnb")&&airbnbApts.length>0&&(
            <div>
              <div style={{fontSize:9,color:"#8a8174",textTransform:"uppercase",letterSpacing:".3em",fontWeight:600,marginBottom:8,paddingLeft:2}}>Airbnb-Wohnungen</div>
              {airbnbApts.map(renderAptCard)}
            </div>
          )}
        </div>
        {apt?(
          <div className="card" style={{margin:0}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
              <div><div style={{fontFamily:"'Manrope',sans-serif",fontWeight:700,fontSize:17,color:"#1f1d18"}}>{apt.id} — {apt.adresse}</div><div style={{fontSize:11,color:"#8a8478",marginTop:2}}>{apt.plz} {apt.ort} · OG {apt.stockwerk}</div></div>
              <div style={{display:"flex",gap:6}}>
                <button className="btn btn-g btn-sm" onClick={()=>{setForm({...apt});setEditing(true);}}>✏ Bearbeiten</button>
                <button className="btn btn-r btn-sm" onClick={handleDelete}>🗑 Löschen</button>
              </div>
            </div>
            <div className="tabs">{[["info","Übersicht"],["zimmer","Zimmer"],["docs","Dokumente"],["vertrag","Vertrag"]].map(([k,l])=>(<button key={k} className={`tab${tab===k?" on":""}`} onClick={()=>setTab(k)}>{l}</button>))}</div>
            {tab==="info"&&<div><div className="igrid">{[["Typ",<TypeBadge type={apt.type}/>],["Zimmer",apt.zimmer+" Zi."],["Miete",<strong style={{color:"#5a6e4a"}}>{chf(apt.miete)}</strong>],["Kaution",chf(apt.kaution)],["Kautionstyp",apt.kautionType||apt.kaution_type],["Mietbeginn",apt.mietbeginn],["Mietende",apt.mietende||"—"],["Verwaltung",apt.verwaltung],["Eigentümer",apt.eigentuemer]].map(([l,v])=>(<div key={l} className="ig"><label>{l}</label><span>{v}</span></div>))}</div><DocumentChecklist entityType="apartment" entityId={apt.id} documents={documents} onJumpToDocs={()=>setTab("docs")}/></div>}
            {tab==="zimmer"&&(aptRooms.length===0?<div className="empty">Keine Zimmer</div>:<table><thead><tr><th>Zimmer</th><th>Miete</th><th>Status</th><th>Mieter</th></tr></thead><tbody>{aptRooms.map(r=>{const t=r.tenantId?tenants.find(x=>x.id===r.tenantId):null;return(<tr key={r.id}><td style={{fontWeight:600}}>{r.id}</td><td style={{color:"#5a6e4a"}}>{chf(r.miete)}</td><td>{r.occupied?<Bdg label="● belegt" color="g"/>:<Bdg label="○ frei" color="y"/>}</td><td>{t?`${t.vorname} ${t.nachname}`:"—"}</td></tr>);})}</tbody></table>)}
            {tab==="docs"&&<DocumentsManager entityType="apartment" entityId={apt.id} documents={documents} uploadDocument={uploadDocument} getDocumentUrl={getDocumentUrl} deleteDocument={deleteDocument}/>}
            {tab==="vertrag"&&<div>{apt.vertrag&&<a href={apt.vertrag} target="_blank" rel="noreferrer" className="btn btn-p" style={{display:"inline-flex"}}>📄 Vertrag öffnen</a>}</div>}
          </div>
        ):<div className="card" style={{margin:0,display:"flex",alignItems:"center",justifyContent:"center",minHeight:180}}><span style={{color:"#8a8478"}}>← Wohnung wählen</span></div>}
      </div>

      {adding&&<div className="ov" onClick={e=>e.target===e.currentTarget&&setAdding(false)}><div className="modal" style={{width:620}}>
        <div className="mt">+ Neue Wohnung erfassen</div>

        <div style={{fontSize:9.5,color:"#8a8174",textTransform:"uppercase",letterSpacing:".25em",marginBottom:10,fontWeight:500}}>Grunddaten</div>
        <div className="frow">
          <div className="fg"><label className="fl">ID *</label><input className="fi" value={newForm.id||""} onChange={NF("id")} placeholder="z.B. A9"/></div>
          <div className="fg"><label className="fl">Typ *</label><select className="fi" value={newForm.type||"WG"} onChange={NF("type")}><option value="WG">WG</option><option value="Airbnb">Airbnb</option></select></div>
        </div>
        <div className="fg"><label className="fl">Adresse *</label><input className="fi" value={newForm.adresse||""} onChange={NF("adresse")} placeholder="Strasse 12"/></div>
        <div className="frow">
          <div className="fg"><label className="fl">PLZ</label><input className="fi" value={newForm.plz||""} onChange={NF("plz")}/></div>
          <div className="fg"><label className="fl">Ort</label><input className="fi" value={newForm.ort||""} onChange={NF("ort")}/></div>
        </div>
        <div className="frow">
          <div className="fg"><label className="fl">Stockwerk</label><input className="fi" value={newForm.stockwerk||""} onChange={NF("stockwerk")} placeholder="EG, 1, 2…"/></div>
          <div className="fg"><label className="fl">Anzahl Zimmer</label><input className="fi" value={newForm.zimmer||""} onChange={NF("zimmer")} placeholder="z.B. 3.5"/></div>
        </div>
        {newForm.type==="WG"&&(
          <div className="fg">
            <label className="fl">Anzahl WG-Units (vermietbare Zimmer) *</label>
            <input className="fi" type="number" min="1" max="20" value={newForm.units||""} onChange={NF("units")} placeholder="z.B. 3"/>
            <div style={{fontSize:10.5,color:"#8a8174",marginTop:5,fontStyle:"italic"}}>Es werden Zimmer mit IDs {newForm.id||"A9"}-1, {newForm.id||"A9"}-2 … angelegt</div>
          </div>
        )}

        {newForm.type==="WG"&&roomList.length>0&&(
          <div style={{marginTop:18,padding:"16px 18px",background:"#fefcf7",border:"1px solid #e1d8c5",borderRadius:8}}>
            <div style={{fontSize:9.5,color:"#8a8174",textTransform:"uppercase",letterSpacing:".25em",marginBottom:12,fontWeight:500}}>Zimmer-Details</div>
            <div style={{display:"grid",gridTemplateColumns:"60px 1fr 110px 80px",gap:8,marginBottom:6,fontSize:10,color:"#8a8174",fontWeight:600,letterSpacing:".05em",textTransform:"uppercase"}}>
              <div>Zimmer</div>
              <div>Größe (z.B. 14 m²)</div>
              <div>Miete CHF/Mt.</div>
              <div style={{textAlign:"center"}}>Balkon</div>
            </div>
            {roomList.map((r,i)=>(
              <div key={i} style={{display:"grid",gridTemplateColumns:"60px 1fr 110px 80px",gap:8,marginBottom:6,alignItems:"center"}}>
                <div style={{fontSize:11.5,fontWeight:600,color:"#1a1814"}}>{newForm.id||"A9"}-{i+1}</div>
                <input className="fi" style={{margin:0,padding:"7px 10px"}} value={r.groesse} onChange={e=>updateRoom(i,"groesse",e.target.value)} placeholder="14 m²"/>
                <input className="fi" style={{margin:0,padding:"7px 10px"}} type="number" value={r.miete} onChange={e=>updateRoom(i,"miete",e.target.value)} placeholder="1490"/>
                <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:5,cursor:"pointer",fontSize:11.5}}>
                  <input type="checkbox" checked={r.balkon} onChange={e=>updateRoom(i,"balkon",e.target.checked)}/>
                  <span>{r.balkon?"🌿":""}</span>
                </label>
              </div>
            ))}
          </div>
        )}

        <div style={{fontSize:9.5,color:"#8a8174",textTransform:"uppercase",letterSpacing:".25em",marginTop:18,marginBottom:10,fontWeight:500}}>Mietverhältnis</div>
        <div className="frow">
          <div className="fg"><label className="fl">Mietbeginn</label><input className="fi" value={newForm.mietbeginn||""} onChange={NF("mietbeginn")} placeholder="DD.MM.YYYY"/></div>
          <div className="fg"><label className="fl">Mietende</label><input className="fi" value={newForm.mietende||""} onChange={NF("mietende")} placeholder="DD.MM.YYYY oder leer"/></div>
        </div>
        <div className="frow">
          <div className="fg"><label className="fl">Miete (an Eigentümer) / Mt.</label><input className="fi" type="number" value={newForm.miete||""} onChange={NF("miete")}/></div>
          <div className="fg"><label className="fl">Kaution</label><input className="fi" type="number" value={newForm.kaution||""} onChange={NF("kaution")}/></div>
        </div>
        <div className="frow">
          <div className="fg"><label className="fl">Kautionstyp</label><select className="fi" value={newForm.kautionType||""} onChange={NF("kautionType")}><option value="">—</option><option value="Evorest">Evorest</option><option value="Firstcaution">Firstcaution</option><option value="GoCaution">GoCaution</option><option value="Bankkaution">Bankkaution</option></select></div>
          <div className="fg"><label className="fl">Referenzzins</label><input className="fi" value={newForm.refzins||""} onChange={NF("refzins")} placeholder="z.B. 1.25"/></div>
        </div>

        <div style={{fontSize:9.5,color:"#8a8174",textTransform:"uppercase",letterSpacing:".25em",marginTop:18,marginBottom:10,fontWeight:500}}>Vermieter / Verwaltung</div>
        <div className="frow">
          <div className="fg"><label className="fl">Verwaltung</label><input className="fi" value={newForm.verwaltung||""} onChange={NF("verwaltung")}/></div>
          <div className="fg"><label className="fl">Eigentümer</label><input className="fi" value={newForm.eigentuemer||""} onChange={NF("eigentuemer")}/></div>
        </div>
        <div className="frow">
          <div className="fg"><label className="fl">Referenz-Nr.</label><input className="fi" value={newForm.refnr||""} onChange={NF("refnr")}/></div>
          <div className="fg"><label className="fl">Vertrags-Link</label><input className="fi" value={newForm.vertrag||""} onChange={NF("vertrag")} placeholder="https://…"/></div>
        </div>

        <div className="ma">
          <button className="btn btn-g" onClick={()=>{setAdding(false);setRoomList([]);}}>Abbrechen</button>
          <button className="btn btn-p" onClick={saveNew}>✓ Wohnung anlegen</button>
        </div>
      </div></div>}

      {editing&&<div className="ov" onClick={e=>e.target===e.currentTarget&&setEditing(false)}><div className="modal" style={{width:620}}>
        <div className="mt">Wohnung bearbeiten — {form.id}</div>

        <div style={{fontSize:9.5,color:"#8a8174",textTransform:"uppercase",letterSpacing:".25em",marginBottom:10,fontWeight:500}}>Grunddaten</div>
        <div className="fg"><label className="fl">Adresse</label><input className="fi" value={form.adresse||""} onChange={F("adresse")}/></div>
        <div className="frow">
          <div className="fg"><label className="fl">PLZ</label><input className="fi" value={form.plz||""} onChange={F("plz")}/></div>
          <div className="fg"><label className="fl">Ort</label><input className="fi" value={form.ort||""} onChange={F("ort")}/></div>
        </div>
        <div className="frow">
          <div className="fg"><label className="fl">Stockwerk</label><input className="fi" value={form.stockwerk||""} onChange={F("stockwerk")}/></div>
          <div className="fg"><label className="fl">Anzahl Zimmer</label><input className="fi" value={form.zimmer||""} onChange={F("zimmer")}/></div>
        </div>

        <div style={{fontSize:9.5,color:"#8a8174",textTransform:"uppercase",letterSpacing:".25em",marginTop:18,marginBottom:10,fontWeight:500}}>Mietverhältnis</div>
        <div className="frow">
          <div className="fg"><label className="fl">Mietbeginn</label><input className="fi" value={form.mietbeginn||""} onChange={F("mietbeginn")}/></div>
          <div className="fg"><label className="fl">Mietende</label><input className="fi" value={form.mietende||""} onChange={F("mietende")}/></div>
        </div>
        <div className="frow">
          <div className="fg"><label className="fl">Miete (an Eigentümer)</label><input className="fi" type="number" value={form.miete||""} onChange={F("miete")}/></div>
          <div className="fg"><label className="fl">Kaution</label><input className="fi" type="number" value={form.kaution||""} onChange={F("kaution")}/></div>
        </div>
        <div className="frow">
          <div className="fg"><label className="fl">Kautionstyp</label><select className="fi" value={form.kautionType||form.kaution_type||""} onChange={F("kautionType")}><option value="">—</option><option value="Evorest">Evorest</option><option value="Firstcaution">Firstcaution</option><option value="GoCaution">GoCaution</option><option value="Bankkaution">Bankkaution</option></select></div>
          <div className="fg"><label className="fl">Referenzzins</label><input className="fi" value={form.refzins||""} onChange={F("refzins")}/></div>
        </div>

        <div style={{fontSize:9.5,color:"#8a8174",textTransform:"uppercase",letterSpacing:".25em",marginTop:18,marginBottom:10,fontWeight:500}}>Vermieter / Verwaltung</div>
        <div className="frow">
          <div className="fg"><label className="fl">Verwaltung</label><input className="fi" value={form.verwaltung||""} onChange={F("verwaltung")}/></div>
          <div className="fg"><label className="fl">Eigentümer</label><input className="fi" value={form.eigentuemer||""} onChange={F("eigentuemer")}/></div>
        </div>
        <div className="frow">
          <div className="fg"><label className="fl">Referenz-Nr.</label><input className="fi" value={form.refnr||""} onChange={F("refnr")}/></div>
          <div className="fg"><label className="fl">Vertrags-Link</label><input className="fi" value={form.vertrag||""} onChange={F("vertrag")}/></div>
        </div>

        <div className="ma"><button className="btn btn-g" onClick={()=>setEditing(false)}>Abbrechen</button><button className="btn btn-p" onClick={save}>Speichern</button></div>
      </div></div>}
    </div>
  );
}

// ─── ZIMMER ──────────────────────────────────────────────────────────────────
function Zimmer({rooms,tenants,apts,bewerber,updateRoom,updateBewerber,insertTenant,updateTenant}){
  const [filter,setFilter]=useState("alle");
  const [editing,setEditing]=useState(false);
  const [form,setForm]=useState({});
  const [assigning,setAssigning]=useState(null); // room being assigned
  const [assignMode,setAssignMode]=useState("bewerber"); // "bewerber" | "manual" | "remove"
  const [selBewerberId,setSelBewerberId]=useState("");
  const [manualForm,setManualForm]=useState({vorname:"",nachname:"",email:"",phone:""});
  const shown=filter==="frei"?rooms.filter(r=>!r.occupied):filter==="belegt"?rooms.filter(r=>r.occupied):rooms;
  const free=rooms.filter(r=>!r.occupied);
  const grouped=apts.filter(a=>a.type==="WG").map(a=>({apt:a,rs:shown.filter(r=>r.aptId===a.id)})).filter(g=>g.rs.length>0);
  const eligibleBewerber=bewerber?bewerber.filter(b=>b.status==="Bestätigt"||b.status==="In Prüfung"||b.status==="Neu"):[];

  function F(k){return e=>setForm(p=>({...p,[k]:e.target.value}));}
  function FB(k){return e=>setForm(p=>({...p,[k]:e.target.checked}));}
  function MF(k){return e=>setManualForm(p=>({...p,[k]:e.target.value}));}
  function openEdit(r){setForm({...r});setEditing(true);}
  function openAssign(r){
    setAssigning(r);
    setSelBewerberId("");
    setManualForm({vorname:"",nachname:"",email:"",phone:""});
    setAssignMode(r.occupied?"remove":"bewerber");
  }
  async function saveEdit(){
    await updateRoom(form.id,{
      miete:+form.miete||0,
      groesse:form.groesse||"",
      balkon:!!form.balkon,
    });
    setEditing(false);
  }
  async function assignFromBewerber(){
    if (!selBewerberId) { alert("Bitte einen Bewerber auswählen."); return; }
    const b = bewerber.find(x=>x.id===selBewerberId);
    if (!b) return;
    const newId = `T${Date.now().toString().slice(-5)}`;
    const newTenant = {
      id: newId,
      vorname: b.vorname, nachname: b.nachname,
      email: b.email, phone: b.phone,
      geburt: b.geburt, nat: b.nat,
      adresse: b.adresse, plz: b.plz, ort: b.ort,
      aptId: assigning.aptId, roomId: assigning.id,
      einzug: b.einzug || "",
      kautionMonate: b.kautionOpt==="3x"?3:b.kautionOpt==="2x"?2:b.kautionOpt==="1x"?1:0,
      moebliert: !!b.moebliert,
    };
    await insertTenant(newTenant);
    await updateRoom(assigning.id,{occupied:true,tenantId:newId});
    await updateBewerber(b.id,{status:"Zugeteilt"});
    setAssigning(null);
  }
  async function assignManual(){
    if (!manualForm.vorname || !manualForm.nachname) { alert("Bitte mindestens Vorname und Nachname angeben."); return; }
    const newId = `T${Date.now().toString().slice(-5)}`;
    const newTenant = {
      id: newId,
      vorname: manualForm.vorname, nachname: manualForm.nachname,
      email: manualForm.email||"", phone: manualForm.phone||"",
      aptId: assigning.aptId, roomId: assigning.id,
    };
    await insertTenant(newTenant);
    await updateRoom(assigning.id,{occupied:true,tenantId:newId});
    setAssigning(null);
  }
  async function removeOccupant(){
    if (!confirm(`Mieterzuweisung von ${assigning.id} wirklich entfernen?\n\nDer Mieter bleibt im System bestehen, das Zimmer wird als frei markiert.`)) return;
    if (assigning.tenantId) {
      // Mark tenant as no longer in this room

              </div>);})}
          </div>

              <div style={{display:"flex",alignItems:"center",gap:11}}><Av name={tenant.vorname} size={40}/><div><div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16,color:"#1f1d18"}}>{tenant.vorname} {tenant.nachname}</div><div style={{fontSize:11,color:"#8a8478",marginTop:2}}>{tenant.id}</div></div></div>

        <div style={{display:"flex",gap:16,margin:"10px 0",fontSize:12.5,flexWrap:"wrap"}}>{[["deposit","Kaution"],["schluessel","Schlüssel"],["furnished","Möbliert"],["betreibung","Betreibungsauszug erhalten"]].map(([k,l])=>(<label key={k} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}><input type="checkbox" checked={!!form[k]} onChange={FB(k)}/> {l}</label>))}</div>
        <div className="ma"><button className="btn btn-g" onClick={()=>setEditing(false)}>Abbrechen</button><button className="btn btn-p" onClick={save}>Speichern</button></div>
      </div></div>}
    </div>
  );
}

// ─── FINANZEN & FRISTEN ──────────────────────────────────────────────────────
function Finanzen({apts,rooms}){
  const wgRooms=rooms.filter(r=>["A2","A3","A5","A6","A7","A8"].includes(r.aptId));
  const soll=wgRooms.filter(r=>r.occupied).reduce((s,r)=>s+(+r.miete||0),0);
  const pot=wgRooms.reduce((s,r)=>s+(+r.miete||0),0);
  const byApt=apts.filter(a=>a.type==="WG").map(a=>{const rs=rooms.filter(r=>r.aptId===a.id);return{...a,soll:rs.filter(r=>r.occupied).reduce((s,r)=>s+(+r.miete||0),0),pot:rs.reduce((s,r)=>s+(+r.miete||0),0)};});
  return(
    <div>
      <div className="pt">Finanzen</div>
      <div className="sg">
        <div className="sc"><div className="sl">Ist-Miete</div><div className="sv" style={{fontSize:20,color:"#5a7c5e"}}>{Math.round(soll/1000)}k</div><div className="sn">CHF/Mt.</div></div>
        <div className="sc"><div className="sl">Potenzial</div><div className="sv" style={{fontSize:20}}>{Math.round(pot/1000)}k</div><div className="sn">CHF/Mt.</div></div>
        <div className="sc"><div className="sl">Ausfall</div><div className="sv" style={{fontSize:20,color:"#c89653"}}>{chf(pot-soll)}</div></div>
        <div className="sc"><div className="sl">Auslastung</div><div className="sv" style={{fontSize:20}}>{pot?Math.round(soll/pot*100):0}%</div></div>
      </div>
      <div className="card">
        <div className="ct">Pro Wohnung</div>
        <table><thead><tr><th>WG</th><th>Adresse</th><th>Ist</th><th>Pot.</th><th>Auslastung</th></tr></thead><tbody>
          {byApt.map(a=>{const p=a.pot?Math.round(a.soll/a.pot*100):0;return(<tr key={a.id}><td style={{fontWeight:700}}>{a.id}</td><td style={{fontSize:11.5,color:"#8a8478"}}>{a.adresse}</td><td style={{color:"#5a7c5e"}}>{chf(a.soll)}</td><td style={{color:"#8a8478"}}>{chf(a.pot)}</td><td style={{minWidth:130}}><div style={{display:"flex",alignItems:"center",gap:8}}><div style={{flex:1}}><Prog val={a.soll} max={a.pot}/></div><span style={{fontSize:10.5}}>{p}%</span></div></td></tr>);})}
        </tbody></table>
      </div>
    </div>
  );
}

function Fristen({apts,tenants,rooms}){
  const heute=new Date();
  const aptEnds=apts.filter(a=>a.mietende).map(a=>{const d=parseDMY(a.mietende);return{...a,tage:Math.ceil((d-heute)/86400000)};}).sort((a,b)=>a.tage-b.tage);
  return(
    <div>
      <div className="pt">Fristen</div>
      <div className="card">
        <div className="ct">Wohnungs-Mietenden</div>
        <table><thead><tr><th>ID</th><th>Adresse</th><th>Ende</th><th>Verbleibend</th></tr></thead><tbody>
          {aptEnds.map(a=>{const c=a.tage<30?"r":a.tage<90?"y":"g";return(<tr key={a.id}><td style={{fontWeight:700}}>{a.id}</td><td>{a.adresse}</td><td>{a.mietende}</td><td><Bdg label={`${a.tage}d`} color={c}/></td></tr>);})}
        </tbody></table>
      </div>
    </div>
  );
}

const PAGES=[

function App() {
  const [session, setSession] = useState(undefined);

  useEffect(() => {
    supabase.auth.getSession().then(({data}) => setSession(data.session));
    const {data:{subscription}} = supabase.auth.onAuthStateChange((_, s) => setSession(s));
    return () => subscription.unsubscribe();
  }, []);

  if (session === undefined) return <div className="loading"><div className="spinner"/><p>Lade…</p></div>;
  if (!session) return <Login/>;
  return <MainApp user={session.user}/>;
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {error: null, info: null}; }
  static getDerivedStateFromError(error) { return {error}; }
  componentDidCatch(error, info) { console.error("React error:", error, info); this.setState({info}); }
  render() {
    if (this.state.error) {
      return (
        <div style={{padding:"40px 32px",maxWidth:800,margin:"40px auto",fontFamily:"Manrope,sans-serif",background:"#fff",border:"1px solid #e1d8c5",borderRadius:8}}>
          <h2 style={{fontWeight:600,fontSize:20,marginBottom:14,color:"#9b4a3e"}}>⚠️ Ein Fehler ist aufgetreten</h2>
          <p style={{fontSize:13,color:"#4a4439",lineHeight:1.6,marginBottom:14}}>Die Anwendung konnte nicht geladen werden. Mögliche Ursachen:</p>
          <ul style={{fontSize:13,color:"#4a4439",lineHeight:1.7,marginLeft:20,marginBottom:18}}>
            <li>Supabase-Setup unvollständig (z.B. Documents-Tabelle fehlt)</li>
            <li>Browser-Cache veraltet → mit Strg+F5 neu laden</li>
            <li>Datenbankspalten passen nicht — schick uns den Fehler</li>
          </ul>
          <details style={{marginBottom:14}}>
            <summary style={{cursor:"pointer",fontWeight:600,fontSize:13,color:"#1a1814"}}>Technische Details (zum Kopieren)</summary>
            <pre style={{marginTop:10,padding:12,background:"#fafaf7",borderRadius:6,fontSize:11,whiteSpace:"pre-wrap",overflow:"auto"}}>{String(this.state.error)}{"\n\n"}{this.state.info?.componentStack||""}</pre>
          </details>
          <button onClick={() => location.reload()} style={{padding:"10px 20px",background:"#1a1814",color:"#fff",border:"none",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:500}}>↻ Seite neu laden</button>
        </div>
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
