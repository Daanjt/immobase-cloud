<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ImmoBase — D&T Homes</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
:root{
  --bg: #f6f1e8;
  --surface: #fefcf7;
  --card: #fefcf7;
  --beige: #c9b896;
  --beige-soft: #ede4d3;
  --beige-line: #ddd0b8;
  --gold: #1a1814;
  --line: #e1d8c5;
  --line-soft: #ebe3d2;
  --ink: #1a1814;
  --text: #4a4439;
  --muted: #8a8174;
  --muted-light: #b8af9f;
  --green: #5a6e4a;
  --green-soft: #e8eadb;
  --warn: #b8843e;
  --warn-soft: #f4e8d3;
  --error: #9b4a3e;
  --error-soft: #f0dcd5;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Manrope', sans-serif;font-size:13.5px;font-weight:400;letter-spacing:.005em;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--beige-line);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--beige)}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);position:relative;overflow:hidden}
.login-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top,var(--beige-soft) 0%,transparent 60%);pointer-events:none}
.login-card{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:48px 44px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 1px 60px rgba(160,136,100,.06)}
.login-logo{text-align:center;margin-bottom:36px;padding-bottom:28px;border-bottom:1px solid var(--line-soft)}
.login-logo h1{font-family:'Manrope', sans-serif;font-size:32px;font-weight:400;color:var(--ink);letter-spacing:.05em;margin-bottom:6px}
.login-logo p{font-size:10px;color:var(--muted);letter-spacing:.4em;text-transform:uppercase;font-weight:400}
.login-card h2{font-family:'Manrope', sans-serif;font-size:22px;font-weight:400;color:var(--ink);margin-bottom:10px;letter-spacing:.01em}
.login-card .desc{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:24px;font-weight:300}
.login-input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:13px 14px;color:var(--ink);font-family:'Manrope', sans-serif;font-size:13.5px;outline:none;margin-bottom:14px;transition:border-color .25s ease}
.login-input:focus{border-color:var(--gold);background:var(--surface)}
.login-input::placeholder{color:var(--muted-light);font-weight:300}
.login-btn{width:100%;background:var(--ink);border:none;border-radius:8px;padding:14px;color:var(--surface);font-family:'Manrope', sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:.2s all;letter-spacing:.18em;text-transform:uppercase}
.login-btn:hover{background:var(--gold);transform:translateY(-1px)}
.login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.login-msg{margin-top:18px;padding:11px 14px;border-radius:8px;font-size:12px;line-height:1.6;border-left:2px solid}
.login-msg.success{background:var(--green-soft);border-color:var(--green);color:var(--green)}
.login-msg.error{background:var(--error-soft);border-color:var(--error);color:var(--error)}
.login-foot{text-align:center;margin-top:24px;font-size:10px;color:var(--muted-light);letter-spacing:.2em;text-transform:uppercase}

/* APP LAYOUT */
.app{display:flex;height:100vh;overflow:hidden;background:var(--bg)}
.sidebar{width:230px;min-width:230px;background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column}
.logo{padding:30px 24px 24px;border-bottom:1px solid var(--line-soft)}
.logo h1{font-family:'Manrope', sans-serif;font-size:22px;font-weight:400;color:var(--ink);letter-spacing:.04em}
.logo p{font-size:9px;color:var(--muted);margin-top:4px;letter-spacing:.4em;text-transform:uppercase;font-weight:400}
.nav{flex:1;padding:18px 14px;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
.nb{display:flex;align-items:center;gap:11px;padding:10px 14px;border-radius:0;border:none;background:none;color:var(--muted);cursor:pointer;font-family:'Manrope', sans-serif;font-size:12px;font-weight:400;text-align:left;width:100%;transition:.2s all;letter-spacing:.04em;position:relative}
.nb:hover{color:var(--ink);background:var(--beige-soft)}
.nb.on{color:var(--ink);background:var(--beige-soft);font-weight:500}
.nb.on::before{content:'';position:absolute;left:0;top:25%;bottom:25%;width:2px;background:var(--gold)}
.ni{font-size:13px;width:18px;text-align:center;color:var(--muted-light)}
.nb.on .ni{color:var(--gold)}
.user-info{padding:18px 24px;border-top:1px solid var(--line-soft);font-size:10.5px;color:var(--muted)}
.user-info .uemail{color:var(--ink);font-weight:500;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:8px;letter-spacing:.01em}
.logout-btn{background:none;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:6px 14px;font-size:9.5px;cursor:pointer;font-family:'Manrope', sans-serif;letter-spacing:.18em;text-transform:uppercase;transition:.2s}
.logout-btn:hover{border-color:var(--ink);color:var(--ink)}

.main{flex:1;overflow-y:auto;padding:48px 56px}
.pt{font-family:'Manrope', sans-serif;font-size:34px;font-weight:400;color:var(--ink);margin-bottom:6px;letter-spacing:.01em}
.ps{font-size:11px;color:var(--muted);margin-bottom:32px;letter-spacing:.18em;text-transform:uppercase;font-weight:400}

.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;margin-bottom:30px;background:var(--line);border:1px solid var(--line)}
.sc{background:var(--surface);padding:24px 26px;transition:.2s background}
.sc:hover{background:var(--beige-soft)}
.sl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.3em;margin-bottom:10px;font-weight:500}
.sv{font-family:'Manrope', sans-serif;font-size:36px;font-weight:300;color:var(--ink);line-height:1;letter-spacing:.01em}
.sn{font-size:10.5px;margin-top:8px;color:var(--muted);letter-spacing:.05em}

.card{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:32px;margin-bottom:24px}
.ct{font-family:'Manrope', sans-serif;font-size:18px;font-weight:400;color:var(--ink);margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--line-soft);letter-spacing:.01em}

table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.25em;padding:0 10px 12px;border-bottom:1px solid var(--line);font-weight:500}
td{padding:13px 10px;border-bottom:1px solid var(--line-soft);font-size:12.5px;vertical-align:middle;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--beige-soft)}

.bx{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:8px;font-size:9.5px;font-weight:500;white-space:nowrap;letter-spacing:.08em;text-transform:uppercase;border:1px solid}
.b-g{background:var(--green-soft);color:var(--green);border-color:var(--green-soft)}
.b-y{background:var(--warn-soft);color:var(--warn);border-color:var(--warn-soft)}
.b-r{background:var(--error-soft);color:var(--error);border-color:var(--error-soft)}
.b-b{background:var(--beige-soft);color:var(--gold);border-color:var(--beige-line)}
.b-x{background:transparent;color:var(--muted);border-color:var(--line)}
.b-p{background:var(--beige-soft);color:var(--gold);border-color:var(--beige-line)}

.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;border:1px solid;cursor:pointer;font-family:'Manrope', sans-serif;font-size:10.5px;font-weight:500;transition:.2s all;letter-spacing:.15em;text-transform:uppercase}
.btn-p{background:var(--ink);color:var(--surface);border-color:var(--ink)}.btn-p:hover{background:var(--gold);border-color:var(--gold)}
.btn-g{background:transparent;color:var(--text);border-color:var(--line)}.btn-g:hover{border-color:var(--ink);color:var(--ink)}
.btn-gr{background:var(--green-soft);color:var(--green);border-color:var(--green-soft)}.btn-gr:hover{background:var(--green);color:var(--surface);border-color:var(--green)}
.btn-r{background:var(--error-soft);color:var(--error);border-color:var(--error-soft)}.btn-r:hover{background:var(--error);color:var(--surface);border-color:var(--error)}
.btn-sm{padding:6px 12px;font-size:9.5px}

.row{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap}
.inp{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:9px 14px;color:var(--ink);font-family:'Manrope', sans-serif;font-size:12.5px;outline:none;transition:.2s;letter-spacing:.01em}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--muted-light);font-weight:300}

.ov{position:fixed;inset:0;background:rgba(31,29,24,.4);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:40px;width:540px;max-height:86vh;overflow-y:auto;box-shadow:0 4px 80px rgba(31,29,24,.12)}
.mt{font-family:'Manrope', sans-serif;font-size:24px;font-weight:400;color:var(--ink);margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid var(--line-soft);letter-spacing:.01em}

.fg{margin-bottom:14px}
.fl{font-size:9.5px;color:var(--muted);margin-bottom:6px;display:block;letter-spacing:.25em;text-transform:uppercase;font-weight:500}
.fi{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:10px 13px;color:var(--ink);font-family:'Manrope', sans-serif;font-size:12.5px;outline:none;transition:.2s;letter-spacing:.01em}
.fi:focus{border-color:var(--gold)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ma{display:flex;gap:12px;justify-content:flex-end;margin-top:24px;padding-top:18px;border-top:1px solid var(--line-soft)}

.tabs{display:flex;margin-bottom:22px;border-bottom:1px solid var(--line);gap:4px}
.tab{padding:10px 20px;border:none;background:none;color:var(--muted);cursor:pointer;font-family:'Manrope', sans-serif;font-size:10.5px;font-weight:500;border-bottom:1px solid transparent;margin-bottom:-1px;transition:.2s;letter-spacing:.18em;text-transform:uppercase}
.tab.on{color:var(--ink);border-bottom-color:var(--gold)}
.tab:hover:not(.on){color:var(--ink)}

.av{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:var(--beige-soft);color:var(--gold);font-family:'Manrope', sans-serif;font-weight:500;flex-shrink:0;border:1px solid var(--beige-line)}

.warn{background:var(--warn-soft);border:1px solid var(--warn-soft);border-left:3px solid var(--warn);border-radius:8px;padding:13px 18px;font-size:12px;color:var(--warn);margin-bottom:18px;line-height:1.6;letter-spacing:.01em}
.warn-r{background:var(--error-soft);border:1px solid var(--error-soft);border-left:3px solid var(--error);border-radius:8px;padding:13px 18px;font-size:12px;color:var(--error);margin-bottom:18px;line-height:1.6;letter-spacing:.01em}

.igrid{display:grid;grid-template-columns:1fr 1fr;gap:18px 22px}
.ig{padding-bottom:14px;border-bottom:1px solid var(--line-soft)}
.ig label{font-size:9px;color:var(--muted);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.25em;font-weight:500}
.ig span{font-size:13px;color:var(--ink);font-weight:400}

a{color:var(--gold);text-decoration:none;transition:.2s;border-bottom:1px solid transparent}
a:hover{border-bottom-color:var(--gold)}
.empty{text-align:center;color:var(--muted);font-size:12px;padding:36px;font-style:italic;font-family:'Manrope', sans-serif;font-size:14px}

.bewerber-card{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:16px 18px;margin-bottom:8px;transition:.2s all;cursor:pointer}
.bewerber-card:hover{border-color:var(--beige);background:var(--beige-soft)}
.bewerber-card.selected{border-color:var(--gold);background:var(--beige-soft);border-left:3px solid var(--gold)}

.zimmer-option{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--bg);border:1px solid var(--line);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:.2s all}
.zimmer-option:hover{border-color:var(--gold);background:var(--beige-soft)}
.zimmer-option.sel{border-color:var(--green);background:var(--green-soft);border-left:3px solid var(--green)}

.link-box{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:14px}
.link-text{font-size:11.5px;color:var(--muted);font-family:monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.02em}

.loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:18px;background:var(--bg)}
.spinner{width:36px;height:36px;border:1px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:11px;color:var(--muted);letter-spacing:.3em;text-transform:uppercase;font-weight:400}

/* Progress bar */
.prog-bar{height:1px;background:var(--line)}
.prog-fill{height:100%;background:var(--gold);transition:width .5s ease}

/* Number badge in nav */
.nav-badge{background:var(--ink);color:var(--surface);font-size:9px;padding:2px 7px;border-radius:8px;font-weight:500;letter-spacing:.05em}
.nav-badge.warn{background:var(--warn)}
</style>
</head>

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function Av({name,size=30}){const i=(name||"?").trim().split(" ").filter(Boolean).map(n=>n[0]).join("").slice(0,2).toUpperCase();return <div className="av" style={{width:size,height:size,fontSize:size*0.36}}>{i}</div>;}
const chf=n=>`CHF ${Number(n||0).toLocaleString("de-CH",{minimumFractionDigits:0,maximumFractionDigits:2})}`;
function Bdg({label,color="x"}){if(!label&&label!==0)return null;return <span className={`bx b-${color}`}>{label}</span>;}
function TypeBadge({type}){
  const m={WG:["b","WG"],Airbnb:["p","Airbnb"],Evorest:["x","Evorest"],GoCaution:["x","GoCaution"],Firstcaution:["x","Firstcaution"],"Kautionsreduktion auf 0":["y","0-Kaution"],Versicherung:["b","Versicherung"],AOZ:["p","AOZ"],Student:["g","Student"],Arbeitnehmer:["g","Arbeitnehmer"],Selbstständig:["b","Selbst."]};
  if(!type||!m[type])return null;const [c,l]=m[type];return <span className={`bx b-${c}`}>{l}</span>;
}
function Prog({val,max}){const p=max?Math.min(100,Math.round(val/max*100)):0;const bg=p===100?"#5a7c5e":p>60?"#a08864":"#c89653";return <div style={{height:4,background:"#e8e3d8",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${p}%`,background:bg,transition:"width .4s"}}/></div>;}
function parseDMY(s){if(!s)return null;const parts=s.split(".");if(parts.length===3)return new Date(+parts[2],+parts[1]-1,+parts[0]);return new Date(s);}
function StatusBdg({status}){
  const m={"Neu":["b","● Neu"],"In Prüfung":["y","◐ In Prüfung"],"Bestätigt":["g","✓ Bestätigt"],"Abgelehnt":["r","✗ Abgelehnt"],"Zugeteilt":["g","🏠 Zugeteilt"]};
  const [c,l]=m[status]||["x",status];return <span className={`bx b-${c}`}>{l}</span>;
}

// ─── LOGIN ───────────────────────────────────────────────────────────────────
function Login() {
  const [email, setEmail] = useState("");
  const [loading, setLoading] = useState(false);
  const [msg, setMsg] = useState(null);

  async function sendLink(e) {
    e.preventDefault();
    setLoading(true); setMsg(null);
    const { error } = await supabase.auth.signInWithOtp({
      email: email.trim().toLowerCase(),
      options: { emailRedirectTo: window.location.origin }
    });
    setLoading(false);
    if (error) setMsg({type:"error", text:"Login nicht möglich. Diese E-Mail ist nicht freigeschaltet oder es gab einen Fehler."});
    else setMsg({type:"success", text:"Wir haben dir einen Login-Link an "+email+" geschickt. Schau in deine E-Mails (auch Spam-Ordner)."});
  }

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-logo"><h1>ImmoBase</h1><p>D&T HOMES</p></div>
        <h2>Anmelden</h2>
        <p className="desc">Gib deine E-Mail-Adresse ein. Du bekommst einen sicheren Login-Link per E-Mail — kein Passwort nötig.</p>
        <form onSubmit={sendLink}>
          <input className="login-input" type="email" required placeholder="deine@email.ch" value={email} onChange={e=>setEmail(e.target.value)} disabled={loading}/>
          <button className="login-btn" type="submit" disabled={loading||!email}>
            {loading?"Sende Link…":"Login-Link senden →"}
          </button>
        </form>
        {msg && <div className={`login-msg ${msg.type}`}>{msg.text}</div>}
        <div className="login-foot">Nur freigeschaltete E-Mails haben Zugriff.</div>
      </div>
    </div>
  );
}

// ─── DATA HOOKS ──────────────────────────────────────────────────────────────
function useSupabaseData() {
  const [apts, setApts] = useState([]);
  const [rooms, setRooms] = useState([]);
  const [tenants, setTenants] = useState([]);
  const [bewerber, setBewerber] = useState([]);
  const [loading, setLoading] = useState(true);

  async function loadAll() {
    setLoading(true);
    const [a, r, t, b] = await Promise.all([
      supabase.from("apartments").select("*").order("id"),
      supabase.from("rooms").select("*").order("id"),
      supabase.from("tenants").select("*").order("id"),
      supabase.from("applicants").select("*").order("created_at", {ascending:false}),
    ]);
    setApts((a.data||[]).map(x=>({...x, kautionType:x.kaution_type, refnr:x.refnr})));
    setRooms((r.data||[]).map(x=>({...x, aptId:x.apt_id, tenantId:x.tenant_id})));
    setTenants((t.data||[]).map(x=>({...x, kautionArt:x.kaution_art, schluesselNr:x.schluessel_nr})));
    setBewerber((b.data||[]).map(x=>({
      ...x,
      kautionOpt:x.kaution_opt, kautionType:x.kaution_type, kautionAufschlag:x.kaution_aufschlag,
      moeblierungPauschale:x.moeblierung_pauschale, zimmerWunsch:x.zimmer_wunsch,
      zugeteiltes_zimmer:x.zugeteiltes_zimmer, eingereichtAm:x.eingereicht_am, noDebt:x.no_debt
    })));
    setLoading(false);
  }

  useEffect(()=>{
    loadAll();
    // Real-time subscription
    const channels = ["apartments","rooms","tenants","applicants"].map(table =>
      supabase.channel(`public:${table}`)
        .on("postgres_changes", {event:"*", schema:"public", table}, () => loadAll())
        .subscribe()
    );
    return () => channels.forEach(c=>supabase.removeChannel(c));
  },[]);

  // Update functions
  // Helper: convert camelCase keys to snake_case + strip non-DB fields
  function toDbApt(fields) {
    const map = {
      kautionType: "kaution_type",
    };
    const strip = ["kaution_type"]; // some db schemas may differ; we'll use map below only
    const dbFields = {};
    for (const k of Object.keys(fields)) {
      if (fields[k] === undefined) continue;
      const dbKey = map[k] || k;
      dbFields[dbKey] = fields[k];
    }
    // Strip fields not in DB
    delete dbFields.created_at;
    delete dbFields.updated_at;
    return dbFields;
  }
  
  function toDbTenant(fields) {
    const map = {
      kautionArt: "kaution_art",
      schluesselNr: "schluessel_nr",
      aptId: "apt_id",
      roomId: "room_id",
      kautionMonate: "kaution_monate",
      kautionBetrag: "kaution_betrag",
    };
    const dbFields = {};
    for (const k of Object.keys(fields)) {
      if (fields[k] === undefined) continue;
      const dbKey = map[k] || k;
      dbFields[dbKey] = fields[k];
    }
    delete dbFields.created_at;
    delete dbFields.updated_at;
    return dbFields;
  }
  
  function toDbRoom(fields) {
    const map = {
      tenantId: "tenant_id",
      aptId: "apt_id",
    };
    const dbFields = {};
    for (const k of Object.keys(fields)) {
      if (fields[k] === undefined) continue;
      const dbKey = map[k] || k;
      dbFields[dbKey] = fields[k];
    }
    delete dbFields.created_at;
    delete dbFields.updated_at;
    return dbFields;
  }
  
  async function updateApt(id, fields) {
    const dbFields = toDbApt(fields);
    const {error} = await supabase.from("apartments").update(dbFields).eq("id", id);
    if (error) {
      console.error("updateApt error:", error);
      alert("Speichern fehlgeschlagen: " + error.message);
      return;
    }
    setApts(p => p.map(a => a.id === id ? {...a, ...fields} : a));
  }
  async function insertApt(a, roomDetails) {
    const dbA = toDbApt(a);
    const {error: aptErr} = await supabase.from("apartments").insert([dbA]);
    if (aptErr) {
      console.error("insertApt error:", aptErr);
      alert("Wohnung konnte nicht angelegt werden: " + aptErr.message);
      throw aptErr;
    }
    setApts(p => [...p, a]);
    if (a.type === "WG" && a.units > 0) {
      const newRooms = [];
      for (let i=1; i<=a.units; i++) {
        const detail = (roomDetails && roomDetails[i-1]) || {};
        newRooms.push({
          id: `${a.id}-${i}`,
          apt_id: a.id,
          occupied: false,
          miete: +detail.miete || 0,
          groesse: detail.groesse || "",
          balkon: !!detail.balkon,
        });
      }
      const {error: roomErr} = await supabase.from("rooms").insert(newRooms);
      if (roomErr) {
        console.error("insertApt rooms error:", roomErr);
        alert("Zimmer konnten nicht angelegt werden: " + roomErr.message);
        throw roomErr;
      }
      setRooms(p => [...p, ...newRooms.map(r => ({
        id: r.id, aptId: r.apt_id, occupied: r.occupied,
        miete: r.miete, groesse: r.groesse, balkon: r.balkon,
        tenantId: null,
      }))]);
    }
  }
  async function deleteApt(id) {
    const {error: e1} = await supabase.from("rooms").delete().eq("apt_id", id);
    const {error: e2} = await supabase.from("apartments").delete().eq("id", id);
    if (e1 || e2) {
      console.error("deleteApt errors:", e1, e2);
      alert("Löschen fehlgeschlagen: " + ((e1||e2).message));
      return;
    }
    setApts(p => p.filter(a => a.id !== id));
    setRooms(p => p.filter(r => r.aptId !== id));
  }
  async function updateTenant(id, fields) {
    const dbFields = toDbTenant(fields);
    const {error} = await supabase.from("tenants").update(dbFields).eq("id", id);
    if (error) {
      console.error("updateTenant error:", error);
      alert("Speichern fehlgeschlagen: " + error.message);
      return;
    }
    setTenants(p => p.map(t => t.id === id ? {...t, ...fields} : t));
  }
  async function insertTenant(t) {
    const dbT = toDbTenant(t);
    const {error} = await supabase.from("tenants").insert([dbT]);
    if (error) {
      console.error("insertTenant error:", error);
      alert("Mieter konnte nicht angelegt werden: " + error.message);
      throw error;
    }
    setTenants(p => [...p, t]);
  }
  async function updateRoom(id, fields) {
    const dbFields = toDbRoom(fields);
    const {error} = await supabase.from("rooms").update(dbFields).eq("id", id);
    if (error) {
      console.error("updateRoom error:", error);
      alert("Speichern fehlgeschlagen: " + error.message);
      return;
    }
    setRooms(p => p.map(r => r.id === id ? {...r, ...fields} : r));
  }
  async function updateBewerber(id, fields) {
    const dbFields = {};
    const map = {
      kautionOpt: "kaution_opt",
      kautionType: "kaution_type",
      kautionAufschlag: "kaution_aufschlag",
      moeblierungPauschale: "moeblierung_pauschale",
      zimmerWunsch: "zimmer_wunsch",
      eingereichtAm: "eingereicht_am",
      noDebt: "no_debt",
    };
    for (const k in fields) {
      const dbKey = map[k] || k;
      dbFields[dbKey] = fields[k];
    }
    // Strip non-DB fields
    delete dbFields.created_at;
    delete dbFields.updated_at;
    await supabase.from("applicants").update(dbFields).eq("id", id);
  }

  // ─── DOCUMENTS ─────────────────────────────────────────
  const [documents, setDocuments] = useState([]);
  
  async function loadDocuments() {
    try {
      const {data, error} = await supabase.from("documents").select("*").order("uploaded_at", {ascending:false});
      if (error) {
        console.warn("Documents-Tabelle noch nicht eingerichtet (SQL-Setup ausführen):", error.message);
        return;
      }
      setDocuments(data || []);
    } catch (e) {
      console.warn("loadDocuments failed:", e);
    }
  }
  
  async function uploadDocument(entityType, entityId, category, file) {
    if (!file) throw new Error("Keine Datei");
    if (file.size > 25 * 1024 * 1024) throw new Error("Datei zu groß (max. 25 MB)");
    
    const ext = file.name.split('.').pop().toLowerCase();
    
    // Build smart filename: e.g. "A6_Hauptmietvertrag.pdf" or "Berger_Anna_Untermietvertrag.pdf"
    function sanitize(str) {
      return (str || "")
        .replace(/[äÄ]/g, "ae").replace(/[öÖ]/g, "oe").replace(/[üÜ]/g, "ue").replace(/[ß]/g, "ss")
        .replace(/[^a-zA-Z0-9_-]/g, "_")
        .replace(/_+/g, "_")
        .replace(/^_|_$/g, "");
    }
    
    let baseName;
    if (entityType === "apartment") {
      baseName = `${sanitize(entityId)}_${sanitize(category)}`;
    } else {
      // For tenants: use Nachname_Vorname
      const tenant = tenants.find(t => t.id === entityId);
      if (tenant) {
        baseName = `${sanitize(tenant.nachname)}_${sanitize(tenant.vorname)}_${sanitize(category)}`;
      } else {
        baseName = `${sanitize(entityId)}_${sanitize(category)}`;
      }
    }
    
    // Check for collisions, append _2, _3, etc.
    const {data: existing} = await supabase.from("documents")
      .select("filename")
      .eq("entity_type", entityType)
      .eq("entity_id", entityId);
    
    let finalName = `${baseName}.${ext}`;
    let counter = 2;
    const usedNames = new Set((existing || []).map(d => d.filename.toLowerCase()));
    while (usedNames.has(finalName.toLowerCase())) {
      finalName = `${baseName}_${counter}.${ext}`;
      counter++;
    }
    
    const ts = Date.now();
    const path = `${entityType}/${entityId}/${ts}_${finalName}`;
    const {error: upErr} = await supabase.storage.from("documents").upload(path, file);
    if (upErr) throw upErr;
    const user = (await supabase.auth.getUser()).data.user;
    const {data, error} = await supabase.from("documents").insert([{
      entity_type: entityType,
      entity_id: entityId,
      category,
      filename: finalName,
      storage_path: path,
      file_size: file.size,
      mime_type: file.type || `application/${ext}`,
      uploaded_by: user?.email || "unknown",
    }]).select().single();
    if (error) throw error;
    setDocuments(p => [data, ...p]);
    return data;
  }
  
  async function getDocumentUrl(storagePath) {
    const {data, error} = await supabase.storage.from("documents").createSignedUrl(storagePath, 3600);
    if (error) { console.error(error); return null; }
    return data?.signedUrl || null;
  }
  
  async function deleteDocument(doc) {
    await supabase.storage.from("documents").remove([doc.storage_path]);
    await supabase.from("documents").delete().eq("id", doc.id);
    setDocuments(p => p.filter(d => d.id !== doc.id));
  }

  useEffect(() => { if (apts.length > 0) loadDocuments(); }, [apts.length]);

  return {apts, rooms, tenants, bewerber, documents, loading, loadAll, updateApt, insertApt, deleteApt, updateTenant, insertTenant, updateRoom, updateBewerber, uploadDocument, getDocumentUrl, deleteDocument};
}

function fileSize(bytes) {
  if (!bytes) return "—";
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + " KB";
  return (bytes/(1024*1024)).toFixed(1) + " MB";
}

function fileIcon(mime, filename) {
  const ext = (filename||"").split('.').pop().toLowerCase();
  if (mime?.includes("pdf") || ext === "pdf") return "📄";
  if (mime?.includes("image") || ["jpg","jpeg","png","gif","webp"].includes(ext)) return "🖼️";
  if (mime?.includes("word") || ["doc","docx"].includes(ext)) return "📝";
  if (mime?.includes("excel") || mime?.includes("sheet") || ["xls","xlsx","csv"].includes(ext)) return "📊";
  return "📎";
}

function DocumentsManager({entityType, entityId, documents, uploadDocument, getDocumentUrl, deleteDocument}){
  const [uploading, setUploading] = useState(false);
  const [selCategory, setSelCategory] = useState("");
  const [dragOver, setDragOver] = useState(false);
  const fileInputRef = React.useRef(null);
  const docs = (documents||[]).filter(d => d.entity_type === entityType && d.entity_id === entityId);
  const categories = entityType === "apartment" ? APT_CATEGORIES : TENANT_CATEGORIES;
  
  async function uploadFile(file) {
    if (!file) return;
    if (!selCategory) { alert("Bitte zuerst eine Kategorie wählen."); return; }
    setUploading(true);
    try {
      await uploadDocument(entityType, entityId, selCategory, file);
      setSelCategory("");
    } catch (err) {
      alert("Upload fehlgeschlagen: " + (err.message || err));
      console.error(err);
    } finally {
      setUploading(false);
    }
  }
  
  async function handleFileSelect(e) {
    const files = [...e.target.files];
    if (files.length === 0) return;
    if (!selCategory) { alert("Bitte zuerst eine Kategorie wählen."); e.target.value = ""; return; }
    for (const file of files) {
      await uploadFile(file);
    }
    e.target.value = "";
  }
  
  function handleDragOver(e) {
    e.preventDefault();
    e.stopPropagation();
    if (!selCategory) return;
    setDragOver(true);
  }
  
  function handleDragLeave(e) {
    e.preventDefault();
    e.stopPropagation();
    setDragOver(false);
  }
  
  async function handleDrop(e) {
    e.preventDefault();
    e.stopPropagation();
    setDragOver(false);
    if (!selCategory) {
      alert("Bitte zuerst eine Kategorie wählen.");
      return;
    }
    const files = [...e.dataTransfer.files];
    for (const file of files) {
      await uploadFile(file);
    }
  }
  
  async function handleView(doc) {
    const url = await getDocumentUrl(doc.storage_path);
    if (url) window.open(url, "_blank");
    else alert("Dokument konnte nicht geöffnet werden.");
  }
  
  async function handleDownload(doc) {
    const url = await getDocumentUrl(doc.storage_path);
    if (!url) { alert("Download nicht möglich."); return; }
    const a = document.createElement("a");
    a.href = url;
    a.download = doc.filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
  
  async function handleDelete(doc) {
    if (!confirm(`Dokument "${doc.filename}" wirklich löschen?`)) return;
    try {
      await deleteDocument(doc);
    } catch (err) {
      alert("Löschen fehlgeschlagen: " + (err.message || err));
    }
  }
  
  return (
    <div>
      <div 
        onDragOver={handleDragOver}
        onDragLeave={handleDragLeave}
        onDrop={handleDrop}
        style={{
          background: dragOver ? "#f5efe4" : "#fefcf7",
          border: dragOver ? "2px dashed #1a1a1a" : "1px solid #e1d8c5",
          borderRadius: 8,
          padding: "14px 16px",
          marginBottom: 14,
          transition: "all .15s ease"
        }}>
        <div style={{fontSize:9.5,color:"#8a8174",textTransform:"uppercase",letterSpacing:".25em",marginBottom:10,fontWeight:500}}>Neues Dokument hochladen</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <select className="fi" style={{flex:1,margin:0}} value={selCategory} onChange={e=>setSelCategory(e.target.value)}>
            <option value="">— Kategorie wählen —</option>
            {categories.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
          <input type="file" ref={fileInputRef} onChange={handleFileSelect} disabled={uploading||!selCategory} multiple style={{display:"none"}}/>
          <button className="btn btn-p btn-sm" disabled={uploading||!selCategory} onClick={()=>fileInputRef.current?.click()}>
            {uploading ? "⏳ Lädt…" : "📎 Datei wählen"}
          </button>
        </div>
        <div style={{
          marginTop:10,
          padding:"12px 14px",
          background: dragOver ? "rgba(26,24,20,.06)" : "transparent",
          border: dragOver ? "1px dashed #1a1a1a" : "1px dashed #c5b896",
          borderRadius:6,
          textAlign:"center",
          fontSize:11.5,
          color: dragOver ? "#1a1a1a" : "#8a8174",
          fontStyle:"italic",
          transition:"all .15s ease",
          pointerEvents:"none"
        }}>
          {dragOver 
            ? `🎯 Datei${" jetzt loslassen"}` 
            : selCategory 
              ? `↓ Oder Datei(en) hierher ziehen — Kategorie: ${selCategory}` 
              : "Erst Kategorie wählen, dann Datei(en) per Drag & Drop ablegen"}
        </div>
        <div style={{fontSize:10.5,color:"#8a8174",marginTop:6,fontStyle:"italic",textAlign:"center"}}>Max. 25 MB pro Datei · PDF, Bilder, Word, Excel</div>
      </div>
      
      {docs.length === 0 ? (
        <div className="empty" style={{padding:"24px 16px"}}>Noch keine Dokumente hinterlegt</div>
      ) : (
        <div>
          {docs.map(d => (
            <div key={d.id} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",background:"#ffffff",border:"1px solid #e8e3d8",borderRadius:8,marginBottom:6}}>
              <span style={{fontSize:22}}>{fileIcon(d.mime_type, d.filename)}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600,color:"#1a1814",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.filename}</div>
                <div style={{fontSize:11,color:"#8a8174",marginTop:2}}>
                  <span style={{background:"#f5efe4",padding:"1px 7px",borderRadius:4,marginRight:6,fontWeight:500}}>{d.category}</span>
                  {fileSize(d.file_size)} · {new Date(d.uploaded_at).toLocaleDateString("de-CH")}
                </div>
              </div>
              <div style={{display:"flex",gap:4}}>
                <button className="btn btn-g btn-sm" onClick={()=>handleView(d)} title="Anzeigen">👁</button>
                <button className="btn btn-g btn-sm" onClick={()=>handleDownload(d)} title="Herunterladen">⬇</button>
                <button className="btn btn-r btn-sm" onClick={()=>handleDelete(d)} title="Löschen">🗑</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

const UEBERGABE_RAUME_GEMEIN = ["Küche","Badezimmer","Wohnzimmer","Eingang / Korridor"];
const ZUSTAND_OPTIONS = ["Sehr gut","Gut","Akzeptabel","Mangelhaft"];

function UebergabeProtokoll({tenant, room, apt, uploadDocument}){

    datum: new Date().toISOString().split("T")[0],
    raume: {},
    schluessel_anzahl: "",
    schluessel_typ: "",
    strom_zaehler: "",
    wasser_zaehler: "",
    inventar_geprueft: false,
    bemerkungen: "",
  });
  const [generating, setGenerating] = useState(false);
  
  function updateRaum(name, key, val) {
    setData(p => ({
      ...p,
      raume: {
        ...p.raume,
        [name]: { ...(p.raume[name]||{}), [key]: val }
      }
    }));
  }
  
  async function addPhoto(raumName, file) {
    if (!file) return;
    // Compress image to ~1024px max dimension
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const MAX = 1280;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = h * (MAX/w); w = MAX; }
          else { w = w * (MAX/h); h = MAX; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        const dataUri = canvas.toDataURL("image/jpeg", 0.85);
        setData(p => ({
          ...p,
          raume: {
            ...p.raume,
            [raumName]: {
              ...(p.raume[raumName]||{}),
              photos: [...((p.raume[raumName]||{}).photos || []), dataUri]
            }
          }
        }));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }
  
  function removePhoto(raumName, idx) {
    setData(p => ({
      ...p,
      raume: {
        ...p.raume,
        [raumName]: {
          ...(p.raume[raumName]||{}),
          photos: (p.raume[raumName]||{}).photos.filter((_,i) => i !== idx)
        }
      }
    }));
  }
  
  function buildPDF() {
    const fullName = `${tenant.vorname} ${tenant.nachname}`;
    const datumLong = new Date(data.datum).toLocaleDateString("de-CH", {day:"numeric",month:"long",year:"numeric"});
    
    const allRooms = [...UEBERGABE_RAUME_PRIVAT, ...UEBERGABE_RAUME_GEMEIN];
    const raumeHTML = allRooms.map(r => {
      const d = data.raume[r] || {};
      const photos = d.photos || [];
      const isPrivat = UEBERGABE_RAUME_PRIVAT.includes(r);
      const titel = isPrivat && room ? `${r} (${room.id})` : r;
      return `
        <div class="raum-block">
          <h3>${titel}</h3>

      win.document.close();
      win.onload = () => setTimeout(() => { win.focus(); win.print(); }, 400);
      
      // Optional: also save as document to system
      // We convert HTML to a blob and upload
      const blob = new Blob([html], {type: "text/html"});

  const allRooms = [...UEBERGABE_RAUME_PRIVAT, ...UEBERGABE_RAUME_GEMEIN];

  return (

        <div className="frow">
          <div className="fg"><label className="fl">Schlüssel-Typ</label><input className="fi" value={data.schluessel_typ} onChange={e=>setData(p=>({...p,schluessel_typ:e.target.value}))} placeholder="z.B. Yale, Kaba"/></div>
          <div className="fg"><label className="fl">Anzahl</label><input className="fi" type="number" value={data.schluessel_anzahl} onChange={e=>setData(p=>({...p,schluessel_anzahl:e.target.value}))}/></div>
        </div>
        <div className="frow">
          <div className="fg"><label className="fl">Stromzähler (kWh)</label><input className="fi" type="number" step="0.01" value={data.strom_zaehler} onChange={e=>setData(p=>({...p,strom_zaehler:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Wasserzähler (m³)</label><input className="fi" type="number" step="0.01" value={data.wasser_zaehler} onChange={e=>setData(p=>({...p,wasser_zaehler:e.target.value}))}/></div>
        </div>

      </div>
      
      {allRooms.map(rname => {

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
function Dashboard({apts,rooms,tenants,bewerber}){
  const heute=new Date();
  
  // ─── SEPARATE WG vs AIRBNB ─────────────────────────────────────
  const wgApts = apts.filter(a=>a.type==="WG");
  const airbnbApts = apts.filter(a=>a.type==="Airbnb");
  const wgIds = wgApts.map(a=>a.id);
  const airbnbIds = airbnbApts.map(a=>a.id);
  const wgRooms = rooms.filter(r=>wgIds.includes(r.aptId));
  
  // WG calculations
  const wgAusgaben = wgApts.reduce((s,a)=>s+(+a.miete||0),0);
  const wgEinnahmenIst = wgRooms.filter(r=>r.occupied).reduce((s,r)=>s+(+r.miete||0),0);
  const wgEinnahmenMax = wgRooms.reduce((s,r)=>s+(+r.miete||0),0);
  const wgMargeIst = wgEinnahmenIst - wgAusgaben;
  const wgMargeMax = wgEinnahmenMax - wgAusgaben;
  const wgLeerstand = wgEinnahmenMax - wgEinnahmenIst;
  const wgOcc = wgRooms.filter(r=>r.occupied).length;
  const wgFree = wgRooms.filter(r=>!r.occupied);
  const wgAuslastung = wgRooms.length ? Math.round(wgOcc/wgRooms.length*100) : 0;
  
  // Airbnb calculations (whole apt = 1 unit, no rooms)
  const abAusgaben = airbnbApts.reduce((s,a)=>s+(+a.miete||0),0);
  // For Airbnb income we assume the apt rent IS the cost; income comes from bookings (data not in system yet)
  // For now: Airbnb is shown as cost only — income tracking future feature
  
  // Total
  const totalAusgaben = wgAusgaben + abAusgaben;
  const totalEinnahmenIst = wgEinnahmenIst; // Airbnb income not tracked
  const totalMargeIst = totalEinnahmenIst - totalAusgaben;

  const incomplete=tenants.filter(t=>!t.email||!t.phone||!t.geburt);
  const neueBewerber=bewerber.filter(b=>b.status==="Neu"||b.status==="In Prüfung");
  const baldEnde=apts.filter(a=>{const d=parseDMY(a.mietende);return d&&(d-heute)/86400000<120;});

  return(
    <div>
      <div className="pt">Dashboard</div>
      <div className="ps">D&T Homes · {new Date().toLocaleDateString("de-CH")}</div>

      {/* TOTAL OVERVIEW — 3-column hero */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16,marginBottom:24}}>
        <div style={{background:"#fefcf7",border:"1px solid #e1d8c5",borderRadius:8,padding:"24px 26px"}}>
          <div style={{fontSize:9,color:"#8a8174",textTransform:"uppercase",letterSpacing:".3em",fontWeight:500,marginBottom:14}}>Total Ausgaben / Mt.</div>
          <div style={{fontFamily:"'Manrope',sans-serif",fontSize:32,fontWeight:300,color:"#1a1814",lineHeight:1,marginBottom:6}}>{chf(totalAusgaben)}</div>
          <div style={{fontSize:11,color:"#8a8174",letterSpacing:".05em"}}>{wgApts.length} WG + {airbnbApts.length} Airbnb</div>
        </div>
        <div style={{background:wgMargeIst>=0?"#e8eadb":"#f0dcd5",border:`1px solid ${wgMargeIst>=0?"#c5cda8":"#e0bcb0"}`,borderRadius:8,padding:"24px 26px"}}>
          <div style={{fontSize:9,color:"#5a6e4a",textTransform:"uppercase",letterSpacing:".3em",fontWeight:500,marginBottom:14}}>WG-Marge aktuell / Mt.</div>
          <div style={{fontFamily:"'Manrope',sans-serif",fontSize:32,fontWeight:400,color:wgMargeIst>=0?"#3d4f2f":"#9b4a3e",lineHeight:1,marginBottom:6}}>{wgMargeIst>=0?"+":""}{chf(wgMargeIst)}</div>
          <div style={{fontSize:11,color:"#5a6e4a",letterSpacing:".05em"}}>WG-Einnahmen − WG-Ausgaben</div>
        </div>
        <div style={{background:"#1a1814",borderRadius:8,padding:"24px 26px",color:"#fefcf7"}}>
          <div style={{fontSize:9,color:"#b8af9f",textTransform:"uppercase",letterSpacing:".3em",fontWeight:500,marginBottom:14}}>WG-Marge maximal / Mt.</div>
          <div style={{fontFamily:"'Manrope',sans-serif",fontSize:32,fontWeight:400,color:"#fefcf7",lineHeight:1,marginBottom:6}}>+{chf(wgMargeMax)}</div>
          <div style={{fontSize:11,color:"#b8af9f",letterSpacing:".05em"}}>Bei 100% Belegung</div>
        </div>
      </div>

      {/* WG SECTION */}
      <div style={{fontFamily:"'Manrope',sans-serif",fontSize:18,fontWeight:600,color:"#1a1814",marginBottom:14,marginTop:8,letterSpacing:".01em"}}>WG-Wohnungen</div>
      <div className="sg" style={{marginBottom:18}}>
        <div className="sc"><div className="sl">Auslastung</div><div className="sv">{wgAuslastung}%</div><div className="sn" style={{color:wgAuslastung>=80?"#5a6e4a":wgAuslastung>=50?"#b8843e":"#9b4a3e"}}>{wgOcc}/{wgRooms.length} Zimmer</div></div>
        <div className="sc"><div className="sl">Ausgaben</div><div className="sv" style={{fontSize:24}}>{chf(wgAusgaben).replace("CHF ","")}</div><div className="sn" style={{color:"#8a8174"}}>CHF / Mt.</div></div>
        <div className="sc"><div className="sl">Einnahmen Ist</div><div className="sv" style={{fontSize:24,color:"#5a6e4a"}}>{chf(wgEinnahmenIst).replace("CHF ","")}</div><div className="sn" style={{color:"#8a8174"}}>von max. {chf(wgEinnahmenMax)}</div></div>
        <div className="sc"><div className="sl">Leerstand</div><div className="sv" style={{fontSize:24,color:wgLeerstand>0?"#9b4a3e":"#5a6e4a"}}>{wgLeerstand>0?"−":""}{chf(wgLeerstand).replace("CHF ","")}</div><div className="sn" style={{color:"#8a8174"}}>{wgFree.length} freie Zimmer</div></div>
      </div>
      {wgFree.length>0&&<div className="warn">⚠ <strong>{wgFree.length} WG-Zimmer frei:</strong> {wgFree.map(r=>`${r.id} (${chf(r.miete)}/Mt.${r.balkon?" 🌿":""})`).join(" · ")}</div>}

      {neueBewerber.length>0&&<div className="warn">📋 <strong>{neueBewerber.length} Bewerber</strong> warten auf Bearbeitung</div>}
      {baldEnde.length>0&&<div className="warn-r">🗓 <strong>Mietende &lt;120 Tage:</strong> {baldEnde.map(a=>{const d=parseDMY(a.mietende);return `${a.id} → ${a.mietende} (${Math.ceil((d-heute)/86400000)}d)`;}).join(" · ")}</div>}

      {/* PER-APARTMENT FINANCE BREAKDOWN — separated WG / Airbnb */}
      <div className="card" style={{marginBottom:24}}>
        <div className="ct">Finanzübersicht — WG-Wohnungen</div>
        <table>
          <thead>
            <tr>
              <th>ID</th><th>Adresse</th>
              <th style={{textAlign:"right"}}>Ausgabe</th>
              <th style={{textAlign:"right"}}>Einnahme Ist</th>
              <th style={{textAlign:"right"}}>Einnahme Max</th>
              <th style={{textAlign:"right"}}>Marge Ist</th>
              <th style={{textAlign:"right"}}>Marge Max</th>
              <th>Belegung</th>
            </tr>
          </thead>
          <tbody>
            {wgApts.map(a=>{
              const rs=rooms.filter(r=>r.aptId===a.id);
              const aOcc=rs.filter(r=>r.occupied).length;
              const aIst=rs.filter(r=>r.occupied).reduce((s,r)=>s+(+r.miete||0),0);
              const aMax=rs.reduce((s,r)=>s+(+r.miete||0),0);

function Bewerber({bewerber,rooms,tenants,apts,updateBewerber,updateRoom,insertTenant}){
  const [sel,setSel]=useState(null);
  const [zuteilModal,setZuteilModal]=useState(false);
  const [selZimmer,setSelZimmer]=useState(null);
  const [einzugDate,setEinzugDate]=useState("");
  const [filterStatus,setFilterStatus]=useState("alle");
  const [copied,setCopied]=useState(false);
  const [vertragModal,setVertragModal]=useState(false);
  const [editModal,setEditModal]=useState(false);
  const [editForm,setEditForm]=useState({});
  const [vertragData,setVertragData]=useState(null);

  // Form link assumes form is hosted at same origin under /mietbewerbung.html
  const formLink = window.location.origin + "/mietbewerbung.html";

  const b=bewerber.find(x=>x.id===sel);
  const freeRooms=rooms.filter(r=>!r.occupied);
  const shown=filterStatus==="alle"?bewerber:bewerber.filter(x=>x.status===filterStatus);

  async function setStatus(id,status){await updateBewerber(id,{status});}

  async function confirmZuteilung(){
    if(!selZimmer||!b)return;
    const room=rooms.find(r=>r.id===selZimmer);
    const newId="T"+Date.now().toString().slice(-6);
    const newTenant={
      id:newId,
      vorname:b.vorname,nachname:b.nachname,
      email:b.email,phone:b.phone,
      geburt:b.geburt?new Date(b.geburt).toLocaleDateString("de-CH"):"",
      gender:b.gender||"",nat:b.nat||"",
      adresse:b.adresse||"",plz:b.plz||"",ort:b.ort||"",
      type:b.type==="AOZ / Sozialhilfe"?"AOZ":b.type||"",
      job:b.job||"",einkommen:b.einkommen||"",
      kautionArt:b.kautionType||"",deposit:false,
      schluessel:false,furnished:b.moebliert==="ja",betreibung:false,
      einzug:einzugDate?new Date(einzugDate).toLocaleDateString("de-CH"):(b.einzug?new Date(b.einzug).toLocaleDateString("de-CH"):""),
      auszug:"",schluessel_nr:"",
    };
    await insertTenant(newTenant);
    await updateRoom(selZimmer,{occupied:true,tenantId:newId});
    await updateBewerber(b.id,{status:"Zugeteilt",zugeteiltes_zimmer:selZimmer});
    setZuteilModal(false);setSelZimmer(null);setSel(null);
  }

  function copyLink(){navigator.clipboard.writeText(formLink).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});}

  function openEdit(){
    if(!b)return;
    setEditForm({...b});
    setEditModal(true);
  }
  async function saveEdit(){
    const {id,...fields}=editForm;
    await updateBewerber(id,fields);
    setEditModal(false);
  }
  function EF(k){return e=>setEditForm(p=>({...p,[k]:e.target.value}));}
  function EFB(k){return e=>setEditForm(p=>({...p,[k]:e.target.checked}));}

  function openVertragModal(){
    if(!b) return;
    // Determine the room: assigned > wish > first free
    const targetRoomId = b.zugeteiltes_zimmer || b.zimmerWunsch;
    const room = targetRoomId ? rooms.find(r=>r.id===targetRoomId) : null;
    const apt = room ? apts.find(a=>a.id===room.aptId) : null;
    const bruttomiete = room ? +room.miete : 1000;
    const nebenkosten = 100;
    const nettomiete = bruttomiete - nebenkosten;
    const strom = 25;
    // Detect kaution variant from multiple possible sources
    let kautionMonate = 3;
    let aufschlag = 0;
    if (b.kautionOpt === "0x" || b.kautionAufschlag === 150 || (b.kautionType||"").toLowerCase().includes("keine")) {
      kautionMonate = 0; aufschlag = 150;
    } else if (b.kautionOpt === "1x" || b.kautionAufschlag === 100 || (b.kautionType||"").startsWith("1")) {
      kautionMonate = 1; aufschlag = 100;
    } else if (b.kautionOpt === "2x" || b.kautionAufschlag === 50 || (b.kautionType||"").startsWith("2")) {
      kautionMonate = 2; aufschlag = 50;
    } else {
      kautionMonate = 3; aufschlag = 0;
    }
    const kautionBetrag = (bruttomiete + strom) * kautionMonate;
    const total = bruttomiete + strom + aufschlag;

    setVertragData({
      zimmerId: targetRoomId || "",
      apt: apt || null,
      room: room || null,
      // Editable fields
      adresse: apt?.adresse || "",
      plz: apt?.plz || "",
      ort: apt?.ort || "Zürich",
      nettomiete,
      nebenkosten,
      bruttomiete,
      strom,
      aufschlag,
      total,
      kautionMonate,
      kautionBetrag,
      moebliert: b.moebliert === "ja",
      einzug: b.einzug || "",
      ortVertrag: "Zürich",
      datumVertrag: new Date().toISOString().split("T")[0],
    });
    setVertragModal(true);
  }

  function formatDateLong(dateStr){
    if (!dateStr) return "____";
    const d = typeof dateStr === "string" ? new Date(dateStr.includes("-") ? dateStr : dateStr.split(".").reverse().join("-")) : dateStr;
    if (isNaN(d.getTime())) return dateStr;
    const months = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
    return `${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()}`;
  }

  function generateContract(){
    if (!vertragData || !b) return;
    const v = vertragData;
    const fullName = `${b.vorname || ""} ${b.nachname || ""}`.trim();
    const html = buildContractHTML(b, v, fullName, formatDateLong);
    const win = window.open("", "_blank");
    if (!win) {
      alert("Popup wurde blockiert.\n\nBitte erlaube Popups für diese Seite und versuche es erneut.");
      return;
    }
    win.document.open();
    win.document.write(html);
    win.document.close();
    // Wait for content + images to load, then trigger print dialog
    win.onload = () => {
      setTimeout(() => {
        win.focus();
        win.print();
      }, 300);
    };
  }

    const adresseFull = `${v.adresse}, CH-${v.plz} in ${v.ort}`;
    const refStr = `${v.adresse} & ${fullName}`;
    return `<!DOCTYPE html>

      ${v.aufschlag>0?`<tr class="aufschlag"><td>Kautions-Aufschlag in CHF</td><td class="amt">+ ${chf2(v.aufschlag)}</td></tr>`:""}

    </table>
  </div>
  <p>Im Mietpreis sind die Kosten für administrative und koordinative Leistungen, Kundenservice, persönliche Betreuung sowie Wasser und weitere Nebenkosten bereits inbegriffen.</p>
  <p>Die Nebenkosten umfassen Heizung, Internet, Wasser, Gebäudewartung, allgemeinen Stromverbrauch im Gebäude, Gebäudeversicherung sowie Abwassergebühren.</p>
  <p>Die Stromkosten werden pauschal mit CHF ${chf2(v.strom)} pro Monat verrechnet.</p>
  <p>Kosten für die Einrichtung werden zusätzlich erhoben, sofern die Möblierungsoption gewählt wurde.</p>
  <p>Nicht enthalten sind allfällige Serafe-Gebühren, diese sind von den Bewohnern selbst zu tragen.</p>
  <p>Die Miete ist monatlich im Voraus, spätestens bis zum <strong>25. des Vormonats</strong>, fällig. Die Zahlung erfolgt gemäss QR-Rechnung per Banküberweisung auf folgendes Konto:</p>

    <div class="bank-info">

      D&amp;T Partners GmbH<br>
      Via Campeun 40, 7403 Rhäzüns<br>
      IBAN: CH80 0077 4010 5279 2690 0
      <div class="ref">Referenz: Miete ${refStr}</div>
    </div>
  </div>
</div>

<!-- §4 KAUTION -->

  <h2>4. Kaution</h2>
  <p>Wünscht der Untermieter, eine reduzierte oder keine Kaution zu leisten, kann dies wie folgt geregelt werden:</p>
  <div class="indent-list">
    <div${v.kautionMonate===3?' style="font-weight:700;color:#1a1a1a"':''}>${v.kautionMonate===3?'☑':'☐'} 3 Monatsmieten Kaution = keine Anpassung des monatlichen Mietzinses (Standard)</div>
    <div${v.kautionMonate===2?' style="font-weight:700;color:#1a1a1a"':''}>${v.kautionMonate===2?'☑':'☐'} 2 Monatsmieten Kaution = monatlicher Mietzins erhöht sich um <strong>CHF 50</strong></div>
    <div${v.kautionMonate===1?' style="font-weight:700;color:#1a1a1a"':''}>${v.kautionMonate===1?'☑':'☐'} 1 Monatsmiete Kaution = monatlicher Mietzins erhöht sich um <strong>CHF 100</strong></div>
    <div${v.kautionMonate===0?' style="font-weight:700;color:#1a1a1a"':''}>${v.kautionMonate===0?'☑':'☐'} Keine Kaution = monatlicher Mietzins erhöht sich um <strong>CHF 150</strong></div>
  </div>

  <div class="highlight-box" style="text-align:left;font-weight:400;font-size:10pt;line-height:1.6">

    ${v.kautionMonate===3?`<strong style="font-size:11pt">3 Monatsmieten Kaution</strong> &middot; CHF ${chf2(v.kautionBetrag || ((+v.bruttomiete||0)+(+v.strom||25))*3)} &middot; kein Aufschlag`:""}
    ${v.kautionMonate===2?`<strong style="font-size:11pt">2 Monatsmieten Kaution</strong> &middot; CHF ${chf2(v.kautionBetrag || ((+v.bruttomiete||0)+(+v.strom||25))*2)} &middot; Aufschlag CHF 50/Mt.`:""}
    ${v.kautionMonate===1?`<strong style="font-size:11pt">1 Monatsmiete Kaution</strong> &middot; CHF ${chf2(v.kautionBetrag || ((+v.bruttomiete||0)+(+v.strom||25)))} &middot; Aufschlag CHF 100/Mt.`:""}

  </div>

  ${v.kautionMonate>0
    ? `<p>Der Untermieter verpflichtet sich, vor dem Einzug eine Kaution in Höhe von ${v.kautionMonate===3?"drei":v.kautionMonate===2?"zwei":"einer"} Monatsmiete${v.kautionMonate>1?"n":""} – <strong>CHF ${chf2(v.kautionBetrag || ((+v.bruttomiete||0)+(+v.strom||25))*v.kautionMonate)}</strong> – über die Plattform <strong>de.evorest.ch</strong> zu leisten. Die Kaution wird dort auf ein separates, auf den Namen des Untermieters lautendes Kautionskonto bei der Hypothekarbank Lenzburg einbezahlt.</p>`
    : `<p>Der Untermieter hat sich für die Variante <strong>ohne Kaution</strong> entschieden. Anstelle der Kaution wird der monatliche Mietzins um <strong>CHF 150</strong> erhöht. Dieser Aufschlag ist bereits im totalen Mietzins (siehe §3) enthalten.</p>`
  }
  <p>Die Rückerstattung ${v.kautionMonate>0?"der Kaution ":""}erfolgt gemäss den Vertragsbedingungen, sobald sämtliche Schlussabrechnungen (z. B. für offene Mieten, Nebenkosten, Strom, allfällige Reparaturen oder Reinigungen) vorliegen und die Wohnung sowie das Inventar ordnungsgemäss und ohne Beanstandung zurückgegeben wurden.${v.kautionMonate>0?" Die Rückzahlung erfolgt auf das bei Evorest hinterlegte Konto des Untermieters.":""}</p>

<!-- §5 -->
<div class="section allow-break">
  <h2>5. Weiteres und Verantwortlichkeiten des Untermieters</h2>
  <p class="clause"><span class="clause-num">5.1</span>Der Untermieter verpflichtet sich, die Wohnung sowie das Inventar sorgfältig zu behandeln und Schäden oder Mängel dem Hauptmieter unverzüglich zu melden. Wohnung und Inventar sind in dem Zustand zurückzugeben, in dem sie übernommen wurden (normale Abnutzung bleibt vorbehalten). Die Übergabe erfolgt bei Ein- und Auszug mittels schriftlichem Übergabeprotokoll. Die Schlussreinigung erfolgt zu Lasten des Untermieters.</p>
  <p class="clause"><span class="clause-num">5.2</span>Der Untermieter ist für die regelmässige Reinigung der Wohnung sowie für die ordnungsgemässe Entsorgung von Abfällen verantwortlich.</p>
  <p class="clause"><span class="clause-num">5.3</span>Eine Untervermietung oder Weitergabe der Wohnung an Dritte ist ohne ausdrückliche schriftliche Zustimmung des Hauptmieters nicht gestattet.</p>
  <p class="clause"><span class="clause-num">5.4</span>Bauliche Veränderungen an der Wohnung oder das Streichen von Wänden sind nur mit vorgängiger schriftlicher Zustimmung des Hauptmieters zulässig.</p>
  <p class="clause"><span class="clause-num">5.5</span>Bei längerer Abwesenheit hat der Untermieter sicherzustellen, dass der Zugang zur Wohnung für Notfälle gewährleistet ist (z. B. durch Hinterlegung eines Schlüssels bei einer Vertrauensperson).</p>
  <p class="clause"><span class="clause-num">5.6</span>Der Untermieter ist verpflichtet, sich innert acht Tagen nach Einzug bei der zuständigen Einwohnerkontrolle anzumelden.</p>
  <p class="clause"><span class="clause-num">5.7</span>Der Untermieter darf die Suche nach Mitbewohnern durch die D&amp;T Partners GmbH nicht behindern. Diese schlägt geeignete Mitbewohner vor und ermöglicht ein vorgängiges Kennenlernen. Im Zweifelsfall behält sich die D&amp;T Partners GmbH das Recht vor, einen Untermietvertrag mit einem Interessenten abzuschliessen, ohne Mitspracherecht der aktuellen Bewohner.</p>
  <p class="clause"><span class="clause-num">5.8</span>In der Schweiz wohnhafte Personen, die Radio- oder Fernsehprogramme empfangen, sind gesetzlich verpflichtet, entsprechende Empfangsgebühren zu entrichten. Diese Verpflichtung liegt beim jeweiligen Haushalt und damit bei den Untermietern. Die D&amp;T Partners GmbH organisiert keine Kostenaufteilung innerhalb der Untermieterschaft.</p>
  <p class="clause"><span class="clause-num">5.9</span>Die Kontaktdaten des Untermieters dürfen – sofern keine ausdrückliche Verweigerung erfolgt – an potenzielle Mitbewohner weitergegeben werden, um ein gegenseitiges Kennenlernen zu ermöglichen.</p>
  <p class="clause"><span class="clause-num">5.10</span>Interne Angelegenheiten zwischen den Mitbewohnern fallen nicht in den Zuständigkeitsbereich des Hauptmieters. Dieser bemüht sich jedoch, bei Bedarf zu unterstützen und ein harmonisches Zusammenleben zu fördern.</p>
</div>

<!-- §6 -->
<div class="section">
  <h2>6. Datenschutz</h2>
  <p>Der Untermieter erklärt sich damit einverstanden, dass seine personenbezogenen Daten zum Zweck der Vertragsabwicklung sowie zur Koordination mit (potenziellen) Mitbewohnern gespeichert, verarbeitet und im erforderlichen Umfang weitergegeben werden dürfen. Eine Weitergabe an Dritte erfolgt ausschliesslich, soweit dies für die Durchführung des Mietverhältnisses notwendig ist.</p>
</div>

<!-- §7 -->
<div class="section allow-break">
  <h2>7. Inventar &amp; Möblierung</h2>
  <p>In den Gemeinschaftsräumen der Wohnung befindet sich ein vollständiges Inventar mit Gegenständen des täglichen Bedarfs. Das Inventar umfasst insbesondere:</p>
  <ul>
    <li>Tisch, Stühle, Besteck, Kochgeschirr, Tellerset, Bratpfanne, Küchenutensilien, Weingläser, Messerset, WC-Bürste, Abfalleimer, Schüsseln, Glas, Badematte, Seifenspender, Kanne, Zahnbürstenhalter, Duschvorhang und Topflappen.</li>
  </ul>
  <p class="clause"><span class="clause-num">7.1</span>Für eine einmalige zusätzliche Gebühr von <strong>CHF 990</strong> kann das Zimmer möbliert angemietet werden. Die Möblierung umfasst:</p>
  <ul>
    <li>Bett (1,40 m breit) mit Bettgestell und Federkernmatratze, Bettwäsche (Innenkissen, Bettwäsche-Set, Bettlaken), Kommode, Nachttisch, Nachttischlampe, Deckenlampe, Schrank, Tisch, Tischlampe, Stuhl, Aufbau inklusive</li>
  </ul>
  <p>Die Möbel werden für die Dauer der Untermiete zur Nutzung überlassen. Der Bewohner verpflichtet sich zu einem sorgfältigen Gebrauch. Die Möbel bleiben im Eigentum der D&amp;T Partners GmbH. Das Nutzungsrecht endet mit Beendigung des Untermietvertrages.</p>
  <div class="highlight-box">Die Möblierung des Zimmers wird dazu gemietet: ${v.moebliert?"Ja":"Nein"}</div>
  <p class="clause"><span class="clause-num">7.2</span>Zum Zeitpunkt der Zimmerübergabe kann die Wohnung je nach Datum noch nicht vollständig möbliert sein. Die Möblierung erfolgt in der Regel innerhalb der ersten Tage nach Schlüsselübergabe oder nach vorgängiger Absprache.</p>
</div>

<!-- §8 -->
<div class="section allow-break">
  <h2>8. Schlüsselübergabe</h2>
  <p>Die Schlüsselübergabe erfolgt zum vereinbarten Datum und zur vereinbarten Uhrzeit (± 3 Arbeitstage). Der Hauptmieter verpflichtet sich, dem Untermieter sämtliche für den Zugang zur Wohnung erforderlichen Schlüssel und Zugangscodes zu übergeben. Erfolgt die Übergabe mit mehr als drei Tagen Verspätung, hat der Untermieter ab dem vierten Tag Anspruch auf eine anteilsmässige Rückerstattung der ersten Mietperiode. Die Schlüssel- und Wohnungsübergabe erfolgt gegen ein schriftliches Übergabeprotokoll bei Ein- und Auszug, welches von beiden Parteien unterzeichnet wird.</p>
  <p class="clause"><span class="clause-num">8.1</span>Der Untermieter bestätigt den Erhalt der Schlüssel und Zugangscodes und verpflichtet sich, diese sorgfältig aufzubewahren und vor unbefugtem Zugriff zu schützen.</p>
  <p class="clause"><span class="clause-num">8.2</span>Bei Beendigung des Mietverhältnisses sind sämtliche Schlüssel und Zugangscodes zurückzugeben.</p>
  <p class="clause"><span class="clause-num">8.3</span>Das Anfertigen zusätzlicher Schlüssel ist ohne Zustimmung des Hauptmieters untersagt. Bei Verlust ist der Hauptmieter berechtigt, betroffene Schlösser auf Kosten des Untermieters zu ersetzen.</p>
</div>

<!-- §9 -->
<div class="section">
  <h2>9. Reparaturen und Instandhaltung</h2>
  <p>Der Hauptmieter ist für die Instandhaltung der Wohnung verantwortlich, einschliesslich notwendiger Reparaturen an sanitären Anlagen, Heizung, Elektrik und baulichen Elementen. Der Untermieter hat Mängel oder Reparaturbedarf unverzüglich zu melden.</p>
</div>

<!-- §10 -->
<div class="section">
  <h2>10. Haftung und Versicherung</h2>
  <p>Der Untermieter haftet für Schäden oder Verluste an Wohnung oder Inventar, die durch fahrlässiges Verhalten oder unsachgemässe Nutzung verursacht werden (einschliesslich durch Besucher). Der Untermieter hat den Nachweis einer gültigen Privathaftpflichtversicherung zu erbringen.</p>
  <p>Für Schäden in gemeinsam genutzten Bereichen haften die Bewohner anteilig (Solidarhaftung), sofern kein Verursacher festgestellt werden kann.</p>
</div>

<!-- §11 -->
<div class="section allow-break">
  <h2>11. Kündigung</h2>
  <p>Beide Parteien können den Mietvertrag vor Ablauf der vereinbarten Mietdauer ordentlich kündigen. Die Kündigungsfrist beträgt drei Monate auf das Ende eines Monats, ausser auf Ende Dezember. Die Kündigung hat schriftlich per Einschreiben oder als elektronisch signiertes PDF zu erfolgen.</p>
  <p class="clause"><span class="clause-num">11.1</span>Im Rahmen eines befristeten Untermietvertrages ist eine Kündigung durch den Untermieter in den letzten sechs Monaten der Vertragslaufzeit ausgeschlossen. Dies stellt sicher, dass das Zimmer oder die Wohnung nicht ungenutzt bleibt und der Mieter die gesamte vereinbarte Mietdauer nutzt. Demzufolge ist die Kündigung nur bis spätestens sechs Monate vor dem festgelegten Enddatum des Vertrages möglich. Beispielsweise, wenn der Mietvertrag am 31. März endet, muss eine etwaige Kündigung spätestens bis zum 30. September des Vorjahres eingereicht werden, so dass der letztmögliche Zeitpunkt das Zimmer oder die Wohnung vor regulärem Ende des Untermietvertrages zu verlassen, der 31. Dezember des Vorjahres ist.</p>
  <p>Gleiches gilt bei einer allfälligen Kündigung des Mietverhältnisses durch den Eigentümer oder die Verwaltung aufgrund von Renovation, Umnutzung oder anderweitiger Pläne: Auch in diesem Fall ist eine Kündigung durch den Untermieter in den letzten sechs Monaten bis zum Ende des Mietverhältnisses ausgeschlossen.</p>
  <p class="clause"><span class="clause-num">11.2</span>Bei wiederholter Nichtzahlung der Miete ist der Hauptmieter berechtigt, das Mietverhältnis per Monatsende fristlos zu kündigen.</p>
  <p class="clause"><span class="clause-num">11.3</span>Bei Kündigung innerhalb der Kündigungsfrist ist der Untermieter verpflichtet, einen geeigneten Nachmieter zu stellen, der zu gleichen Konditionen eintritt und von den Mitbewohnern akzeptiert wird. Erfolgt nachweislich keine aktive Suche, kann der Hauptmieter eine Monatsmiete von der Kaution einbehalten.</p>
  <p class="clause"><span class="clause-num">11.4</span>Bei schwerwiegender Vertragsverletzung (insbesondere Zahlungsverzug, unerlaubte Weitergabe des Zimmers, Störung des Hausfriedens, rechtswidrige Nutzung oder falsche Angaben bei Vertragsabschluss) ist der Hauptmieter berechtigt, den Vertrag fristlos aufzulösen und die unverzügliche Räumung zu verlangen.</p>
</div>

<!-- §12 -->
<div class="section">
  <h2>12. Vertragsänderungen</h2>
  <p>Änderungen oder Ergänzungen dieses Vertrags bedürfen der Schriftform und der Zustimmung beider Parteien.</p>
</div>

<!-- §13 -->
<div class="section">
  <h2>13. Rücktrittsrecht</h2>
  <p>Der Mieter erhält ein ausserordentliches Rücktrittsrecht vom unterzeichneten Mietvertrag bis und mit der persönlichen Besichtigung vor Ort. Dieses Rücktrittsrecht gilt ausschliesslich für den Fall, dass die Wohnung wesentlich von der vorgängig zur Verfügung gestellten virtuellen Tour (VR Tour) abweicht. Im Falle eines solchen Rücktritts entstehen dem Mieter keinerlei Kosten oder Verpflichtungen aus dem Mietvertrag. Bereits geleistete Zahlungen werden vollständig zurückerstattet.</p>
</div>

<!-- §14 -->
<div class="section">
  <h2>14. Gerichtsstand</h2>
  <p>Gerichtsstand für alle Streitigkeiten aus diesem Vertrag ist <strong>Chur</strong>.</p>
</div>

<!-- §15 -->
<div class="section">
  <h2>15. Zusätzliche Bestimmungen</h2>
  <p class="clause"><span class="clause-num">15.1</span>Haustiere sind in der Wohnung nicht gestattet.</p>
  <p class="clause"><span class="clause-num">15.2</span>Rauchen ist in der Wohnung nicht gestattet.</p>
  <p class="clause"><span class="clause-num">15.3</span>Der Untermieter verpflichtet sich, die geltenden Hausordnungen und gesetzlichen Bestimmungen einzuhalten.</p>
  <p class="clause"><span class="clause-num">15.4</span>Die WG-Zimmer sind ausschliesslich für Wohnzwecke der im Vertrag eingetragenen Person bestimmt. Eine Belegung durch mehrere Personen ist unzulässig.</p>
  <p class="clause"><span class="clause-num">15.5</span>Bei Zahlungsverzug kann der Hauptmieter Mahngebühren von <strong>CHF 20 pro Mahnung</strong> sowie Verzugszinsen von <strong>5 % p. a.</strong> erheben.</p>
  <p class="clause"><span class="clause-num">15.6</span>Der Hauptmieter ist berechtigt, das Zimmer nach angemessener Vorankündigung zur Kontrolle, Instandhaltung, Besichtigung mit Interessenten oder bei Vertragsverletzungen zu betreten.</p>
</div>
