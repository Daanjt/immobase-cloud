          </div>
        ))}
      </div>
      </div>
    </div>
  );
}

function TodoPage({tenants, apts, rooms, documents, todos, insertTodo, updateTodo, deleteTodo, navigateTo, todoDismissals, dismissAutoTodo, handoverProtocols}){
  const [newTitle, setNewTitle] = useState("");
  const hasDoc = (t, prefix) => (documents||[]).some(d => (d.category||"").toLowerCase().startsWith(prefix.toLowerCase()) && ((d.entity_type==="tenant" && d.entity_id===t.id) || (d.entity_type==="applicant" && d.entity_id===t.bewerberId)));
  const aptHasDoc = (a, prefix) => (documents||[]).some(d => d.entity_type==="apartment" && d.entity_id===a.id && (d.category||"").toLowerCase().startsWith(prefix.toLowerCase()));
  let auto = [];
  const dmHeute = new Date(); dmHeute.setHours(23,59,59,999);
  (tenants||[]).filter(t=>t.status!=="archiviert").forEach(t=>{
    const nm=`${t.vorname||""} ${t.nachname||""}`.trim()||t.id;
    if(!hasDoc(t,"Untermietvertrag")) auto.push({id:"umv-"+t.id,icon:"📄",label:"Untermietvertrag fehlt",sub:nm,page:"mieter",target:t.id});
    if(!hasDoc(t,"Anfangsmietzins")) auto.push({id:"amz-"+t.id,icon:"📄",label:"Anfangsmietzinsformular fehlt",sub:nm,page:"mieter",target:t.id});
    if(!((t.schluesselAnzahl||t.schluesselNr||"").toString().trim())) auto.push({id:"key-"+t.id,icon:"🔑",label:"Schlüsselnummer fehlt",sub:nm,page:"mieter",target:t.id});
    if(!(t.zivilstand||"").trim()) auto.push({id:"civ-"+t.id,icon:"👤",label:"Zivilstand fehlt",sub:nm,page:"mieter",target:t.id});
    if((t.drittmeldungStatus||"offen")!=="gemeldet") auto.push({id:"dm-ez-"+t.id,icon:"📮",label:"Drittmeldung Einzug offen",sub:nm,page:"mieter",target:t.id});
    if((t.uebergabeStatus||"offen")!=="erledigt" && !hasDoc(t,"Übergabeprotokoll") && !(handoverProtocols||[]).some(h=>h.tenant_id===t.id && ["accepted","abgeschlossen","completed"].includes(h.status))) auto.push({id:"hop-"+t.id,icon:"🔑",label:"Übergabeprotokoll fehlt",sub:nm,page:"mieter",target:t.id});
  });
  (tenants||[]).forEach(t=>{
    const nm=`${t.vorname||""} ${t.nachname||""}`.trim()||t.id;
    const ausD = parseD(t.auszug);
    if(ausD && ausD <= dmHeute && (t.drittmeldungAuszugStatus||"offen")!=="gemeldet") auto.push({id:"dm-az-"+t.id,icon:"📮",label:"Drittmeldung Auszug offen"+(t.status==="archiviert"?" (archiviert)":""),sub:nm,page:"mieter",target:t.id});
  });
  (apts||[]).filter(a=>!a.pipeline).forEach(a=>{
    const an = a.adresse||a.id;
    if(!(a.refnr||"").toString().trim()) auto.push({id:"ref-"+a.id,icon:"🏠",label:"Referenznummer fehlt",sub:an,page:"wohnungen",target:a.id});
    if(!(a.eigentuemer||"").trim()) auto.push({id:"own-"+a.id,icon:"🏢",label:"Eigentümer fehlt",sub:an,page:"wohnungen",target:a.id});
    if(!(a.verwaltung||"").trim()) auto.push({id:"verw-"+a.id,icon:"🏢",label:"Verwaltung fehlt",sub:an,page:"wohnungen",target:a.id});
    (typeof APT_REQUIRED!=="undefined"?APT_REQUIRED:["Hauptmietvertrag","Einzahlungsschein","Kautionsversicherung","Übergabeprotokoll"]).forEach(cat=>{
      if(!aptHasDoc(a,cat)) auto.push({id:"apt-"+a.id+"-"+cat,icon:"📄",label:cat+" fehlt",sub:an,page:"wohnungen",target:a.id});
    });
  });

  const dismissed = new Set(todoDismissals||[]);
  auto = auto.filter(a => !dismissed.has(a.id));

  const order=["offen","in_arbeit","erledigt"];
  const labels={offen:"Offen",in_arbeit:"In Arbeit",erledigt:"Erledigt"};
  const manual=(s)=>(todos||[]).filter(t=>t.status===s);
  const move=(t,dir)=>{const i=order.indexOf(t.status);const ni=Math.max(0,Math.min(2,i+dir));if(ni!==i)updateTodo(t.id,{status:order[ni]});};
  const add=()=>{ if(!newTitle.trim())return; insertTodo(newTitle.trim()).then(()=>setNewTitle("")).catch(()=>{}); };

  return (
    <div className="ph">
      <div className="pt">To-dos</div>
      <p style={{fontSize:12,color:"var(--muted)",margin:"4px 0 16px"}}>Automatisch erkannte Datenlücken (mit Auto-Markierung, klickbar) und eigene Aufgaben. Eigene To-dos verschiebst du mit den Pfeilen zwischen den Spalten.</p>

      <div style={{display:"flex",gap:8,marginBottom:20,maxWidth:520}}>
        <input className="fi" placeholder="Neues To-do…" value={newTitle} onChange={e=>setNewTitle(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")add();}}/>
        <button className="btn btn-p" onClick={add}>Hinzufügen</button>
      </div>

      <div style={{display:"flex",gap:14,flexWrap:"wrap",alignItems:"flex-start"}}>
        {order.map(s=>(
          <div key={s} className="kcol">
            <div className="kcol-h"><span className="t">{labels[s]}</span><span className="c">{manual(s).length + (s==="offen"?auto.length:0)}</span></div>

            {s==="offen" && auto.map(a=>(
              <button key={a.id} className="kauto" onClick={()=>navigateTo&&navigateTo(a.page,a.target)}>
                <span style={{fontSize:15}}>{a.icon}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12.5,fontWeight:600,color:"var(--ink)"}}>{a.label}</div>
                  <div style={{fontSize:11,color:"var(--muted)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{a.sub}</div>
                </div>
                <span className="kbadge">Auto</span>
                <span role="button" title="Dauerhaft ausblenden"
                  onClick={e=>{e.stopPropagation(); if(window.confirm("Dieses automatische To-do dauerhaft ausblenden?")) dismissAutoTodo && dismissAutoTodo(a.id);}}
                  style={{marginLeft:6,fontSize:13,color:"var(--muted)",padding:"0 4px",cursor:"pointer"}}>×</span>
              </button>
            ))}

            {manual(s).map(t=>(
              <div key={t.id} className="kcard">
                <div style={{fontSize:13,color:"var(--ink)",lineHeight:1.4}}>{t.title}</div>
                {t.notiz&&<div style={{fontSize:11.5,color:"var(--muted)",marginTop:3}}>{t.notiz}</div>}
                <div style={{display:"flex",alignItems:"center",gap:5,marginTop:9}}>
                  <button className="kmini" disabled={s==="offen"} onClick={()=>move(t,-1)} title="Zurück">◀</button>
                  <button className="kmini" disabled={s==="erledigt"} onClick={()=>move(t,1)} title="Weiter">▶</button>
                  <div style={{flex:1}}/>
                  <button className="kmini" onClick={()=>{if(confirm("To-do löschen?"))deleteTodo(t.id);}} title="Löschen" style={{color:"var(--error)"}}>✕</button>
                </div>
              </div>
            ))}

            {s==="offen" && auto.length===0 && manual("offen").length===0 && <div style={{fontSize:12,color:"var(--muted-light)",padding:"8px 2px"}}>Alles erledigt 🎉</div>}
            {s!=="offen" && manual(s).length===0 && <div style={{fontSize:12,color:"var(--muted-light)",padding:"8px 2px"}}>—</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

const PAGES=[
  {id:"dashboard",icon:"⊞",label:"Dashboard"},
  {id:"bewerber",icon:"📋",label:"Bewerber"},
  {id:"wohnungen",icon:"🏠",label:"Wohnungen"},
  {id:"zimmer",icon:"🚪",label:"Zimmer"},
  {id:"mieter",icon:"👤",label:"Mieter"},
  {id:"uebergaben",icon:"🔑",label:"Übergaben"},
  {id:"zahlungen",icon:"💰",label:"Zahlungen"},
  {id:"partner",icon:"🏢",label:"Partner"},
  {id:"todos",icon:"✅",label:"To-dos"},
  {id:"finanzen",icon:"📊",label:"Finanzen"},
];

function MainApp() {
  const [page, setPage] = useState("dashboard");
  const [navTarget, setNavTarget] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const data = useSupabaseData();

  // Bei jedem Seitenwechsel wieder nach ganz oben, sonst startet die neue Seite mitten drin
  useEffect(() => {
    const el = document.querySelector(".main");
    if (el && el.scrollTo) el.scrollTo({top:0, left:0, behavior:"auto"});
    else if (el) el.scrollTop = 0;
    if (window.scrollTo) window.scrollTo(0,0);
  }, [page]);

  if (data.loading) return <div className="loading"><div className="spinner"/><p>Lade Daten…</p></div>;

  const Page = {dashboard:Dashboard,bewerber:Bewerber,wohnungen:Wohnungen,zimmer:Zimmer,mieter:Mieter,uebergaben:Uebergaben,zahlungen:Zahlungen,partner:PartnerPage,todos:TodoPage,finanzen:FinanzenSection}[page];
  const freeCount=data.rooms.filter(r=>!r.occupied).length;
  const neueBewerber=data.bewerber.filter(b=>b.status==="Neu").length;
  // Offene Zahlungen für aktuellen Zahlungs-Monat zählen (ab 25. = nächster Monat)
  const now2 = new Date();
  let aktJ = now2.getFullYear();
  let aktM = now2.getMonth() + 1;
  if (now2.getDate() >= 25) {
    aktM += 1;
    if (aktM > 12) { aktM = 1; aktJ += 1; }
  }
  const monatsStart2 = new Date(aktJ, aktM-1, 1);
  const monatsEnde2 = new Date(aktJ, aktM, 0, 23, 59, 59);
  const parseDate2 = (s) => {
    if (!s) return null;
    const str = String(s).trim();
    if (/^\d{4}-\d{2}-\d{2}/.test(str)) return new Date(str);
    const m = str.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
    if (m) return new Date(+m[3], +m[2]-1, +m[1]);
    const d = new Date(str);
    return isNaN(d) ? null : d;
  };
  const relevantTenants = data.tenants.filter(t => {
    const einzug = parseDate2(t.einzug);
    const auszug = parseDate2(t.auszug);
    // Abgesagte Miete: Auszug am oder vor dem Einzug, also nie eingezogen.
    // Nur ausblenden, wenn dazu keine Zahlung erfasst ist (gleiche Regel wie in der Zahlungsseite).
    if (einzug && auszug && auszug <= einzug && !(data.payments||[]).some(pay => pay.tenantId === t.id)) return false;
    if (!einzug) return (t.status||"aktiv") === "aktiv";
    if (einzug > monatsEnde2) return false;
    if (auszug && auszug < monatsStart2) return false;
    return true;
  });
  const offeneUebergaben = data.tenants.filter(t => {
    if ((t.status||"aktiv") !== "aktiv") return false;
    const room = data.rooms.find(r => r.tenantId === t.id);
    if (!room) return false;
    const meine = (data.handoverProtocols||[]).filter(h => h.tenantId === t.id)
      .sort((a,b) => new Date(b.startedAt) - new Date(a.startedAt));
    const latest = meine[0];
    if (latest && ["accepted","auto_accepted"].includes(latest.status)) return false;
    if ((t.uebergabeStatus||"offen") === "erledigt") return false;
    const hatAltesProtokoll = (data.documents||[]).some(d => d.entity_type==="tenant" && d.entity_id===t.id && (d.category||"").toLowerCase().includes("übergabeprotokoll"));
    if (hatAltesProtokoll) return false;
    return true;
  }).length;

  const offeneZahlungen = relevantTenants.filter(t => {
    const p = data.payments.find(pay => pay.tenantId === t.id && pay.jahr === aktJ && pay.monat === aktM);
    return !p || p.status === "offen";
  }).length;

  function navigateTo(targetPage, targetId) {
    setPage(targetPage);
    setNavTarget({id: targetId, type: targetPage});
    setSidebarOpen(false); // close sidebar after navigation on mobile
  }

  async function logout() {
    localStorage.removeItem("immobase_auth");
    localStorage.removeItem("immobase_auth_time");
    window.location.reload();
  }

  return (
    <div className="app">
      <button className="mobile-menu-btn" onClick={()=>setSidebarOpen(true)} aria-label="Menü öffnen">☰</button>
      <div className={`sidebar-overlay${sidebarOpen?" open":""}`} onClick={()=>setSidebarOpen(false)}></div>
      <div className={`sidebar${sidebarOpen?" open":""}`}>
        <div className="logo" style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <h1>ImmoBase</h1>
            <p>D&T HOMES</p>
          </div>
          <button onClick={()=>setSidebarOpen(false)} style={{display:"none",background:"none",border:"none",fontSize:22,color:"var(--muted)",cursor:"pointer",padding:"0 4px"}} className="sidebar-close" aria-label="Menü schliessen">✕</button>
        </div>
        <div className="nav">
          {PAGES.map(p=>(<button key={p.id} className={`nb${page===p.id?" on":""}`} onClick={()=>{setPage(p.id);setNavTarget(null);setSidebarOpen(false);}}>
            <span className="ni">{p.icon}</span><span style={{flex:1}}>{p.label}</span>
            {p.id==="bewerber"&&neueBewerber>0&&<span style={{background:"#f5efe4",color:"#a08864",fontSize:9,padding:"1px 5px",borderRadius:10,fontWeight:700}}>{neueBewerber}</span>}
            {p.id==="zimmer"&&freeCount>0&&<span style={{background:"#f6ecd8",color:"#c89653",fontSize:9,padding:"1px 5px",borderRadius:10,fontWeight:700}}>{freeCount}</span>}
            {p.id==="zahlungen"&&offeneZahlungen>0&&<span style={{background:"#fbeae6",color:"#8a3a2e",fontSize:9,padding:"1px 5px",borderRadius:10,fontWeight:700}}>{offeneZahlungen}</span>}
            {p.id==="uebergaben"&&offeneUebergaben>0&&<span style={{background:"#fbeae6",color:"#8a3a2e",fontSize:9,padding:"1px 5px",borderRadius:10,fontWeight:700}}>{offeneUebergaben}</span>}
          </button>))}
        </div>
        <div className="user-info">
          <div className="uemail">D&T Homes <span style={{fontSize:9,opacity:.5,fontFamily:"monospace"}}>v260709-1404</span></div>
          <button className="logout-btn" onClick={logout}>Abmelden</button>
        </div>
      </div>
      <div className="main"><Page {...data} navigateTo={navigateTo} navTarget={navTarget}/></div>
    </div>
  );
}

function App() {
  const [authed, setAuthed] = useState(undefined);

  useEffect(() => {
    // Check if user is logged in (and session not older than 30 days)
    const ok = localStorage.getItem("immobase_auth");
    const t = +localStorage.getItem("immobase_auth_time") || 0;
    const thirtyDays = 30 * 24 * 60 * 60 * 1000;
    if (ok === "ok" && (Date.now() - t) < thirtyDays) {
      setAuthed(true);
    } else {
      localStorage.removeItem("immobase_auth");
      localStorage.removeItem("immobase_auth_time");
      setAuthed(false);
    }
  }, []);

  if (authed === undefined) return <div className="loading"><div className="spinner"/><p>Lade…</p></div>;
  if (!authed) return <Login onLogin={()=>setAuthed(true)}/>;
  return <MainApp/>;
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {error: null, info: null}; }
  static getDerivedStateFromError(error) { return {error}; }
  componentDidCatch(error, info) { console.error("React error:", error, info); this.setState({info}); }
  render() {
    if (this.state.error) {
      return (
        <div style={{padding:"40px 32px",maxWidth:800,margin:"40px auto",fontFamily:"Manrope,sans-serif",background:"#fff",border:"1px solid #e1d8c5",borderRadius:8}}>
          <h2 style={{fontWeight:600,fontSize:20,marginBottom:14,color:"#9b4a3e"}}>⚠️ Ein Fehler ist aufgetreten</h2>
          <p style={{fontSize:13,color:"#4a4439",lineHeight:1.6,marginBottom:14}}>Die Anwendung konnte nicht geladen werden. Mögliche Ursachen:</p>
          <ul style={{fontSize:13,color:"#4a4439",lineHeight:1.7,marginLeft:20,marginBottom:18}}>
            <li>Supabase-Setup unvollständig (z.B. Documents-Tabelle fehlt)</li>
            <li>Browser-Cache veraltet → mit Strg+F5 neu laden</li>
            <li>Datenbankspalten passen nicht - schick uns den Fehler</li>
          </ul>
          <details style={{marginBottom:14}}>
            <summary style={{cursor:"pointer",fontWeight:600,fontSize:13,color:"#1a1814"}}>Technische Details (zum Kopieren)</summary>
            <pre style={{marginTop:10,padding:12,background:"#fafaf7",borderRadius:6,fontSize:11,whiteSpace:"pre-wrap",overflow:"auto"}}>{String(this.state.error)}{"\n\n"}{this.state.info?.componentStack||""}</pre>
          </details>
          <button onClick={() => location.reload()} style={{padding:"10px 20px",background:"#1a1814",color:"#fff",border:"none",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:500}}>↻ Seite neu laden</button>
        </div>
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
})();
</script>
</body>
