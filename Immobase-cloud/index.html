  font-size:9pt;
}
.sig-block .sig-row .lbl{font-weight:600;color:#444;min-width:55pt}
.sig-block .sig-row .line{flex:1;border-bottom:.5pt solid #888;min-height:14pt}

.page-break{page-break-after:always}
.avoid-break{page-break-inside:avoid}
</style>
</head>
<body>

<div class="print-banner">
Vertragsentwurf bereit · Wähle <strong>"Als PDF speichern"</strong> im Druck-Dialog
<button onclick="window.print()">📄 Drucken / PDF speichern</button>
<button onclick="window.close()" style="background:transparent;color:#fff;border:1px solid #fff">Schliessen</button>
</div>

<!-- HEADER -->
<div class="doc-header">
<div class="left">
  <div class="label">Vertrag</div>
  <div class="doc-title">Untermietvertrag</div>
</div>
<div class="logo"><img src="${DT_LOGO_DATA_URI}" alt="D&T Homes"/></div>
</div>

<!-- PERSON CARD -->
<div class="person-card">
<div class="ph">Untermieter*in</div>
<div class="person-grid">
  <span class="pl">Vorname:</span><span class="pv">${b.vorname||"-"}</span>
  <span class="pl">Nachname:</span><span class="pv">${b.nachname||"-"}</span>
  <span class="pl">Strasse:</span><span class="pv">${b.adresse||"-"}</span>
  <span class="pl">PLZ / Ort:</span><span class="pv">${b.plz||""} ${b.ort||""}</span>
  <span class="pl">E-Mail:</span><span class="pv">${b.email||"-"}</span>
  <span class="pl">Telefon:</span><span class="pv">${b.phone||"-"}</span>
  <span class="pl">Geburtsdatum:</span><span class="pv">${fmtDate(b.geburt)||"-"}</span>
  <span class="pl">Nationalität:</span><span class="pv">${b.nat||"-"}</span>
</div>
</div>

<!-- GREETING -->
<div class="greeting">
<p class="welcome">Guten Tag ${fullName},</p>
<p class="welcome">Herzlich willkommen bei D&amp;T Homes!</p>
<p>Nachfolgend findest du alle Details und Regelungen zur Miete. Der vorliegende Untermietvertrag wird zwischen der <strong>D&amp;T Partners GmbH</strong> als Hauptmieterin und dir als Untermieter*in abgeschlossen. Bitte nimm dir einen Moment Zeit, den Vertrag sorgfältig zu lesen, und unterzeichne ihn, wenn du mit den Bedingungen einverstanden bist.</p>
</div>

<!-- §1 MIETOBJEKT -->
<div class="section">
<h2>1. Mietobjekt</h2>
<p>Das Objekt befindet sich an der <strong>${adresseFull}</strong>.</p>
<p>Untervermietet wird <strong>Zimmer Nr. ${v.zimmerId}</strong>, inklusive Mitbenutzung der gemeinschaftlichen Räumlichkeiten.</p>
</div>

<!-- §2 MIETDAUER -->
<div class="section">
<h2>2. Mietdauer</h2>
<p>${(() => {
  function parseD(s) {
    if (!s) return null;
    const str = String(s).trim();
    if (!str) return null;
    if (/^\d{4}-\d{2}-\d{2}/.test(str)) { const d=new Date(str); return isNaN(d.getTime())?null:d; }
    const m = str.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
    if (m) { const d=new Date(+m[3], +m[2]-1, +m[1]); return isNaN(d.getTime())?null:d; }
    const d = new Date(str); return isNaN(d.getTime())?null:d;
  }
  const beginn = parseD(v.einzug);
  const mietende = parseD(v.mietende || v.apt?.mietende);
  if (beginn && mietende) {
    const months = (mietende - beginn) / (1000*60*60*24*30.44);
    if (months > 0 && months < 12) {
      return `Das Mietverhältnis beginnt am <strong>${fmtDate(v.einzug)}</strong> und ist <strong>befristet bis ${fmtDate(v.mietende || v.apt.mietende)}</strong>. Der Mietvertrag endet automatisch zum vereinbarten Enddatum, sofern keine schriftliche Verlängerung vereinbart wird. Da die vereinbarte Mietdauer weniger als zwölf (12) Monate beträgt, ist eine ordentliche Kündigung durch den Untermieter ausgeschlossen. Der Untermieter verpflichtet sich, die gesamte Mietdauer zu mieten und die entsprechenden Mietzinsen vollständig zu entrichten (siehe Ziffer 11.1).`;
    }
  }
  return `Das Mietverhältnis beginnt am <strong>${fmtDate(v.einzug)}</strong> und ist <strong>unbefristet</strong>, beträgt jedoch mindestens ${(function(n){const w={1:"einen",2:"zwei",3:"drei",4:"vier",5:"fünf",6:"sechs",7:"sieben",8:"acht",9:"neun",10:"zehn",11:"elf",12:"zwölf"};return w[n]||String(n);})(v.minMietdauer||6)} Monate.`;
})()}</p>
</div>

<!-- §3 MIETZINS -->
<div class="section">
<h2>3. Mietzins</h2>
<p>Der monatliche Mietzins für das Zimmer ${v.zimmerId} beträgt:</p>
<div class="miet-wrap avoid-break">
  <table class="miet-table">
    <tr><td>Nettomiete in CHF</td><td class="amt">${chf2(v.nettomiete)}</td></tr>
    <tr><td>Nebenkosten in CHF</td><td class="amt">${chf2(v.nebenkosten)}</td></tr>
    <tr><td>Stromkosten in CHF</td><td class="amt">${chf2(v.strom)}</td></tr>
    ${v.aufschlag>0?`<tr class="aufschlag"><td>Kautions-Aufschlag in CHF</td><td class="amt">+ ${chf2(v.aufschlag)}</td></tr>`:""}
    <tr class="total"><td>Totaler Mietzins in CHF</td><td class="amt">${chf2(v.total)}</td></tr>
  </table>
</div>
<p>Im Mietpreis sind die Kosten für administrative und koordinative Leistungen, Kundenservice, persönliche Betreuung sowie Wasser und weitere Nebenkosten bereits inbegriffen.</p>
<p>Die Nebenkosten umfassen Heizung, Internet, Wasser, Gebäudewartung, allgemeinen Stromverbrauch im Gebäude, Gebäudeversicherung sowie Abwassergebühren.</p>
<p>Die Stromkosten werden pauschal mit CHF ${chf2(v.strom)} pro Monat verrechnet.</p>
<p>Kosten für die Einrichtung werden zusätzlich erhoben, sofern die Möblierungsoption gewählt wurde.</p>
<p>Nicht enthalten sind allfällige Serafe-Gebühren, diese sind von den Bewohnern selbst zu tragen.</p>
<p>Die Miete ist monatlich im Voraus, spätestens bis zum <strong>25. des Vormonats</strong>, fällig. Die Zahlung erfolgt gemäss QR-Rechnung per Banküberweisung auf folgendes Konto:</p>
<div class="bank-block avoid-break">
  <img class="qr-box" src="${DT_QR_DATA_URI}" alt="QR-Rechnung"/>
  <div class="bank-info">
    <strong>Graubündner Kantonalbank</strong><br>
    D&amp;T Partners GmbH<br>
    Via Campeun 40, 7403 Rhäzüns<br>
    IBAN: CH80 0077 4010 5279 2690 0
    <div class="ref">Referenz: Miete ${refStr}</div>
  </div>
</div>
</div>

<!-- §4 KAUTION -->
<div class="section allow-break">
<h2>4. Kaution</h2>
<p>Wünscht der Untermieter, eine reduzierte oder keine Kaution zu leisten, kann dies wie folgt geregelt werden:</p>
<div class="indent-list">
  <div${v.kautionMonate===3?' style="font-weight:700;color:#1a1a1a"':''}>${v.kautionMonate===3?'☑':'☐'} 3 Monatsmieten Kaution = keine Anpassung des monatlichen Mietzinses (Standard)</div>
  <div${v.kautionMonate===2?' style="font-weight:700;color:#1a1a1a"':''}>${v.kautionMonate===2?'☑':'☐'} 2 Monatsmieten Kaution = monatlicher Mietzins erhöht sich um <strong>CHF 50</strong></div>
  <div${v.kautionMonate===1?' style="font-weight:700;color:#1a1a1a"':''}>${v.kautionMonate===1?'☑':'☐'} 1 Monatsmiete Kaution = monatlicher Mietzins erhöht sich um <strong>CHF 100</strong></div>
  <div${v.kautionMonate===0?' style="font-weight:700;color:#1a1a1a"':''}>${v.kautionMonate===0?'☑':'☐'} Keine Kaution = monatlicher Mietzins erhöht sich um <strong>CHF 150</strong></div>
</div>

<div class="highlight-box" style="text-align:left;font-weight:400;font-size:10pt;line-height:1.6">
  <div style="font-size:8pt;color:#888;letter-spacing:.25em;text-transform:uppercase;font-weight:700;margin-bottom:6pt">Gewählte Variante</div>
  ${v.kautionMonate===3?`<strong style="font-size:11pt">3 Monatsmieten Kaution</strong> &middot; CHF ${chf2(v.kautionBetrag || ((+v.bruttomiete||0)+(+v.strom||25))*3)} &middot; kein Aufschlag`:""}
  ${v.kautionMonate===2?`<strong style="font-size:11pt">2 Monatsmieten Kaution</strong> &middot; CHF ${chf2(v.kautionBetrag || ((+v.bruttomiete||0)+(+v.strom||25))*2)} &middot; Aufschlag CHF 50/Mt.`:""}
  ${v.kautionMonate===1?`<strong style="font-size:11pt">1 Monatsmiete Kaution</strong> &middot; CHF ${chf2(v.kautionBetrag || ((+v.bruttomiete||0)+(+v.strom||25)))} &middot; Aufschlag CHF 100/Mt.`:""}
  ${v.kautionMonate===0?`<strong style="font-size:11pt">Keine Kaution</strong> &middot; Aufschlag CHF 150/Mt.`:""}
</div>

${v.kautionMonate>0
  ? `<p>Der Untermieter verpflichtet sich, vor dem Einzug eine Kaution in Höhe von ${v.kautionMonate===3?"drei":v.kautionMonate===2?"zwei":"einer"} Monatsmiete${v.kautionMonate>1?"n":""} - <strong>CHF ${chf2(v.kautionBetrag || ((+v.bruttomiete||0)+(+v.strom||25))*v.kautionMonate)}</strong> - über die Plattform <strong>de.evorest.ch</strong> zu leisten. Die Kaution wird dort auf ein separates, auf den Namen des Untermieters lautendes Kautionskonto bei der Hypothekarbank Lenzburg einbezahlt.</p>`
  : `<p>Der Untermieter hat sich für die Variante <strong>ohne Kaution</strong> entschieden. Anstelle der Kaution wird der monatliche Mietzins um <strong>CHF 150</strong> erhöht. Dieser Aufschlag ist bereits im totalen Mietzins (siehe §3) enthalten.</p>`
}
<p>Die Rückerstattung ${v.kautionMonate>0?"der Kaution ":""}erfolgt gemäss den Vertragsbedingungen, sobald sämtliche Schlussabrechnungen (z. B. für offene Mieten, Nebenkosten, Strom, allfällige Reparaturen oder Reinigungen) vorliegen und die Wohnung sowie das Inventar ordnungsgemäss und ohne Beanstandung zurückgegeben wurden.${v.kautionMonate>0?" Die Rückzahlung erfolgt auf das bei Evorest hinterlegte Konto des Untermieters.":""}</p>
</div>

<!-- §5 -->
<div class="section allow-break">
<h2>5. Weiteres und Verantwortlichkeiten des Untermieters</h2>
<p class="clause"><span class="clause-num">5.1</span>Der Untermieter verpflichtet sich, die Wohnung sowie das Inventar sorgfältig zu behandeln und Schäden oder Mängel dem Hauptmieter unverzüglich zu melden. Wohnung und Inventar sind in dem Zustand zurückzugeben, in dem sie übernommen wurden (normale Abnutzung bleibt vorbehalten). Die Übergabe erfolgt bei Ein- und Auszug mittels schriftlichem Übergabeprotokoll. Die Schlussreinigung erfolgt zu Lasten des Untermieters.</p>
<p class="clause"><span class="clause-num">5.2</span>Der Untermieter ist für die regelmässige Reinigung der Wohnung sowie für die ordnungsgemässe Entsorgung von Abfällen verantwortlich.</p>
<p class="clause"><span class="clause-num">5.3</span>Eine Untervermietung oder Weitergabe der Wohnung an Dritte ist ohne ausdrückliche schriftliche Zustimmung des Hauptmieters nicht gestattet.</p>
<p class="clause"><span class="clause-num">5.4</span>Bauliche Veränderungen an der Wohnung oder das Streichen von Wänden sind nur mit vorgängiger schriftlicher Zustimmung des Hauptmieters zulässig.</p>
<p class="clause"><span class="clause-num">5.5</span>Bei längerer Abwesenheit hat der Untermieter sicherzustellen, dass der Zugang zur Wohnung für Notfälle gewährleistet ist (z. B. durch Hinterlegung eines Schlüssels bei einer Vertrauensperson).</p>
<p class="clause"><span class="clause-num">5.6</span>Der Untermieter ist verpflichtet, sich innert acht Tagen nach Einzug bei der zuständigen Einwohnerkontrolle anzumelden.</p>
<p class="clause"><span class="clause-num">5.7</span>Der Untermieter darf die Suche nach Mitbewohnern durch die D&amp;T Partners GmbH nicht behindern. Diese schlägt geeignete Mitbewohner vor und ermöglicht ein vorgängiges Kennenlernen. Im Zweifelsfall behält sich die D&amp;T Partners GmbH das Recht vor, einen Untermietvertrag mit einem Interessenten abzuschliessen, ohne Mitspracherecht der aktuellen Bewohner.</p>
<p class="clause"><span class="clause-num">5.8</span>In der Schweiz wohnhafte Personen, die Radio- oder Fernsehprogramme empfangen, sind gesetzlich verpflichtet, entsprechende Empfangsgebühren zu entrichten. Diese Verpflichtung liegt beim jeweiligen Haushalt und damit bei den Untermietern. Die D&amp;T Partners GmbH organisiert keine Kostenaufteilung innerhalb der Untermieterschaft.</p>
<p class="clause"><span class="clause-num">5.9</span>Die Kontaktdaten des Untermieters dürfen - sofern keine ausdrückliche Verweigerung erfolgt - an potenzielle Mitbewohner weitergegeben werden, um ein gegenseitiges Kennenlernen zu ermöglichen.</p>
<p class="clause"><span class="clause-num">5.10</span>Interne Angelegenheiten zwischen den Mitbewohnern fallen nicht in den Zuständigkeitsbereich des Hauptmieters. Dieser bemüht sich jedoch, bei Bedarf zu unterstützen und ein harmonisches Zusammenleben zu fördern.</p>
</div>

<!-- §6 -->
<div class="section">
<h2>6. Datenschutz</h2>
<p>Der Untermieter erklärt sich damit einverstanden, dass seine personenbezogenen Daten zum Zweck der Vertragsabwicklung sowie zur Koordination mit (potenziellen) Mitbewohnern gespeichert, verarbeitet und im erforderlichen Umfang weitergegeben werden dürfen. Eine Weitergabe an Dritte erfolgt ausschliesslich, soweit dies für die Durchführung des Mietverhältnisses notwendig ist.</p>
</div>

<!-- §7 -->
<div class="section allow-break">
<h2>7. Inventar &amp; Möblierung</h2>
<p>In den Gemeinschaftsräumen der Wohnung befindet sich ein vollständiges Inventar mit Gegenständen des täglichen Bedarfs. Das Inventar umfasst insbesondere:</p>
<ul>
  <li>Tisch, Stühle, Besteck, Kochgeschirr, Tellerset, Bratpfanne, Küchenutensilien, Weingläser, Messerset, WC-Bürste, Abfalleimer, Schüsseln, Glas, Badematte, Seifenspender, Kanne, Zahnbürstenhalter, Duschvorhang und Topflappen.</li>
</ul>
<p class="clause"><span class="clause-num">7.1</span>Für eine einmalige zusätzliche Gebühr von <strong>CHF ${v.moeblierungPauschale||990}</strong> kann das Zimmer möbliert angemietet werden. Die Möblierung umfasst:</p>
<ul>
  <li>Bett (1,40 m breit) mit Bettgestell und Federkernmatratze, Bettwäsche (Innenkissen, Bettwäsche-Set, Bettlaken), Kommode, Nachttisch, Nachttischlampe, Deckenlampe, Schrank, Tisch, Tischlampe, Stuhl, Aufbau inklusive</li>
</ul>
<p>Die Möbel werden für die Dauer der Untermiete zur Nutzung überlassen. Der Bewohner verpflichtet sich zu einem sorgfältigen Gebrauch. Die Möbel bleiben im Eigentum der D&amp;T Partners GmbH. Das Nutzungsrecht endet mit Beendigung des Untermietvertrages.</p>
<div class="highlight-box">Die Möblierung des Zimmers wird dazu gemietet: ${v.moebliert?"Ja":"Nein"}</div>
<p class="clause"><span class="clause-num">7.2</span>Zum Zeitpunkt der Zimmerübergabe kann die Wohnung je nach Datum noch nicht vollständig möbliert sein. Die Möblierung erfolgt in der Regel innerhalb der ersten Tage nach Schlüsselübergabe oder nach vorgängiger Absprache.</p>
</div>

<!-- §8 -->
<div class="section allow-break">
<h2>8. Schlüsselübergabe</h2>
<p>Die Schlüsselübergabe erfolgt zum vereinbarten Datum und zur vereinbarten Uhrzeit (± 3 Arbeitstage). Der Hauptmieter verpflichtet sich, dem Untermieter sämtliche für den Zugang zur Wohnung erforderlichen Schlüssel und Zugangscodes zu übergeben. Erfolgt die Übergabe mit mehr als drei Tagen Verspätung, hat der Untermieter ab dem vierten Tag Anspruch auf eine anteilsmässige Rückerstattung der ersten Mietperiode. Die Schlüssel- und Wohnungsübergabe erfolgt gegen ein schriftliches Übergabeprotokoll bei Ein- und Auszug, welches von beiden Parteien unterzeichnet wird.</p>
<p class="clause"><span class="clause-num">8.1</span>Der Untermieter bestätigt den Erhalt der Schlüssel und Zugangscodes und verpflichtet sich, diese sorgfältig aufzubewahren und vor unbefugtem Zugriff zu schützen.</p>
<p class="clause"><span class="clause-num">8.2</span>Bei Beendigung des Mietverhältnisses sind sämtliche Schlüssel und Zugangscodes zurückzugeben.</p>
<p class="clause"><span class="clause-num">8.3</span>Das Anfertigen zusätzlicher Schlüssel ist ohne Zustimmung des Hauptmieters untersagt. Bei Verlust ist der Hauptmieter berechtigt, betroffene Schlösser auf Kosten des Untermieters zu ersetzen.</p>
</div>

<!-- §9 -->
<div class="section">
<h2>9. Reparaturen und Instandhaltung</h2>
<p>Der Hauptmieter ist für die Instandhaltung der Wohnung verantwortlich, einschliesslich notwendiger Reparaturen an sanitären Anlagen, Heizung, Elektrik und baulichen Elementen. Der Untermieter hat Mängel oder Reparaturbedarf unverzüglich zu melden.</p>
</div>

<!-- §10 -->
<div class="section">
<h2>10. Haftung und Versicherung</h2>
<p>Der Untermieter haftet für Schäden oder Verluste an Wohnung oder Inventar, die durch fahrlässiges Verhalten oder unsachgemässe Nutzung verursacht werden (einschliesslich durch Besucher). Der Untermieter hat den Nachweis einer gültigen Privathaftpflichtversicherung zu erbringen.</p>
<p>Für Schäden in gemeinsam genutzten Bereichen haften die Bewohner anteilig (Solidarhaftung), sofern kein Verursacher festgestellt werden kann.</p>
</div>

<!-- §11 -->
<div class="section allow-break">
<h2>11. Kündigung</h2>
<p>Beide Parteien können den Mietvertrag vor Ablauf der vereinbarten Mietdauer ordentlich kündigen. Die Kündigungsfrist beträgt ${(function(n){const w={1:"einen",2:"zwei",3:"drei",4:"vier",5:"fünf",6:"sechs"};return w[n]||String(n);})(v.kuendigungsfrist||3)} ${(v.kuendigungsfrist===1?"Monat":"Monate")} auf das Ende eines Monats, ausser auf Ende Dezember. Die Kündigung hat schriftlich per Einschreiben oder als elektronisch signiertes PDF zu erfolgen.</p>
<p class="clause"><span class="clause-num">11.1</span>Bei befristeten Untermietverhältnissen mit einer vereinbarten Mietdauer von weniger als zwölf (12) Monaten ist eine ordentliche Kündigung durch den Untermieter ausgeschlossen. Der Untermieter verpflichtet sich, das Zimmer bzw. die Wohnung für die gesamte vereinbarte Mietdauer zu mieten und die entsprechenden Mietzinsen bis zum Vertragsende vollständig zu entrichten. Dies gilt auch dann, wenn der Untermieter das Zimmer vorzeitig verlässt.</p>
<p class="clause"><span class="clause-num">11.2</span>Bei befristeten Untermietverhältnissen mit einer vereinbarten Mietdauer von zwölf (12) Monaten oder mehr ist eine Kündigung durch den Untermieter in den letzten sechs Monaten der Vertragslaufzeit ausgeschlossen. Dies stellt sicher, dass das Zimmer oder die Wohnung nicht ungenutzt bleibt und der Mieter die gesamte vereinbarte Mietdauer nutzt. Demzufolge ist die Kündigung nur bis spätestens sechs Monate vor dem festgelegten Enddatum des Vertrages möglich. Beispielsweise, wenn der Mietvertrag am 31. März endet, muss eine etwaige Kündigung spätestens bis zum 30. September des Vorjahres eingereicht werden, so dass der letztmögliche Zeitpunkt das Zimmer oder die Wohnung vor regulärem Ende des Untermietvertrages zu verlassen, der 31. Dezember des Vorjahres ist.</p>
<p class="clause"><span class="clause-num">11.3</span>Wird ein zunächst unbefristetes Untermietverhältnis durch den Eigentümer oder die Verwaltung infolge einer geplanten Sanierung, Renovation, Umnutzung oder anderweitiger baulicher Massnahmen gekündigt, so gilt ab dem Zeitpunkt, an dem dem Hauptmieter die Kündigung des Hauptmietverhältnisses mitgeteilt wird, eine analoge Schutzfrist: Eine Kündigung durch den Untermieter ist in den letzten sechs Monaten vor dem festgelegten Räumungstermin ausgeschlossen. Der Untermieter verpflichtet sich, das Zimmer bzw. die Wohnung bis zum vereinbarten Räumungstermin zu mieten und die entsprechenden Mietzinsen vollständig zu entrichten. Der Hauptmieter wird den Untermieter unverzüglich nach Kenntnisnahme der Sanierungs- oder Räumungspläne schriftlich darüber informieren.</p>
<p>Gleiches gilt sinngemäss bei jeder anderen Form der Kündigung des Hauptmietverhältnisses durch den Eigentümer oder die Verwaltung: Auch in diesem Fall ist eine Kündigung durch den Untermieter in den letzten sechs Monaten bis zum Ende des Mietverhältnisses ausgeschlossen.</p>
<p class="clause"><span class="clause-num">11.4</span>Bei wiederholter Nichtzahlung der Miete ist der Hauptmieter berechtigt, das Mietverhältnis per Monatsende fristlos zu kündigen.</p>
<p class="clause"><span class="clause-num">11.5</span>Bei Kündigung innerhalb der Kündigungsfrist ist der Untermieter verpflichtet, einen geeigneten Nachmieter zu stellen, der zu gleichen Konditionen eintritt und von den Mitbewohnern akzeptiert wird. Erfolgt nachweislich keine aktive Suche, kann der Hauptmieter eine Monatsmiete von der Kaution einbehalten.</p>
<p class="clause"><span class="clause-num">11.6</span>Bei schwerwiegender Vertragsverletzung (insbesondere Zahlungsverzug, unerlaubte Weitergabe des Zimmers, Störung des Hausfriedens, rechtswidrige Nutzung oder falsche Angaben bei Vertragsabschluss) ist der Hauptmieter berechtigt, den Vertrag fristlos aufzulösen und die unverzügliche Räumung zu verlangen.</p>
</div>

<!-- §12 -->
<div class="section">
<h2>12. Vertragsänderungen</h2>
<p>Änderungen oder Ergänzungen dieses Vertrags bedürfen der Schriftform und der Zustimmung beider Parteien.</p>
</div>

<!-- §13 -->
<div class="section">
<h2>13. Rücktrittsrecht</h2>
<p>Der Mieter erhält ein ausserordentliches Rücktrittsrecht vom unterzeichneten Mietvertrag bis und mit der persönlichen Besichtigung vor Ort. Dieses Rücktrittsrecht gilt ausschliesslich für den Fall, dass die Wohnung wesentlich von der vorgängig zur Verfügung gestellten virtuellen Tour (VR Tour) abweicht. Im Falle eines solchen Rücktritts entstehen dem Mieter keinerlei Kosten oder Verpflichtungen aus dem Mietvertrag. Bereits geleistete Zahlungen werden vollständig zurückerstattet.</p>
</div>

<!-- §14 -->
<div class="section">
<h2>14. Gerichtsstand</h2>
<p>Gerichtsstand für alle Streitigkeiten aus diesem Vertrag ist <strong>Chur</strong>.</p>
</div>

<!-- §15 -->

function daanDatumStr() {
  return new Date().toLocaleDateString("de-CH", { day:"numeric", month:"long", year:"numeric" });
}
function injectDaanInUMV(html) {
  const hauptmieterPattern = /(<div class="sig-block">\s*<div class="role">Hauptmieter<\/div>[\s\S]*?<div class="sig-row">\s*<span class="lbl">Unterschrift:<\/span>\s*)<span class="line"><\/span>/;
  let sigOk = false;
  let replaced = html.replace(hauptmieterPattern, (match, prefix) => {
    sigOk = true;
    return `${prefix}<span class="line" style="position:relative;flex:1;"><img src="${DAAN_FAKSIMILE_DATA_URI}" style="position:absolute;left:8pt;bottom:-6pt;height:28pt;pointer-events:none;" alt="Daan Theijse"/></span>`;
  });
  const datumPattern = /(<div class="sig-block">\s*<div class="role">Hauptmieter<\/div>[\s\S]*?<div class="sig-row">\s*<span class="lbl">Ort, Datum:<\/span>\s*)<span class="line"><\/span>/;
  const datumStr = daanDatumStr();
  let datumOk = false;
  replaced = replaced.replace(datumPattern, (m, prefix) => {
    datumOk = true;
    return `${prefix}<span class="line" style="border-bottom:.5pt solid #888;flex:1;">Zürich, ${datumStr}</span>`;
  });
  if (!sigOk || !datumOk) throw new Error(`injectDaanInUMV: Hauptmieter-Signaturblock nicht gefunden [sig=${sigOk}, datum=${datumOk}]`);
  return replaced;
}
function injectDaanInAMZ(html) {
  const datumStr = daanDatumStr();
  const labelStyle = ' style="min-width:62pt;width:62pt;"';
  const vermPattern = /(<div class="lbl">Vermieter\*in<\/div>[\s\S]*?<div class="sig-row-inner"><span class="label")(>Datum:<\/span>)<span class="line"><\/span>(<\/div>\s*<div class="sig-row-inner"><span class="label")(>Unterschrift:<\/span>)<span class="line"><\/span>/;
  let vermOk = false;
  let replaced = html.replace(vermPattern, (m, p1, p2, p3, p4) => {
    vermOk = true;
    return `${p1}${labelStyle}${p2}<span class="line" style="flex:1;">${datumStr}</span>${p3}${labelStyle}${p4}<span class="line" style="position:relative;flex:1;"><img src="${DAAN_FAKSIMILE_DATA_URI}" style="position:absolute;left:8pt;bottom:-6pt;height:22pt;pointer-events:none;" alt="Daan Theijse"/></span>`;
  });
  const mieterPattern = /(<div class="lbl">Mieter\*in<\/div>[\s\S]*?<div class="sig-row-inner"><span class="label")(>Datum:<\/span><span class="line"><\/span><\/div>\s*<div class="sig-row-inner"><span class="label")(>Unterschrift:<\/span>)/;
  let mieterOk = false;
  replaced = replaced.replace(mieterPattern, (m, p1, p2, p3) => {
    mieterOk = true;
    return `${p1}${labelStyle}${p2}${labelStyle}${p3}`;
  });
  if (!vermOk || !mieterOk) throw new Error(`injectDaanInAMZ: Signaturblock nicht gefunden [verm=${vermOk}, mieter=${mieterOk}]`);
  return replaced;
}
async function htmlToPdf(html, filename, maxRetries = 2) {
  let lastErr = null;
  for (let attempt = 0; attempt <= maxRetries; attempt++) {
    try {
      const response = await fetch("https://mieter.dthomes.ch/api/pdf-generate", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ html, filename }),
      });
      if (response.ok) return await response.blob();
      const errText = await response.text();
      lastErr = new Error(`PDF generation failed (${response.status}): ${errText}`);
      const retriable = response.status === 500 && (errText.includes("ETXTBSY") || errText.includes("timeout") || errText.includes("Failed to launch"));
      if (!retriable || attempt === maxRetries) throw lastErr;
      await new Promise(r => setTimeout(r, 1500));
    } catch (err) {
      if (attempt === maxRetries) throw err;
      lastErr = err; await new Promise(r => setTimeout(r, 1500));
    }
  }
  throw lastErr;
}
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

function generateContractToken() {
  const arr = new Uint8Array(16);
  crypto.getRandomValues(arr);
  return Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join('');
}

  // Faksimile-Signatur in HTML einfügen (Hauptmieter im UMV)
  // Einheitliches Datumsformat (ohne führende Null, wie in der Edge Function)
  function daanDatumStr() {
    return new Date().toLocaleDateString("de-CH", { day:"numeric", month:"long", year:"numeric" });
  }

  function injectDaanInUMV(html) {
    const hauptmieterPattern = /(<div class="sig-block">\s*<div class="role">Hauptmieter<\/div>[\s\S]*?<div class="sig-row">\s*<span class="lbl">Unterschrift:<\/span>\s*)<span class="line"><\/span>/;
    let sigOk = false;
    let replaced = html.replace(hauptmieterPattern, (match, prefix) => {
      sigOk = true;
      return `${prefix}<span class="line" style="position:relative;flex:1;"><img src="${DAAN_FAKSIMILE_DATA_URI}" style="position:absolute;left:8pt;bottom:-6pt;height:28pt;pointer-events:none;" alt="Daan Theijse"/></span>`;
    });
    // Ort/Datum bei Hauptmieter
    const datumPattern = /(<div class="sig-block">\s*<div class="role">Hauptmieter<\/div>[\s\S]*?<div class="sig-row">\s*<span class="lbl">Ort, Datum:<\/span>\s*)<span class="line"><\/span>/;
    const datumStr = daanDatumStr();
    let datumOk = false;
    replaced = replaced.replace(datumPattern, (m, prefix) => {
      datumOk = true;
      return `${prefix}<span class="line" style="border-bottom:.5pt solid #888;flex:1;">Zürich, ${datumStr}</span>`;
    });
    if (!sigOk || !datumOk) {
      throw new Error(`injectDaanInUMV: Hauptmieter-Signaturblock nicht gefunden (Markup geändert?) [sig=${sigOk}, datum=${datumOk}]`);
    }
    return replaced;
  }

  // Faksimile-Signatur in HTML einfügen (Vermieter im AMZ + Labels gleichbreit)
  function injectDaanInAMZ(html) {
    const datumStr = daanDatumStr();
    const labelStyle = ' style="min-width:62pt;width:62pt;"';

    // Vermieter Block
    const vermPattern = /(<div class="lbl">Vermieter\*in<\/div>[\s\S]*?<div class="sig-row-inner"><span class="label")(>Datum:<\/span>)<span class="line"><\/span>(<\/div>\s*<div class="sig-row-inner"><span class="label")(>Unterschrift:<\/span>)<span class="line"><\/span>/;
    let vermOk = false;
    let replaced = html.replace(vermPattern, (m, p1, p2, p3, p4) => {
      vermOk = true;
      return `${p1}${labelStyle}${p2}<span class="line" style="flex:1;">${datumStr}</span>${p3}${labelStyle}${p4}<span class="line" style="position:relative;flex:1;"><img src="${DAAN_FAKSIMILE_DATA_URI}" style="position:absolute;left:8pt;bottom:-6pt;height:22pt;pointer-events:none;" alt="Daan Theijse"/></span>`;
    });
    // Mieter Block - nur Labels gleichbreit machen (keine Unterschrift)
    const mieterPattern = /(<div class="lbl">Mieter\*in<\/div>[\s\S]*?<div class="sig-row-inner"><span class="label")(>Datum:<\/span><span class="line"><\/span><\/div>\s*<div class="sig-row-inner"><span class="label")(>Unterschrift:<\/span>)/;
    let mieterOk = false;
    replaced = replaced.replace(mieterPattern, (m, p1, p2, p3) => {
      mieterOk = true;
      return `${p1}${labelStyle}${p2}${labelStyle}${p3}`;
    });
    if (!vermOk || !mieterOk) {
      throw new Error(`injectDaanInAMZ: Signaturblock nicht gefunden (Markup geändert?) [verm=${vermOk}, mieter=${mieterOk}]`);
    }
    return replaced;
  }

  // HTML → PDF via Vercel Function (mit Retry bei ETXTBSY / 500)
  async function htmlToPdf(html, filename, maxRetries = 2) {
    let lastErr = null;
    for (let attempt = 0; attempt <= maxRetries; attempt++) {
      try {
        const response = await fetch("https://mieter.dthomes.ch/api/pdf-generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ html, filename }),
        });
        if (response.ok) return await response.blob();
        const errText = await response.text();
        lastErr = new Error(`PDF generation failed (${response.status}): ${errText}`);
        // Retry bei transient errors (500 mit ETXTBSY oder Timeout)
        const retriable = response.status === 500 && (errText.includes("ETXTBSY") || errText.includes("timeout") || errText.includes("Failed to launch"));
        if (!retriable || attempt === maxRetries) throw lastErr;
        // Wait 1.5 Sek vor retry (Chromium soll sich settlen)
        await new Promise(r => setTimeout(r, 1500));
      } catch (err) {
        if (attempt === maxRetries) throw err;
        lastErr = err;
        await new Promise(r => setTimeout(r, 1500));
      }
    }
    throw lastErr;
  }

  // Token generator (32 hex chars)
  function generateContractToken() {
    const arr = new Uint8Array(16);
    crypto.getRandomValues(arr);
    return Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  // Hauptworkflow: generiert beide PDFs, lädt sie hoch, erstellt contracts row, sendet Email
  async function sendContractForSigning(b, vertragData, onProgress, types) {
    const progress = onProgress || (() => {});
    // types: optional array ["umv","amz"] - default both
    const selectedTypes = Array.isArray(types) && types.length > 0 ? types : ["umv", "amz"];
    const wantUmv = selectedTypes.includes("umv");
    const wantAmz = selectedTypes.includes("amz");
    if (!wantUmv && !wantAmz) throw new Error("Keine Vertragsart ausgewählt");
    if (!b || !vertragData) throw new Error("Bewerber oder Vertragsdaten fehlen");
    if (!b.email) throw new Error("Bewerber hat keine Email-Adresse");

    const fullName = `${b.vorname || ""} ${b.nachname || ""}`.trim();
    if (!fullName) throw new Error("Bewerber hat keinen Namen");

    // AMZ braucht angepasste Daten (Strom=25, kein Aufschlag)
    const stromFix = 25;
    const amzData = {
      ...vertragData,
      strom: stromFix,
      total: (vertragData.nettomiete||0) + (vertragData.nebenkosten||0) + stromFix,
    };

    progress("Verträge generieren...", 0.1);
    const umvHtml = wantUmv ? injectDaanInUMV(buildContractHTML(b, vertragData, fullName, formatDateLong)) : null;
    const amzHtml = wantAmz ? injectDaanInAMZ(buildAnfangsmietzinsHTML(b, amzData, fullName, formatDateLong)) : null;

    const totalSteps = (wantUmv ? 1 : 0) + (wantAmz ? 1 : 0);
    let step = 0;
    let umvBlob = null, amzBlob = null;
    if (wantUmv) {
      step++;
      progress(`PDF erstellen (${step}/${totalSteps}: Untermietvertrag)...`, 0.2);
      umvBlob = await htmlToPdf(umvHtml, `Untermietvertrag_${fullName.replace(/\s+/g,"_")}.pdf`);
    }
    if (wantAmz) {
      step++;
      progress(`PDF erstellen (${step}/${totalSteps}: Anfangsmietzinsformular)...`, 0.45);
      amzBlob = await htmlToPdf(amzHtml, `Anfangsmietzinsformular_${fullName.replace(/\s+/g,"_")}.pdf`);
    }

    progress("PDFs hochladen...", 0.6);
    const token = generateContractToken();
    const umvPath = `${token}/untermietvertrag.pdf`;
    const amzPath = `${token}/anfangsmietzins.pdf`;
    const unsignedPdfs = [];

    if (wantUmv) {
      const { error: upErr1 } = await supabase.storage.from("contracts").upload(umvPath, umvBlob, {
        contentType: "application/pdf", upsert: false
      });
      if (upErr1) throw new Error(`Upload UMV: ${upErr1.message}`);
      unsignedPdfs.push({ name: "Untermietvertrag", path: umvPath, type: "umv" });
    }
    if (wantAmz) {
      const { error: upErr2 } = await supabase.storage.from("contracts").upload(amzPath, amzBlob, {
        contentType: "application/pdf", upsert: false
      });
      if (upErr2) throw new Error(`Upload AMZ: ${upErr2.message}`);
      unsignedPdfs.push({ name: "Anfangsmietzinsformular", path: amzPath, type: "amz" });
    }

    // contract_type-string je nach Auswahl
    let contractType = "untermietvertrag_und_anfangsmietzins";
    if (wantUmv && !wantAmz) contractType = "untermietvertrag";
    else if (!wantUmv && wantAmz) contractType = "anfangsmietzins";

    progress("Vertrag in Datenbank speichern...", 0.8);
    const { data: contractRow, error: insErr } = await supabase.from("contracts").insert({
      token,
      bewerber_id: b.id,
      apt_id: vertragData.apt?.id || null,
      room_id: vertragData.zimmerId || null,
      mieter_email: b.email,
      mieter_vorname: b.vorname || "",
      mieter_nachname: b.nachname || "",
      contract_type: contractType,
      contract_data: { bewerber: b, vertrag: vertragData, umv_html: umvHtml, amz_html: amzHtml },
      status: "gesendet",
      unsigned_pdfs: unsignedPdfs,
      created_by: (window.currentUser && window.currentUser.email) || null,
    }).select().single();
    if (insErr) throw new Error(`DB Insert: ${insErr.message}`);

    progress("Email an Mieter senden...", 0.95);
    const emailRes = await fetch(`${SUPABASE_URL}/functions/v1/send-contract-email`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
      },
      body: JSON.stringify({ contractId: contractRow.id }),
    });
    if (!emailRes.ok) {
      const err = await emailRes.text();
      console.error("Email-Versand fehlgeschlagen:", err);
      // Don't fail - contract is in DB, email can be re-sent
    }

    progress("Fertig!", 1.0);
    return {
      contractId: contractRow.id,
      token,
      signUrl: `https://mieter.dthomes.ch/${token}`,
      emailSent: emailRes.ok,
    };
  }

                function parseD(s) {
                  if (!s) return null;
                  const str = String(s).trim();
                  if (!str) return null;
                  if (/^\d{4}-\d{2}-\d{2}/.test(str)) { const d=new Date(str); return isNaN(d.getTime())?null:d; }
                  const m = str.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
                  if (m) { const d=new Date(+m[3], +m[2]-1, +m[1]); return isNaN(d.getTime())?null:d; }
                  const d = new Date(str); return isNaN(d.getTime())?null:d;
                }

function Wohnungen({apts,rooms,tenants,partners,updateApt,insertApt,deleteApt,documents,uploadDocument,getDocumentUrl,deleteDocument,navigateTo,navTarget}){
  const [sel,setSel]=useState(null);const [tab,setTab]=useState("info");const [editing,setEditing]=useState(false);const [form,setForm]=useState({});
  
  // Auto-select target apartment when navigated from another tab
  useEffect(() => {
    if (navTarget && navTarget.type === "wohnungen" && navTarget.id) {
      setSel(navTarget.id);
      setTab("info");
    }
  }, [navTarget]);
  const [filter,setFilter]=useState("alle");
  const [adding,setAdding]=useState(false);
  const [newForm,setNewForm]=useState({type:"WG",ort:"Zürich"});
  const [roomList,setRoomList]=useState([]);
  const apt=apts.find(a=>a.id===sel);const aptRooms=apt?rooms.filter(r=>r.aptId===apt.id).sort((a,b)=>natSort(a.id, b.id)):[];
  const wgApts=apts.filter(a=>a.type==="WG" && !a.pipeline).sort((a,b)=>natSort(a.id, b.id));
  const airbnbApts=apts.filter(a=>a.type==="Airbnb" && !a.pipeline).sort((a,b)=>natSort(a.id, b.id));
  const pipelineApts=apts.filter(a=>!!a.pipeline).sort((a,b)=>natSort(a.id, b.id));
  function F(k){return e=>setForm(p=>({...p,[k]:e.target.value}));}
  function NF(k){
    return e => {
      const val = e.target.value;
      setNewForm(p=>({...p,[k]:val}));
      // When units count changes, sync roomList length
      if (k === "units") {
        const n = Math.max(0, Math.min(20, +val||0));
        setRoomList(prev => {
          const next = [...prev];
          while (next.length < n) next.push({miete:"",groesse:"",balkon:false});
          while (next.length > n) next.pop();
          return next;
        });
      }
      // Reset roomList if switching to Airbnb
      if (k === "type" && val === "Airbnb") {
        setRoomList([]);
      }
    };
  }
  function updateRoom(i, key, val){
    setRoomList(prev => prev.map((r,idx) => idx===i ? {...r, [key]: val} : r));
  }
  async function save(){
    await updateApt(form.id,{
      adresse:form.adresse,plz:form.plz,ort:form.ort,
      stockwerk:form.stockwerk,zimmer:form.zimmer,
      miete:+form.miete||0,kaution:+form.kaution||0,
      kautionType:form.kautionType,refzins:form.refzins,
      mietbeginn:form.mietbeginn,mietende:form.mietende,
      verwaltung:form.verwaltung,eigentuemer:form.eigentuemer,
      refnr:form.refnr,vertrag:form.vertrag,
      schluesselAnzahl:form.schluesselAnzahl,
      extraSchluessel:form.extraSchluessel,
      pipeline:!!form.pipeline,
    });
    setEditing(false);
  }
  function nextAptId(){
    let n=1;
    while(apts.find(a=>a.id===`A${n}`)) n++;
    return `A${n}`;
  }
  async function saveNew(){
    if (!newForm.adresse) { alert("Bitte Adresse angeben."); return; }
    const id = newForm.id || nextAptId();
    if (apts.find(a=>a.id===id)) { alert(`Wohnungs-ID "${id}" existiert bereits.`); return; }
    const apt = {
      id,
      adresse: newForm.adresse,
      plz: newForm.plz || "",
      ort: newForm.ort || "Zürich",
      type: newForm.type || "WG",
      zimmer: newForm.zimmer || "",
      units: newForm.type === "WG" ? (+newForm.units||0) : null,
      mietbeginn: newForm.mietbeginn || "",
      mietende: newForm.mietende || "",
      stockwerk: newForm.stockwerk || "",
      miete: +newForm.miete || 0,
      kaution: +newForm.kaution || 0,
      kautionType: newForm.kautionType || "",
      verwaltung: newForm.verwaltung || "",
      eigentuemer: newForm.eigentuemer || "",
      refzins: newForm.refzins || "",
      refnr: newForm.refnr || "",
      vertrag: newForm.vertrag || "",
      schluesselAnzahl: newForm.schluesselAnzahl || "",
      extraSchluessel: newForm.extraSchluessel || "",
      pipeline: !!newForm.pipeline,
    };
    await insertApt(apt, newForm.type === "WG" ? roomList : null);
    setAdding(false);
    setNewForm({type:"WG",ort:"Zürich"});
    setRoomList([]);
    setSel(id);
  }
  async function handleDelete(){
    if (!apt) return;

        {rs.length>0&&<div style={{marginTop:6}}><Prog val={o} max={rs.length}/></div>}

            <div style={{marginBottom:14}}>
              <div style={{fontSize:9,color:"#8a8174",textTransform:"uppercase",letterSpacing:".3em",fontWeight:600,marginBottom:8,paddingLeft:2}}>Airbnb-Wohnungen</div>

            {tab==="info"&&(() => {

// ─── ZIMMER ──────────────────────────────────────────────────────────────────
function Zimmer({rooms,tenants,apts,bewerber,updateRoom,updateBewerber,insertTenant,updateTenant,navigateTo,navTarget}){
  const [filter,setFilter]=useState("alle");
  const [editing,setEditing]=useState(false);
  const [form,setForm]=useState({});
  const [assigning,setAssigning]=useState(null); // room being assigned
  const [assignMode,setAssignMode]=useState("bewerber"); // "bewerber" | "alteMieter" | "manual" | "remove"
  const [selBewerberId,setSelBewerberId]=useState("");
  const [selOldTenantId,setSelOldTenantId]=useState("");
  const [manualForm,setManualForm]=useState({vorname:"",nachname:"",email:"",phone:""});
  const [highlightId,setHighlightId]=useState(null);
  
  // Auto-scroll & highlight when navigated here
  useEffect(() => {
    if (navTarget && navTarget.type === "zimmer" && navTarget.id) {
      setFilter("alle");
      setHighlightId(navTarget.id);
      setTimeout(() => {
        const el = document.getElementById(`zimmer-${navTarget.id}`);
        if (el) el.scrollIntoView({behavior:"smooth", block:"center"});
      }, 150);
      setTimeout(() => setHighlightId(null), 3500);
    }
  }, [navTarget]);
  const shown=filter==="frei"?rooms.filter(r=>!r.occupied):filter==="belegt"?rooms.filter(r=>r.occupied):rooms;
  const free=rooms.filter(r=>!r.occupied);
  const grouped=apts.filter(a=>a.type==="WG").sort((a,b)=>natSort(a.id, b.id)).map(a=>({apt:a,rs:shown.filter(r=>r.aptId===a.id).sort((x,y)=>natSort(x.id, y.id))})).filter(g=>g.rs.length>0);
  const eligibleBewerber=bewerber?bewerber.filter(b=>b.status==="Neu"):[];

  function F(k){return e=>setForm(p=>({...p,[k]:e.target.value}));}
  function FB(k){return e=>setForm(p=>({...p,[k]:e.target.checked}));}
  function MF(k){return e=>setManualForm(p=>({...p,[k]:e.target.value}));}
  function openEdit(r){setForm({...r});setEditing(true);}
  function openAssign(r){
    setAssigning(r);
    setSelBewerberId("");
    setManualForm({vorname:"",nachname:"",email:"",phone:""});

// ─── MIETER ──────────────────────────────────────────────────────────────────
function Mieter({tenants,rooms,apts,partners,contracts,loadContracts,updateTenant,insertTenant,renameTenantId,deleteTenant,updateRoom,documents,uploadDocument,getDocumentUrl,deleteDocument,protokolle,insertProtokoll,updateProtokoll,deleteProtokoll,navigateTo,navTarget,handoverProtocols,startHandoverProtocol,cancelHandoverProtocol,acceptHandoverProtocol,extendHandoverDeadline,deleteHandoverProtocol}){
  const [search,setSearch]=useState("");

  const [newRoomId,setNewRoomId]=useState("");
  const [qrBillSending,setQrBillSending]=useState(null); // tenant.id currently sending
  
  // QR-Einzahlungsschein generieren + per Email senden
  async function generateQrBill(tenantId) {
    if (!tenantId) return;
    setQrBillSending(tenantId);
    try {
      const { data, error } = await supabase.functions.invoke("generate-qr-bill", {
        body: { tenant_id: tenantId, send_email: true }
      });
      if (error) throw new Error(error.message || String(error));
      if (data?.error) throw new Error(data.error);
      alert(`✓ QR-Einzahlungsschein generiert und per Email versendet!\n\nReferenz: ${data.qr_reference}\nBetrag: CHF ${Number(data.amount).toLocaleString("de-CH",{minimumFractionDigits:2,maximumFractionDigits:2})}`);
    } catch (e) {
      console.error("generateQrBill failed:", e);
      alert("⚠️ QR-Bill konnte nicht erstellt werden:\n\n" + (e.message || e));
    }
    setQrBillSending(null);
  }
  
  // Auto-select target tenant when navigated from another tab
  useEffect(() => {
    if (navTarget && navTarget.type === "mieter" && navTarget.id) {

    }
  }, [navTarget]);
  
  // Aktive und archivierte Mieter trennen
  const aktive = tenants.filter(t => (t.status || "aktiv") === "aktiv");
  const archivierte = tenants.filter(t => t.status === "archiviert");
  const currentList = viewMode === "archiviert" ? archivierte : aktive;
  
  const filtered = currentList.filter(t=>`${t.vorname} ${t.nachname} ${t.id} ${t.email}`.toLowerCase().includes(search.toLowerCase())).sort((a,b) => {
    // Bei archivierten: nach archived_at sortieren (neueste zuerst)
    if (viewMode === "archiviert") {
      const dateA = a.archivedAt || a.archived_at || 0;
      const dateB = b.archivedAt || b.archived_at || 0;
      return new Date(dateB) - new Date(dateA);
    }
    return natSort(a.id, b.id);
  });
  const tenant=tenants.find(t=>t.id===sel);const room=tenant?rooms.find(r=>r.tenantId===tenant.id):null;const apt=room?apts.find(a=>a.id===room.aptId):null;
  function F(k){return e=>setForm(p=>({...p,[k]:e.target.value}));}function FB(k){return e=>setForm(p=>({...p,[k]:e.target.checked}));}
  function NF(k){return e=>setNewForm(p=>({...p,[k]:e.target.value}));}function NFB(k){return e=>setNewForm(p=>({...p,[k]:e.target.checked}));}
  
  // ─── Vertrags-Generation für Mieter (UMV + AMZ) ──────────────────────
  function buildContractDataForTenant(t) {
    if (!t) return null;
    const room = rooms.find(r => r.tenantId === t.id) || (t.roomId ? rooms.find(r => r.id === t.roomId) : null);
    const apt = room ? apts.find(a => a.id === room.aptId) : null;
    const bruttomiete = room ? +room.miete : 1000;
    const nebenkosten = 100;
    const nettomiete = bruttomiete - nebenkosten;
    const strom = 25;
    
    // Detect kaution variant
    let kautionMonate = 3;
    let aufschlag = 0;
    const kOpt = t.kautionOpt || t.kaution_opt;
    const kAufschlag = t.kautionAufschlag || t.kaution_aufschlag;
    if (kOpt === "0x" || kAufschlag === 150) { kautionMonate = 0; aufschlag = 150; }
    else if (kOpt === "1x" || kAufschlag === 100) { kautionMonate = 1; aufschlag = 100; }
    else if (kOpt === "2x" || kAufschlag === 50) { kautionMonate = 2; aufschlag = 50; }
    else if (t.kautionMonate !== null && t.kautionMonate !== undefined) {
      kautionMonate = +t.kautionMonate;
      aufschlag = kautionMonate === 0 ? 150 : kautionMonate === 1 ? 100 : kautionMonate === 2 ? 50 : 0;
    }

  // Zimmer-Wechsel: aktiven Mieter zu anderem Zimmer verschieben
  async function executeRoomChange() {
    if (!changingRoom || !newRoomId) return;
    const t = changingRoom;
    const newRoom = rooms.find(r => r.id === newRoomId);
    if (!newRoom) { alert("Neues Zimmer nicht gefunden."); return; }
    
    const oldRoom = rooms.find(r => r.tenantId === t.id) || (t.roomId ? rooms.find(r => r.id === t.roomId) : null);
    
    // Falls neues Zimmer schon belegt ist (von anderem Mieter) → Tausch-Frage
    if (newRoom.occupied && newRoom.tenantId && newRoom.tenantId !== t.id) {
      const occupant = tenants.find(x => x.id === newRoom.tenantId);
      const occupantName = occupant ? `${occupant.vorname} ${occupant.nachname} (${occupant.id})` : `Mieter ${newRoom.tenantId}`;
      const confirmMsg = `⚠ Das Zimmer ${newRoom.id} ist bereits belegt von ${occupantName}.\n\nMöchtest du die Zimmer TAUSCHEN? ${occupantName} würde dann in ${oldRoom?.id || "das aktuelle"} Zimmer ziehen.`;
      if (!confirm(confirmMsg)) return;
      // TAUSCH: occupant in altes Zimmer
      if (oldRoom) {
        await updateRoom(oldRoom.id, {tenantId: occupant.id, occupied: true});
        if (occupant) await updateTenant(occupant.id, {aptId: oldRoom.aptId, roomId: oldRoom.id});
      } else {
        // Aktueller Mieter hatte kein altes Zimmer → occupant rausnehmen
        if (occupant) await updateTenant(occupant.id, {aptId: null, roomId: null});
      }
    } else if (oldRoom) {
      // Altes Zimmer freigeben (kein Tausch)
      await updateRoom(oldRoom.id, {tenantId: null, occupied: false});
    }
    
    // Neues Zimmer belegen mit aktuellem Mieter
    await updateRoom(newRoom.id, {tenantId: t.id, occupied: true});
    
    // Mieter-Datensatz updaten
    await updateTenant(t.id, {aptId: newRoom.aptId, roomId: newRoom.id});
    
    setChangingRoom(null);
    setNewRoomId("");
    alert(`✓ ${t.vorname} ${t.nachname} ist jetzt in Zimmer ${newRoom.id} (${apts.find(a=>a.id===newRoom.aptId)?.adresse||""}).`);
  }

                const bb=pd(tvData.einzug), ee=pd(tvData.mietende);

                <div className="fg"><label className="fl">Nebenkosten</label><input className="fi" type="number" value={tvData.nebenkosten} onChange={e=>setTvData(p=>({...p,nebenkosten:+e.target.value||0,bruttomiete:(p.nettomiete||0)+(+e.target.value||0)}))}/></div>

              <div className="frow">
                <div className="fg"><label className="fl">Kaution</label><select className="fi" value={tvData.kautionMonate} onChange={e=>{const km=+e.target.value; const auf=km===0?150:km===1?100:km===2?50:0; setTvData(p=>({...p,kautionMonate:km,aufschlag:auf,kautionBetrag:((p.bruttomiete||0)+(p.strom||0))*km}));}}><option value={3}>3 Monatsmieten (Standard)</option><option value={2}>2 Monate (+50)</option><option value={1}>1 Monat (+100)</option><option value={0}>Keine (+150)</option></select></div>
                <div className="fg"><label className="fl">Aufschlag</label><input className="fi" type="number" value={tvData.aufschlag} onChange={TVn("aufschlag")}/></div>

                <label style={{fontSize:13,cursor:"pointer"}}><input type="checkbox" checked={tvTypes.includes("amz")} onChange={()=>toggleType("amz")}/> Anfangsmietzinsformular</label>

                <button className="btn btn-g btn-sm" disabled={dlBusy==="umv"||tvSending} onClick={()=>tvDownload("umv")}>{dlBusy==="umv"?"⏳ …":"📄 UMV"}</button>
                <button className="btn btn-g btn-sm" disabled={dlBusy==="amz"||tvSending} onClick={()=>tvDownload("amz")}>{dlBusy==="amz"?"⏳ …":"📄 AMZ"}</button>

                <button className="btn btn-p" disabled={tvSending} onClick={tvSend}>{tvSending?"Wird verschickt…":"Zur Unterschrift senden"}</button>

      })()}

  );
}

// ─── FINANZEN & FRISTEN ──────────────────────────────────────────────────────
function Finanzen({apts,rooms}){
  const wgRooms=rooms.filter(r=>["A2","A3","A5","A6","A7","A8"].includes(r.aptId));
  const soll=wgRooms.filter(r=>r.occupied).reduce((s,r)=>s+(+r.miete||0),0);
  const pot=wgRooms.reduce((s,r)=>s+(+r.miete||0),0);
  const byApt=apts.filter(a=>a.type==="WG" && !a.pipeline).map(a=>{const rs=rooms.filter(r=>r.aptId===a.id);return{...a,soll:rs.filter(r=>r.occupied).reduce((s,r)=>s+(+r.miete||0),0),pot:rs.reduce((s,r)=>s+(+r.miete||0),0)};});
  return(
    <div>
      <div className="pt">Finanzen</div>
      <div className="sg">
        <div className="sc"><div className="sl">Ist-Miete</div><div className="sv" style={{fontSize:20,color:"#5a7c5e"}}>{Math.round(soll/1000)}k</div><div className="sn">CHF/Mt.</div></div>
        <div className="sc"><div className="sl">Potenzial</div><div className="sv" style={{fontSize:20}}>{Math.round(pot/1000)}k</div><div className="sn">CHF/Mt.</div></div>
        <div className="sc"><div className="sl">Ausfall</div><div className="sv" style={{fontSize:20,color:"#c89653"}}>{chf(pot-soll)}</div></div>
        <div className="sc"><div className="sl">Auslastung</div><div className="sv" style={{fontSize:20}}>{pot?Math.round(soll/pot*100):0}%</div></div>
      </div>
      <div className="card">
        <div className="ct">Pro Wohnung</div>
        <table><thead><tr><th>WG</th><th>Adresse</th><th>Ist</th><th>Pot.</th><th>Auslastung</th></tr></thead><tbody>
          {byApt.map(a=>{const p=a.pot?Math.round(a.soll/a.pot*100):0;return(<tr key={a.id}><td style={{fontWeight:700}}>{a.id}</td><td style={{fontSize:11.5,color:"#8a8478"}}>{a.adresse}</td><td style={{color:"#5a7c5e"}}>{chf(a.soll)}</td><td style={{color:"#8a8478"}}>{chf(a.pot)}</td><td style={{width:170,minWidth:130,maxWidth:200}}><div style={{display:"flex",alignItems:"center",gap:8}}><div style={{flex:"1 1 0",minWidth:0}}><Prog val={a.soll} max={a.pot}/></div><span style={{fontSize:10.5}}>{p}%</span></div></td></tr>);})}
        </tbody></table>
      </div>
    </div>
  );
}

function Fristen({apts,tenants,rooms}){

  const aptEnds=apts.filter(a=>!a.pipeline && a.mietende).map(a=>{const d=parseDMY(a.mietende);return{...a,tage:Math.ceil((d-heute)/86400000)};}).sort((a,b)=>a.tage-b.tage);

    <div>

}

// ─── ZAHLUNGEN ───────────────────────────────────────────────────────────────
function Zahlungen({tenants, rooms, apts, payments, upsertPayment, deletePayment, sendMahnung, navigateTo}){
  const now = new Date();
  
  // Mieten werden vor dem Monatsbeginn überwiesen (typisch bis 25. des Vormonats).
  // Daher: ab dem 25. des aktuellen Monats wird der "Zahlungs-Monat" = nächster Kalendermonat.
  // Beispiel: 26. Mai → wir tracken bereits die Juni-Mieten
  function getPaymentMonth(date) {
    let j = date.getFullYear();
    let m = date.getMonth() + 1;  // 1-12
    if (date.getDate() >= 25) {
      m += 1;
      if (m > 12) { m = 1; j += 1; }
    }
    return { jahr: j, monat: m };
  }
  
  const initialPm = getPaymentMonth(now);
  const [jahr, setJahr] = useState(initialPm.jahr);
  const [monat, setMonat] = useState(initialPm.monat); // 1-12
  const [search, setSearch] = useState("");
  const [showOnlyOffen, setShowOnlyOffen] = useState(false);
  const [editingPayment, setEditingPayment] = useState(null); // { tenantId, ... }
  const [mahnungConfirm, setMahnungConfirm] = useState(null); // { row, stufe, monatLabel }
  
  const MONATS_NAMEN = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
  
  // Helper: parse DD.MM.YYYY oder YYYY-MM-DD zu Date
  function parseDate(s) {
    if (!s) return null;
    const str = String(s).trim();
    if (/^\d{4}-\d{2}-\d{2}/.test(str)) return new Date(str);
    const m = str.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
    if (m) return new Date(+m[3], +m[2]-1, +m[1]);
    const d = new Date(str);
    return isNaN(d) ? null : d;
  }
  
  // Mieter die in DIESEM Monat (jahr/monat) aktiv waren - also Miete zahlen müssten
  // Logik: Mieter erscheint wenn
  //  • Einzug ≤ letzter Tag des Monats  (also vor oder im Monat eingezogen)
  //  • UND: Auszug fehlt ODER Auszug ≥ erster Tag des Monats  (also nicht vor diesem Monat ausgezogen)
  // Archivierte Mieter werden ebenfalls einbezogen falls sie im Monat noch da waren!
  const monatsStart = new Date(jahr, monat-1, 1);  // erster Tag
  const monatsEnde  = new Date(jahr, monat, 0, 23, 59, 59); // letzter Tag des Monats
  
  const activeTenants = tenants.filter(t => {
    const einzug = parseDate(t.einzug);
    const auszug = parseDate(t.auszug);

    // Abgesagte Miete: Auszug am oder vor dem Einzug, also nie eingezogen.
    // Nur ausblenden, wenn dazu keine Zahlung erfasst ist.
    if (einzug && auszug && auszug <= einzug && !(payments||[]).some(p => p.tenantId === t.id)) return false;

    // Wenn kein Einzug-Datum → annehmen dass Mieter seit Anfang da ist (aber nur aktiv)
    if (!einzug) {
      return (t.status||"aktiv") === "aktiv";
    }
    
    // Einzug muss vor/im Monat liegen
    if (einzug > monatsEnde) return false;
    
    // Wenn Auszug-Datum existiert: muss ≥ Monatsanfang sein (sonst war Mieter vor diesem Monat schon weg)
    if (auszug && auszug < monatsStart) return false;
    
    return true;
  });
  
  // Helper: Erwartete Miete pro Mieter aus Room (auch für archivierte Mieter - über Mieter-Daten)
  // Soll = Bruttomiete (Zimmer-Miete + 25 CHF Strom) + Kautions-Aufschlag (falls vorhanden)
  function getExpectedMiete(tenant) {
    let bruttomiete = 0;
    
    // Zuerst aktuelles Zimmer (für aktive Mieter)
    let room = rooms.find(r => r.tenantId === tenant.id);
    // Fallback: tenant.roomId (für archivierte Mieter - Zimmer-Verknüpfung ist gelöst aber roomId bleibt evtl)
    if (!room && tenant.roomId) {
      room = rooms.find(r => r.id === tenant.roomId);
    }
    if (room) {
      bruttomiete = (+room.miete || 0) + 25;
    } else if (tenant.kautionBetrag && tenant.kautionMonate) {
      // Letzter Fallback für archivierte: aus Kautions-Betrag rückrechnen
      bruttomiete = Math.round((+tenant.kautionBetrag || 0) / (+tenant.kautionMonate || 3));
    }
    
    // Kautions-Aufschlag dazurechnen (monatlicher Aufpreis bei reduzierter Kaution)
    const aufschlag = +tenant.kautionAufschlag || 0;
    
    return bruttomiete + aufschlag;
  }
  
  // Helper: Payment für Mieter + Monat
  function getPayment(tenantId) {
    return payments.find(p => p.tenantId === tenantId && p.jahr === jahr && p.monat === monat);
  }
  
  // Daten zusammenstellen
  const rows = activeTenants.map(t => {
    const p = getPayment(t.id);
    let soll = getExpectedMiete(t);
    const room = rooms.find(r => r.tenantId === t.id) || rooms.find(r => r.id === t.roomId);
    const apt = room ? apts.find(a => a.id === room.aptId) : null;
    // Teilmonat: halbmonatlich. Einzug ab dem 15. bzw. Auszug bis und mit dem 15. -> halbe Miete
    const einzug = parseDate(t.einzug);
    const auszug = parseDate(t.auszug);
    const einzugInMonth = einzug && einzug >= monatsStart && einzug <= monatsEnde;
    const auszugInMonth = auszug && auszug >= monatsStart && auszug <= monatsEnde;
    const isPartialMonth = einzugInMonth || auszugInMonth;
    let partialNote = "";
    if (isPartialMonth) {
      const half = (einzugInMonth && einzug.getDate() >= 15) || (auszugInMonth && auszug.getDate() <= 15);
      if (half) soll = soll / 2;
      const parts = [];
      if (einzugInMonth) parts.push(`Einzug ${fmtDateDE(t.einzug)}`);
      if (auszugInMonth) parts.push(`Auszug ${fmtDateDE(t.auszug)}`);
      partialNote = `${parts.join(" · ")}${half ? " · halbe Miete" : " · voller Monat"}`;
    }
    return {
      tenant: t,
      room,
      apt,
      payment: p,
      soll,
      status: p?.status || "offen",
      isPartialMonth,
      partialNote,
    };
  });
  
  const filtered = rows
    .filter(r => `${r.tenant.vorname} ${r.tenant.nachname} ${r.tenant.id}`.toLowerCase().includes(search.toLowerCase()))
    .filter(r => !showOnlyOffen || r.status === "offen")
    .sort((a,b) => {
      // Offene zuerst, dann nach ID
      if (a.status !== b.status) {
        const order = {offen:0, teilweise:1, bezahlt:2, erlassen:3};
        return (order[a.status]||0) - (order[b.status]||0);
      }
      return natSort(a.tenant.id, b.tenant.id);
    });
  
  // Statistiken - IMMER mit Strom + Aufschlag (getExpectedMiete liefert das schon)
  // Soll-Total = ALLE Mieter dieses Monats (egal welcher Status)
  const totalSoll = rows.reduce((s,r) => s + r.soll, 0);
  // Bezahlt-Total = was tatsächlich reingekommen ist
  // WICHTIG: Pro Mieter wird auf das aktuelle SOLL gecapped - so kann eine Überzahlung von Mieter A
  // nicht eine fehlende Zahlung von Mieter B "ausgleichen" (sonst wäre Marge IST > Marge SOLL)
  const totalBezahlt = rows.reduce((s,r) => {
    if (r.status === "bezahlt") {
      const ist = (+r.payment?.betragIst > 0 ? +r.payment.betragIst : r.soll);
      return s + Math.min(ist, r.soll);
    }
    if (r.status === "teilweise") {
      const ist = +r.payment?.betragIst || 0;
      return s + Math.min(ist, r.soll);
    }
    return s;
  }, 0);
  // Offen-Total = was noch fehlt
  const totalOffen = rows.reduce((s,r) => {
    if (r.status === "offen") return s + r.soll;
    if (r.status === "teilweise") return s + Math.max(0, r.soll - (+r.payment?.betragIst || 0));
    return s;
  }, 0);
  const anzahlBezahlt = rows.filter(r => r.status === "bezahlt").length;
  const anzahlOffen = rows.filter(r => r.status === "offen").length;
  const anzahlTeilweise = rows.filter(r => r.status === "teilweise").length;
  
  // AUSGABEN: Hauptmiete für alle Wohnungen die im aktuellen Monat aktive Mieter haben
  // (also Wohnungen die wir bezahlen müssen weil sie vermietet sind)
  const aptIdsInUse = [...new Set(rows.map(r => r.apt?.id).filter(Boolean))];
  const totalAusgaben = aptIdsInUse.reduce((s, aptId) => {
    const apt = apts.find(a => a.id === aptId);
    return s + (+apt?.miete || 0);
  }, 0);
  
  // MARGE: Eingenommen (was tatsächlich da ist) minus Ausgaben (was wir an Hauptvermieter zahlen)
  const margeIst = totalBezahlt - totalAusgaben;
  // Erwartete Marge wenn alle bezahlen
  const margeSoll = totalSoll - totalAusgaben;
  
  function parseSwissDate(str) {
    if (!str) return null;
    const parts = str.trim().split(".");
    if (parts.length !== 3) return null;
    const [d, m, y] = parts.map(Number);
    if (isNaN(d) || isNaN(m) || isNaN(y)) return null;
    return new Date(y, m - 1, d);
  }
  
  function calcProrataBetrag(einzugStr, jahr, monat, bruttomiete) {
    const einzug = parseSwissDate(einzugStr);
    if (!einzug) return null;
    // Einzug muss im gleichen Monat sein
    if (einzug.getFullYear() !== jahr || einzug.getMonth() + 1 !== monat) return null;
    const daysInMonth = new Date(jahr, monat, 0).getDate();
    const einzugTag = einzug.getDate();
    const verbleibendTage = daysInMonth - einzugTag + 1;
    if (verbleibendTage >= daysInMonth) return null; // voller Monat, keine Anpassung noetig
    const proTag = bruttomiete / daysInMonth;
    const betrag = Math.round(proTag * verbleibendTage * 20) / 20; // gerundet auf 5 Rappen
    return { betrag, verbleibendTage, daysInMonth, einzug };
  }
  
  async function toggleBezahlt(row) {
    const newStatus = row.status === "bezahlt" ? "offen" : "bezahlt";
    await upsertPayment({
      tenantId: row.tenant.id,
      jahr,
      monat,
      betragSoll: row.soll,
      betragIst: newStatus === "bezahlt" ? row.soll : null,
      status: newStatus,
      bezahltAm: newStatus === "bezahlt" ? new Date().toISOString().slice(0,10) : null,
      bezahltVia: newStatus === "bezahlt" ? (row.payment?.bezahltVia || "Überweisung") : null,
      markedBy: row.tenant.owner || null,
      bemerkung: row.payment?.bemerkung || null,
    });
  }
  
  function sendNextMahnung(row) {
    const p = row.payment;
    
    if (p?.mahnung1SentAt && p?.mahnung2SentAt) {
      const d1 = new Date(p.mahnung1SentAt).toLocaleDateString("de-CH");
      const d2 = new Date(p.mahnung2SentAt).toLocaleDateString("de-CH");
      alert(`Beide Mahnungen wurden bereits gesendet:\n• 1. Mahnung: ${d1}\n• 2. Mahnung: ${d2}\n\nFür weitere Schritte (Betreibung) bitte manuell vorgehen.`);
      return;
    }
    
    if (!row.tenant.email) {
      alert(`Keine Email-Adresse für ${row.tenant.vorname} ${row.tenant.nachname} hinterlegt.`);
      return;
    }
    
    const stufe = p?.mahnung1SentAt ? 2 : 1;
    const monatLabel = `${MONATS_NAMEN[monat-1]} ${jahr}`;
    
    // Modal öffnen (statt direkt senden)
    setMahnungConfirm({ row, stufe, monatLabel });
  }
  
  async function executeMahnung() {
    if (!mahnungConfirm) return;
    const { row, stufe } = mahnungConfirm;
    setMahnungConfirm(null);
    
    // Sicherstellen dass Payment existiert
    let paymentId = row.payment?.id;
    if (!paymentId) {
      paymentId = `PAY${row.tenant.id}-${jahr}-${String(monat).padStart(2,"0")}`;
      await upsertPayment({
        tenantId: row.tenant.id,
        jahr, monat,
        betragSoll: row.soll,
        status: "offen",
        markedBy: row.tenant.owner || null,
      });
    }
    
    await sendMahnung(paymentId, stufe);
  }
  
  function openDetails(row) {
    setEditingPayment({
      tenantId: row.tenant.id,
      tenant: row.tenant,
      jahr,
      monat,
      betragSoll: row.soll,
      betragIst: row.payment?.betragIst || row.soll,
      status: row.status,
      bezahltAm: row.payment?.bezahltAm || new Date().toISOString().slice(0,10),
      bezahltVia: row.payment?.bezahltVia || "Überweisung",
      bemerkung: row.payment?.bemerkung || "",
    });
  }
  
  async function saveDetails() {
    await upsertPayment({
      ...editingPayment,
      markedBy: editingPayment.tenant?.owner || null,
    });
    setEditingPayment(null);
  }
  
  // Monats-Navigation
  function changeMonth(delta) {
    let m = monat + delta;
    let j = jahr;

  function startEdit(p){
    const seeded = (p.kontakte&&p.kontakte.length) ? p.kontakte
      : ((p.kontaktperson||p.email||p.telefon) ? [{name:p.kontaktperson||"",funktion:"",email:p.email||"",telefon:p.telefon||""}] : []);

  const updK = (i,key,val)=>setF(p=>{const k=[...(p.kontakte||[])];k[i]={...k[i],[key]:val};return {...p,kontakte:k};});
  const rmK = (i)=>setF(p=>({...p,kontakte:(p.kontakte||[]).filter((_,j)=>j!==i)}));

    if(!(f.name||"").trim()){ alert("Name ist erforderlich."); return; }

      {selPartner && (

  const SubHead = ({title, sub}) => (

      <div style={{fontFamily:"Georgia,'Times New Roman',serif",fontWeight:400,fontSize:14.5,color:"var(--ink)",lineHeight:1.3}}>{title}</div>
      {sub && <div style={{fontSize:11.5,fontWeight:300,color:"var(--muted)",marginTop:6,lineHeight:1.6,maxWidth:620}}>{sub}</div>}
    </div>
  );
  const CardFoot = ({marge}) => (
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginTop:9,paddingTop:9,borderTop:"1px solid var(--line-soft)"}}>
      <span style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:".18em",color:"var(--muted)"}}>Marge</span>
      <span style={{fontSize:19,fontFamily:"'Manrope',sans-serif",color:marge>=0?"#3d4f2f":"#9b4a3e"}}>{marge>=0?"+":""}{chf(Math.round(marge))}</span>
    </div>
  );
  const toggleTbl = (k) => setOpenTbl(o=>{
    const next = {...o, [k]: !o[k]};
    if (next[k]) setTimeout(()=>{
      const el = curMonthRef.current[k];
      if (el && el.scrollIntoView) el.scrollIntoView({behavior:"smooth", block:"center"});
    }, 80);
    return next;
  });
  const tblBtn = (k, label) => (
    <button onClick={()=>toggleTbl(k)} style={{width:"100%",textAlign:"left",background:"transparent",border:"1px solid var(--line-soft)",borderRadius:8,padding:"9px 12px",fontSize:11.5,color:"var(--muted)",cursor:"pointer",fontFamily:"inherit",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span>{label}</span><span style={{fontSize:10}}>{openTbl[k]?"▲":"▼"}</span>
    </button>
  );
  const wgApts = (apts||[]).filter(a=>a.type==="WG" && !a.pipeline);
  const wgAptIds = new Set(wgApts.map(a=>a.id));
  const wgRooms = (rooms||[]).filter(r=>wgAptIds.has(r.aptId));
  const tenantById = (id) => (tenants||[]).find(t=>t.id===id);
  const aptById = (id) => (apts||[]).find(a=>a.id===id);
  const monthFin = (s, e) => {
    let ausgaben=0;
    const activeApts = new Set();
    wgApts.forEach(a=>{ const ab=parseDMY(a.mietbeginn), bis=parseDMY(a.mietende); if((!ab||ab<=e)&&(!bis||bis>=s)){ ausgaben+=(+a.miete||0); activeApts.add(a.id);} });
    let miete=0, strom=0, aufschlag=0, belegt=0, total=0, leerstandskosten=0;
    wgRooms.forEach(r=>{
      if (!activeApts.has(r.aptId)) return;
      total++;
      const t = r.tenantId ? tenantById(r.tenantId) : null;
      const apt = aptById(r.aptId);
      const ein = parseDMY(t && t.einzug) || parseDMY(apt && apt.mietbeginn);
      const aus = parseDMY(t && t.auszug) || parseDMY(apt && apt.mietende);
      const isOcc = !!r.occupied && (!ein || ein <= e) && (!aus || aus >= s);
      if (isOcc) { belegt++; miete+=(+r.miete||0); strom+=25; aufschlag += t?(+t.kautionAufschlag||0):0; }
      else { leerstandskosten += (+r.miete||0); }
    });
    const einnahmen=miete+strom+aufschlag;
    return {miete,strom,aufschlag,einnahmen,ausgaben,marge:einnahmen-ausgaben,belegt,total,frei:total-belegt,leerstandskosten,auslastung: total?belegt/total:0};
  };
  const now = new Date();
  const floorFut = (v, fut) => (fut && v<0) ? 0 : v;
  const months = [];
  for (let i=-5; i<=6; i++){
    const d = new Date(now.getFullYear(), now.getMonth()+i, 1);
    const s = new Date(d.getFullYear(), d.getMonth(), 1);
    const e = new Date(d.getFullYear(), d.getMonth()+1, 0, 23,59,59,999);
    const f = monthFin(s, e);
    months.push({ label: s.toLocaleDateString("de-CH",{month:"short",year:"2-digit"}), full: s.toLocaleDateString("de-CH",{month:"long",year:"numeric"}), ...f, future: i>0, current: i===0 });
  }
  // Jährliche Ergebnisse (Summe über 12 Monate)
  const years = [];
  for (let y=now.getFullYear(); y<=now.getFullYear()+1; y++){
    let einnahmen=0, ausgaben=0, marge=0;
    for (let m=0;m<12;m++){ const s=new Date(y,m,1); const e=new Date(y,m+1,0,23,59,59,999); const f=monthFin(s,e); einnahmen+=f.einnahmen; ausgaben+=f.ausgaben; marge+=f.marge; }
    years.push({ y, einnahmen, ausgaben, marge, future: y>now.getFullYear() });
  }
  // Bewohner-Kennzahlen (aktive Mieter)
  const activeTenants = (tenants||[]).filter(t=>(t.status||"aktiv")!=="archiviert");
  const normNat = (s)=>{ const n=(s||"").trim(); if(!n) return "Unbekannt"; const low=n.toLowerCase(); if(low==="suisse") return "Schweiz"; if(low==="somalien") return "Somalia"; if(low==="greece") return "Griechenland"; return n; };
  const natCounts={}; activeTenants.forEach(t=>{ const n=normNat(t.nat); natCounts[n]=(natCounts[n]||0)+1; });
  const natList=Object.entries(natCounts).sort((a,b)=>b[1]-a[1]);
  const maxNat=Math.max(1, ...natList.map(x=>x[1]));
  const genderCounts={}; activeTenants.forEach(t=>{ const g=(t.gender||"").trim()||"Unbekannt"; genderCounts[g]=(genderCounts[g]||0)+1; });
  const genderList=Object.entries(genderCounts).sort((a,b)=>b[1]-a[1]);
  const ages=activeTenants.map(t=>{ const d=parseDMY(t.geburt); if(!d||isNaN(d.getTime())) return null; const a=(now-d)/(365.25*86400000); return (a>0&&a<120)?a:null; }).filter(a=>a!=null);
  const avgAge= ages.length ? Math.round(ages.reduce((sm,a)=>sm+a,0)/ages.length) : null;
  // Airbnb / Serviced Apartments (aus Smoobu)
  const hasAb = (smoobuBookings||[]).length>0;
  const abBookings = (smoobuBookings||[]).filter(x=>!x.cancelled && !x.isBlocked);
  const abApts = (apts||[]).filter(a=>a.type==="Airbnb" && !a.pipeline);
  const nightsOverlap = (arr, dep, s, eNext) => {
    if(!arr||!dep) return 0;
    const a=new Date(arr), d=new Date(dep);
    const from = a>s?a:s; const to = d<eNext?d:eNext;
    const n = Math.round((to-from)/86400000); return n>0?n:0;
  };
  const CLEAN_PER_BOOKING = 100, LAUNDRY_PER_GUEST = 12.5;
  const airbnbFin = (s, e, eNext) => {
    let occNights=0, umsatz=0, putzen=0, waesche=0, anz=0, kommission=0;
    abBookings.forEach(bk=>{
      const tot = Math.max(1, bk.nights || Math.round((new Date(bk.departure)-new Date(bk.arrival))/86400000));
      const no = nightsOverlap(bk.arrival, bk.departure, s, eNext);
      if (no>0){
        const frac = no/tot;
        occNights += no;
        umsatz += (bk.price||0)*frac;
        kommission += (bk.commission||0)*frac;
        putzen += CLEAN_PER_BOOKING*frac;
        waesche += LAUNDRY_PER_GUEST*((bk.adults||0)+(bk.children||0))*frac;
        anz += frac;
      }
    });
    let miete=0, moeblierung=0, availNights=0;
    abApts.forEach(a=>{
      const ab=parseDMY(a.mietbeginn), bis=parseDMY(a.mietende);
      if((!ab||ab<=e)&&(!bis||bis>=s)){ miete+=(+a.miete||0); if(/feldegg/i.test(a.adresse||"")) moeblierung += 900; }
      // Verfuegbare Naechte: nur solange die Wohnung im Monat tatsaechlich gemietet war
